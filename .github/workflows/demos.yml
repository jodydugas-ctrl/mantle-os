name: Demo Smoke (headless browser)

# The single-file HTML reference demos (examples/*.html) run a whole organism in the browser.
# The Python substrate is certified by the Zombie Body Audit workflow; this one gives the demos
# their own runtime regression cover: each must mount, expose its engine, and PASS its in-browser
# self-audit / Genome+resolver checks. (Loads React/Babel from the unpkg CDN, so it needs network.)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: examples/tests/package-lock.json

      - name: Install Playwright (chromium only)
        working-directory: examples/tests
        timeout-minutes: 8
        run: |
          npm ci --no-audit --no-fund --prefer-offline
          npx playwright install --with-deps chromium

      - name: Serve examples/ (static)
        timeout-minutes: 1
        run: |
          python -m http.server 8765 --directory examples &
          # wait for the server to answer before launching the browser
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8765/Mantle_Spreadsheet_Agent.html -o /dev/null; then break; fi
            sleep 0.5
          done

      - name: Smoke-test both demos (mount + self-audit)
        working-directory: examples/tests
        timeout-minutes: 3
        env:
          BASE_URL: http://localhost:8765
        run: node demo_smoke.mjs

      - name: Smoke-test the live agent (jsdom mount + runnable Stage-1 gate)
        working-directory: examples/tests
        timeout-minutes: 2
        run: node live_agent_smoke.mjs
