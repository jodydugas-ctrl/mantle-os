name: Zombie Body Audit

# "Everything is provable" — so prove it on every commit. v3: the Stage-1 gate, the 32
# security invariants, the Stage-2 gate, three tamper proofs, both narrated demos, and the
# assimilation dry-run. Plus the v2.3 reference suite, unchanged. Pure standard library.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  certify-v3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Stage-1 Zombie Body gate
        run: python -m mantle audit

      - name: The gate must CATCH tampering (all three MUST fail)
        run: |
          if python -m mantle audit --break-hash --fast;   then echo "FAIL: --break-hash not caught";   exit 1; fi
          if python -m mantle audit --break-primer --fast; then echo "FAIL: --break-primer not caught"; exit 1; fi
          if python -m mantle audit --break-seal --fast;   then echo "FAIL: --break-seal not caught";   exit 1; fi
          echo "OK: all three tampering paths were correctly caught"

      - name: Security invariants (32 red/green)
        run: python -m mantle prove

      - name: Stage-2 MIND gate (containment + full Stage-1 regression, offline stub)
        run: python -m mantle audit-mind

      - name: Narrated demos (Phase 1 + Phase 2) and the assimilation dry-run
        run: |
          python -m mantle demo
          python -m mantle mind
          python -m mantle assimilate examples/sample_app --dry-run

  certify-standalone-cube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: The standalone cube codec proves every format rule
        working-directory: examples/vcw
        run: python vcw_cube.py selftest

      - name: One format, two faithful implementations (standalone <-> engine)
        run: python examples/vcw/interop.py

      - name: Back-compat shims still drive the gates (v2.3 commands keep working)
        working-directory: examples/vcw
        run: |
          python audit.py --fast
          python test_invariants.py
          python audit_mind.py --fast
          python examples_boot.py
          python examples_mind.py
