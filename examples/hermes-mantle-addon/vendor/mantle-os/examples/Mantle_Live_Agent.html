// §Template resolver — resolves {{bodyField}} references in primitive args before execution
function resolveTpl(args, ctx, pipe = null) {
  if (!args || typeof args !== "object" || Array.isArray(args)) return args;
  const out = {};
  for (const [k, v] of Object.entries(args)) {
    if (typeof v === "string") {
      out[k] = v.replace(/\{\{([^}]+)\}\}/g, (_, ref) => {
        if (pipe && ref in pipe) return String(pipe[ref] ?? "");
        return String(ctx?.bodyFields?.[ref] ?? "");
      });
    } else {
      out[k] = v;
    }
  }
  return out;
}

// deriveIdentityKey — HKDF-based identity-bound key derivation (Crystal v1.0)
// Key = HKDF-SHA-256(input=appId+":"+agentName, salt=genesisHash, info="vcw-png-v1:"+purposeId)
const deriveIdentityKey = async (appId, agentName, genesisHash, purposeId = "primary.vcw") => {
  const te = new TextEncoder();
  const km = await crypto.subtle.importKey(
    "raw", te.encode(appId + ":" + agentName),
    "HKDF", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "HKDF", hash: "SHA-256", salt: te.encode(genesisHash || "no-genesis"), info: te.encode("vcw-png-v1:" + purposeId) },
    km, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
};

// ── PNG Shard encode/decode (Crystal v1.0) ─────────────────────
// encodeToPNG: flat RGBA pixel array → lossless PNG bytes (Uint8Array)
// decodeFromPNG: PNG bytes → { pixels: number[], side: number }
// Uses OffscreenCanvas (worker-safe) with HTMLCanvasElement fallback.
const encodeToPNG = async (pixels, side) => {
  const rgba = new Uint8ClampedArray(pixels.length ? pixels : new Array(side * side * 4).fill(0));
  let blob;
  if (typeof OffscreenCanvas !== "undefined") {
    const canvas = new OffscreenCanvas(side, side);
    const ctx = canvas.getContext("2d");
    ctx.putImageData(new ImageData(rgba, side, side), 0, 0);
    blob = await canvas.convertToBlob({ type: "image/png" });
  } else {
    const canvas = document.createElement("canvas");
    canvas.width = canvas.height = side;
    const ctx = canvas.getContext("2d");
    ctx.putImageData(new ImageData(rgba, side, side), 0, 0);
    blob = await new Promise((res) => canvas.toBlob(res, "image/png"));
  }
  return new Uint8Array(await blob.arrayBuffer());
};

const decodeFromPNG = async (data) => {
  const blob = new Blob([data], { type: "image/png" });

  const side = bitmap.width;
  let imgData;
  if (typeof OffscreenCanvas !== "undefined") {
    const canvas = new OffscreenCanvas(side, side);
    const ctx = canvas.getContext("2d");
    ctx.drawImage(bitmap, 0, 0);
    imgData = ctx.getImageData(0, 0, side, side);
  } else {
    const canvas = document.createElement("canvas");
    canvas.width = canvas.height = side;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(bitmap, 0, 0);

// ── Delta Engine (Crystal v1.0) ────────────────────────────────
// Strict Prefix Invariant: C_{t+1} = C_t + Δ_{t+1}
// String dedup: blocks ≥ DEDUP_THRESHOLD chars → [DEF:Rxx]/[REF:Rxx] tokens
// Exploits LLM API prompt caching — stable definition prefix → free KV cache reuse

const _refKey = (n) => "R" + String(n).padStart(2, "0");

// pushDelta: encode rawText into a Delta, update state.dictMap, return Delta object
const pushDelta = (state, rawText) => {
  const ops = [];
  const dictEntries = Object.entries(state.dictMap);
  let remaining = rawText;
  // Pass 1: replace known dict values with [REF:Rxx] references
  for (const [key, val] of dictEntries) {
    const idx = remaining.indexOf(val);
    if (idx !== -1) {
      if (idx > 0) ops.push({ type: "text", val: remaining.slice(0, idx) });
      ops.push({ type: "ref", val: key });
      remaining = remaining.slice(idx + val.length);
    }
  }
  if (remaining) ops.push({ type: "text", val: remaining });
  // Pass 2: promote long inline text ops to new [DEF:Rxx] entries
  const newDict = {};
  const finalOps = [];
  for (const op of ops) {
    if (op.type === "text" && op.val.length >= (state.dedupThreshold ?? DEDUP_THRESHOLD)) {
      const rk = _refKey(state.nextRefId++);
      newDict[rk] = op.val;
      state.dictMap[rk] = op.val;
      finalOps.push({ type: "ref", val: rk });
    } else {
      finalOps.push(op);
    }
  }
  const rawLen = rawText.length;
  const encLen = finalOps.reduce((a, o) =>
    a + (o.type === "ref" ? o.val.length + 7 : o.val.length), 0)
    + Object.entries(newDict).reduce((a, [k, v]) =>
      a + k.length + v.length + 10, 0);
  const delta = { seq: state.deltas.length, ts: iso(), dict: newDict, ops: finalOps, rawLen, encLen };
  state.deltas = [...state.deltas, delta];
  const totalRaw = state.deltas.reduce((a, d) => a + (d.rawLen || 0), 0);
  const totalEnc = state.deltas.reduce((a, d) => a + (d.encLen || 0), 0);
  state.compressionRatio = totalRaw > 0 ? Math.round((1 - totalEnc / totalRaw) * 100) : 0;
  return delta;
};

// buildContext: assemble prefix-safe context string from all deltas
const buildContext = (state, maxChars = 120000) => {
  const defs = [];
  for (const [k, v] of Object.entries(state.dictMap))
    defs.push(`[DEF:${k}]="${v}"`);
  const prefix = defs.join(" ");
  state.prefixLen = prefix.length;
  const parts = prefix ? [prefix] : [];
  let used = prefix.length;
  for (const delta of state.deltas) {
    for (const op of delta.ops) {
      const tok = op.type === "ref" ? `[REF:${op.val}]` : op.val;
      if (used + tok.length > maxChars) break;
      parts.push(tok);
      used += tok.length;
    }
  }
  return parts.join("");
};

// ── VCW Shard (Crystal v1.0) ─────────────────────────────────────
// RGBA PNG image memory — SHARD_SIDE_DEFAULT² pixels, sequential linear layout
// RGB channels = payload data (3 bytes/pixel), Alpha = CRC-8/MAXIM error detection
// Badge: first SHARD_BADGE_PIXELS pixels unencrypted (magic, geometry, agent hash)

const _crc8 = (r, g, b) => {
  let crc = 0x00;
  for (const byte of [r, g, b]) {
    crc ^= byte;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x31) & 0xFF : (crc << 1) & 0xFF;
  }
  return crc;
};

const _ensurePixelBuffer = (state) => {
  if (!state.pixelBuffer) {
    const total = state.pngSide * state.pngSide * 4;
    state.pixelBuffer = new Array(total).fill(0);
    // Write badge pixel 0: magic 'VCW' + version 0x06 (Mantle OS)
    state.pixelBuffer[0] = 0x56; state.pixelBuffer[1] = 0x43;
    state.pixelBuffer[2] = 0x57; state.pixelBuffer[3] = 0x06; // Mantle OS single-purpose-shard generation
    // Badge pixels 1-63: mark with A=0xFF
    for (let i = 1; i < SHARD_BADGE_PIXELS; i++) state.pixelBuffer[i * 4 + 3] = 0xFF;
  }
};

const writeDeltaToShard = (state, delta) => {
  // §Delta normalization — callers pass ops as a canonical [{val}] array, a
  // plain string, or omit it in favor of `content`. The pre-fix code crashed
  // on the string shape ("delta.ops.map is not a function"): every semantic
  // memory write from the MIND (reflexAppendToShard, reflexCreateCrystal,
  // GRAFT annotations) died there while Stage-1 stayed green. Normalize here,
  // at the single choke point, so no caller shape can break the scribe again.
  if (typeof delta.ops === "string") delta = { ...delta, ops: [{ type: "text", val: delta.ops }] };
  else if (!Array.isArray(delta.ops)) delta = { ...delta, ops: [{ type: "text", val: String(delta.content ?? "") }] };
  _ensurePixelBuffer(state);
  const side = state.pngSide;
  const totalPixels = side * side;
  const usable = totalPixels - SHARD_BADGE_PIXELS;
  // Encode delta text as bytes
  const text = delta.ops.map((o) => o.val).join("");
  const bytes = new TextEncoder().encode(text);
  const pixelsNeeded = 1 + Math.ceil(bytes.length / 3); // header + payload pixels
  // Body-managed overflow fires at OVERFLOW_THRESHOLD (0.75) — HF-B18
  if ((state.pixelFill + pixelsNeeded) / usable > OVERFLOW_THRESHOLD) {
    const newSide = side * 2;
    const newBuf = new Array(newSide * newSide * 4).fill(0);
    // Copy existing pixels linearly
    for (let i = 0; i < state.pixelBuffer.length; i++) newBuf[i] = state.pixelBuffer[i];
    state.pixelBuffer = newBuf;
    state.pngSide = newSide;
  }
  const basePixel = SHARD_BADGE_PIXELS + state.pixelFill;
  // Header pixel: A=0xFF marks block start
  const hp = basePixel * 4;
  state.pixelBuffer[hp] = 0xBD; state.pixelBuffer[hp + 1] = 0xC3;
  state.pixelBuffer[hp + 2] = 0xFF; state.pixelBuffer[hp + 3] = 0xFF;
  state.pixelFill++;
  // Payload pixels: RGB = data bytes, A = CRC-8
  let pixelCount = 1;
  for (let i = 0; i < bytes.length; i += 3) {
    const pp = (basePixel + pixelCount) * 4;
    const r = bytes[i] || 0, g = bytes[i + 1] || 0, b = bytes[i + 2] || 0;
    state.pixelBuffer[pp] = r; state.pixelBuffer[pp + 1] = g;
    state.pixelBuffer[pp + 2] = b; state.pixelBuffer[pp + 3] = _crc8(r, g, b);
    state.pixelFill++;
    pixelCount++;
  }
  // Single-purpose-per-shard (Mantle OS §1.4, HF-B16): no zone routing.
  // Each shard has one purposeId declared in its Purpose Manifest.
  // The block records purposeId from state; no classify(delta) dispatcher.
  const block = {
    seq: state.pixelBlocks.length,
    pixelStart: basePixel,
    pixelEnd: basePixel + pixelCount - 1,
    quarantined: false,
    ts: delta.ts,
    deltaSeq: delta.seq,
    purposeId: state.purposeId || "events.vcw", // default to events shard
  };
  state.pixelBlocks = [...state.pixelBlocks, block];
  const newSide = state.pngSide;
  state.cap = (state.pixelFill / (newSide * newSide - SHARD_BADGE_PIXELS)) * 100;
  return block;
};

const verifyPixelCRC = (state, startPixel, endPixel) => {
  if (!state.pixelBuffer) return [];
  const start = startPixel ?? SHARD_BADGE_PIXELS;
  const end = endPixel ?? (SHARD_BADGE_PIXELS + state.pixelFill - 1);
  const corrupted = [];
  for (let i = start; i <= end; i++) {
    const bp = i * 4;
    const r = state.pixelBuffer[bp], g = state.pixelBuffer[bp + 1];
    const b = state.pixelBuffer[bp + 2], a = state.pixelBuffer[bp + 3];
    if (a === 0xFF) continue; // header or badge pixel — skip CRC check
    if (_crc8(r, g, b) !== a) corrupted.push(i);
  }
  return corrupted;
};

// ── MRI Immune System (Crystal v1.0) ──────────────────────────
// CRC pre-scan (O(n)) + 2D FFT row-band scan
// Detects Hofstadter Cross patterns (periodic structures) without parsing content
// Quarantine: marks pixel range of block as quarantined

const _dft1d = (arr) => {
  const N = arr.length;
  return Array.from({ length: N }, (_, k) => {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const a = (2 * Math.PI * k * n) / N;
      re += arr[n] * Math.cos(a);
      im -= arr[n] * Math.sin(a);
    }
    return Math.sqrt(re * re + im * im);
  });
};

const scanChromatophoreBand = (state, rowStart, rowEnd) => {
  if (!state.pixelBuffer) return null;
  // First: CRC pre-scan on this band
  const side = state.pngSide;
  const bandStartPixel = rowStart * side;
  const bandEndPixel = Math.min((rowEnd + 1) * side - 1, SHARD_BADGE_PIXELS + state.pixelFill - 1);
  const crcErrors = verifyPixelCRC(state, Math.max(bandStartPixel, SHARD_BADGE_PIXELS), bandEndPixel).length;
  // Then: 2D FFT on row luminance
  const SAMPLE = Math.min(16, side);
  const xRow = [], yCol = [];
  for (let x = 0; x < SAMPLE; x++) {
    const pp = (rowStart * side + x) * 4;
    const r = state.pixelBuffer[pp] || 0, g = state.pixelBuffer[pp + 1] || 0, b = state.pixelBuffer[pp + 2] || 0;
    xRow.push((r + g + b) / 3);
  }
  for (let row = rowStart; row < Math.min(rowStart + SAMPLE, rowEnd + 1); row++) {
    const pp = (row * side) * 4;
    const r = state.pixelBuffer[pp] || 0, g = state.pixelBuffer[pp + 1] || 0, b = state.pixelBuffer[pp + 2] || 0;
    yCol.push((r + g + b) / 3);
  }
  const xPow = _dft1d(xRow), yPow = _dft1d(yCol);
  const maxX = Math.max(...xPow.slice(1)), maxY = Math.max(...yPow.slice(1));
  const maxAxisPower = Math.max(maxX, maxY);
  const allPow = [...xPow, ...yPow];
  const mean = allPow.reduce((a, b) => a + b, 0) / allPow.length;
  const variance = allPow.reduce((a, b) => a + (b - mean) ** 2, 0) / allPow.length;
  const THRESHOLD = 50;
  const anomalyDetected = (maxX > THRESHOLD && maxY > THRESHOLD) || crcErrors > 0;
  return {
    rowStart, rowEnd, anomalyDetected,
    anomalyType: anomalyDetected ? (crcErrors > 0 ? "CRC-Error" : maxX > maxY ? "Hofstadter-X" : "Hofstadter-Y") : null,
    variance, maxAxisPower, crcErrors, ts: iso(),
  };
};

const scanAll = (state, stride = 64) => {
  const results = [];
  const side = state.pngSide;
  const maxRow = Math.min(side, Math.ceil((SHARD_BADGE_PIXELS + state.pixelFill) / side) + 1);
  for (let row = 0; row < maxRow; row += stride) {
    const result = scanChromatophoreBand(state, row, Math.min(row + stride - 1, maxRow - 1));
    if (result) results.push(result);
  }
  state.immuneLogs = [...state.immuneLogs, ...results].slice(-100);
  state.lastImmuneScan = iso();
  return results;
};

const quarantineBlock = (state, block) => {
  block.quarantined = true;
  state.quarantineZone = [...state.quarantineZone, block.seq];
  state.immuneLogs = [
    ...state.immuneLogs,
    { rowStart: 0, rowEnd: 0, anomalyDetected: true, anomalyType: "Quarantine",
      variance: 0, maxAxisPower: 0, crcErrors: 0, ts: iso(), quarantinedBlock: block.seq,
      pixelStart: block.pixelStart, pixelEnd: block.pixelEnd }
  ].slice(-100);
};

// ── storage abstraction ────────────────────────────────────────
const _st = (() => {
  const w = window;
  if (w['storage'] && typeof w['storage'].set === "function")
    return w['storage'];
  const ls = typeof localStorage !== "undefined" ? localStorage : null;
  return {
    set: async (k, v) => {
      try {
        ls?.setItem(k, v);
      } catch {}
    },
    get: async (k) => {
      try {
        const v = ls?.getItem(k);
        return v != null ? { value: v } : null;
      } catch {
        return null;
      }
    },
  };
})();

// Module-level pending critical buffer — drained into VCW as SYS.CRITICAL
// by the next heartbeat. This is the last-resort path for failures that
// occur *during* VCW persistence itself (where app()/tap() may not be
// reachable). VCW Axiom compliance: nothing escapes to a bare console.
const _pendingCriticals = [];
const logCritical = (where, err) => {
  const msg =
    String(where) +
    ": " +
    (err && (err.message || err.toString ? err.toString() : "unknown"));
  _pendingCriticals.push({ ts: new Date().toISOString(), msg });
  // Preserve dev visibility; this is the ONLY permitted console.error
  // in the Mantle because it follows a VCW enqueue.
  console.error(msg);
};

const saveCrystalBlob = async (name, payload) => {
  try {
    // Crystal v1.0: hash each delta for integrity verification on load
    const h = {};
    for (const d of payload.deltas || [])
      h["d" + d.seq] = await h256(String(d.seq) + d.ts + JSON.stringify(d.ops));
    // Legacy: also hash vcwEntries for backward compat
    for (const e of payload.vcwEntries || [])
      h[e.id] = await h256(e.id + e.actor + e.opcode + e.payload);
    const blob = {
      ...payload, h, savedAt: iso(),
      crystalFormat: VCW_FORMAT, genesisVersion: GENESIS_VERSION,
    };
    await _st.set(CRYSTAL_PREFIX + name, await enc(blob, SK));
    // Backup under separate key for partial corruption isolation
    try {
      await _st.set(
        CRYSTAL_PREFIX + name + ":backup",
        await enc(
          {
            deltas: payload.deltas,
            pixelBlocks: payload.pixelBlocks,
            pixelFill: payload.pixelFill,
            pngSide: payload.pngSide,
            dedupThreshold: payload.dedupThreshold,
            dictMap: payload.dictMap,
            vcwEntries: payload.vcwEntries,
            somaticForm: payload.somaticForm,
            customInstructions: payload.customInstructions,
            nextId: payload.nextId,
            savedAt: iso(),
          },
          SK + "bk"
        )
      );
    } catch {}
  } catch (e) {
    logCritical("Crystal save failed", e);
  }
};

const loadCrystalBlob = async (name) => {
  // Try primary, then backup
  for (const suffix of ["", ":backup"]) {
    try {
      const raw = await _st.get(CRYSTAL_PREFIX + name + suffix);
      if (!raw?.value) continue;
      const decKey = suffix ? SK + "bk" : SK;
      const loaded = await dec(raw.value, decKey);
      // Crystal v1.0: accept either deltas or vcwEntries as valid crystal
      if (loaded && (loaded.vcwEntries || loaded.deltas))
        return { data: loaded, source: suffix ? "backup" : "primary" };
    } catch {
      continue;
    }
  }
  return null;
};

// §1.7.2 Hash verification on load — recompute and compare stored hashes (Crystal v1.0)
const verifyCrystalIntegrity = async (data) => {
  const bad = [];
  if (!data?.h) return { valid: true, quarantined: [] };
  // Crystal v1.0: verify delta hashes
  for (const d of data.deltas || []) {
    const k = "d" + d.seq;
    if (!data.h[k]) continue;
    const computed = await h256(String(d.seq) + d.ts + JSON.stringify(d.ops));
    if (computed !== data.h[k]) { bad.push(k); d.quarantined = true; }
  }
  // Legacy: verify vcwEntries hashes for backward compat
  for (const e of data.vcwEntries || []) {
    if (!data.h[e.id]) continue;
    const computed = await h256(e.id + e.actor + e.opcode + e.payload);
    if (computed !== data.h[e.id]) {
      bad.push(e.id);
      e.meta = { ...(e.meta || {}), quarantined: true, quarantineReason: "Hash mismatch on load", quarantinedAt: iso() };
      e.weight = 0.0;
    }
  }
  return { valid: bad.length === 0, quarantined: bad };
};

// Search all crystals in the array for entries matching a query
const searchCrystals = async (
  query,
  filter = "all"
) => {
  const manifest = await loadManifest();
  if (!manifest) return [];
  const results = [];
  const q = query.toLowerCase();
  for (const cm of manifest.crystals) {
    if (filter === "ancestors" && cm.type === "arm") continue;
    if (filter === "arms" && cm.type !== "arm") continue;
    if (cm.status === "active") continue; // don't search current crystal — it's in memory
    const loaded = await loadCrystalBlob(cm.name);
    if (!loaded?.data) continue;
    // Crystal v1.0: search both delta ops and legacy vcwEntries
    const legacyEntries = loaded.data.vcwEntries || [];
    const deltaEntries = (loaded.data.deltas || []).map((d, i) => ({
      id: "d" + i,
      opcode: "DELTA." + i,
      payload: d.ops.map(o => o.val).join(""),
      timestamp: d.ts,
      actor: "SYSTEM",
    }));
    const allEntries = [...legacyEntries, ...deltaEntries];
    if (!allEntries.length) continue;
    for (const e of allEntries) {
      if (
        String(e.payload || "")
          .toLowerCase()
          .includes(q) ||
        String(e.opcode || "")
          .toLowerCase()
          .includes(q)
      ) {
        results.push({
          crystalName: cm.name,
          crystalType: cm.type,
          generation: cm.generation,
          entry: {
            id: e.id,
            opcode: e.opcode,
            payload: tr(e.payload, 200),
            timestamp: e.timestamp,
            actor: e.actor,
          },
        });
      }
    }
  }
  return results;
};

/** API key storage — keys stored in memory only (never persisted to VCW) */
const API_KEYS = {};
const callAPI = async (
  msgs,
  tools,
  gc,
  forceTools = false,
  targetModel = null,
  onChunk = null,
  overrideKey = null,   // per-arm API key — bypasses API_KEYS[p.id] when set
  temperature = 1.0            // sampling temperature — 1.0 is most providers' recommended default
) => {
  // §2.7 Cascade: if targetModel specified, try that provider first; otherwise iterate all usable
  // Prefer providers with configured API keys first (so entering a Grok key actually switches models),
  // then fall back to any `live:true` providers.
  const keysFirst = [...PROVIDERS].sort((a, b) => {
    const ak = !!API_KEYS[a.id],
      bk = !!API_KEYS[b.id];
    if (ak !== bk) return Number(bk) - Number(ak);
    if (a.live !== b.live) return Number(b.live) - Number(a.live);
    return 0;
  });

  // If a specific model is requested, put its provider first.
  let providerOrder = keysFirst;
  if (targetModel) {
    const targetProvider = PROVIDERS.find((p) => p.models[targetModel]);
    if (targetProvider)
      providerOrder = [
        targetProvider,
        ...keysFirst.filter((p) => p !== targetProvider),
      ];
  }

  // Convert Anthropic-style message objects (with tool_use/tool_result blocks) into
  // OpenAI-compatible chat.completions messages (used by xAI / Grok).
  const toOpenAIMessages = (anthropicMsgs: any[], systemText: any) => {
    const out: any[] = [];
    if (systemText) out.push({ role: "system", content: String(systemText) });
    for (const m of (anthropicMsgs || [])) {
      if (typeof m?.content === "string") {
        out.push({
          role: m.role === "assistant" ? "assistant" : "user",
          content: m.content,
        });
        continue;
      }
      if (Array.isArray(m?.content)) {
        // tool_result comes back as a user message containing a tool_result block
        const tr = m.content.find((x) => x?.type === "tool_result");
        if (tr) {
          out.push({
            role: "tool",
            tool_call_id: tr.tool_use_id,
            content: String(tr.content || ""),
          });
          continue;
        }
        // assistant content may include text + tool_use blocks
        const textParts: string[] = [];
        const toolCalls: any[] = [];
        for (const b of Array.from(m.content || [])) {
          if (b?.type === "text" && b.text) textParts.push(b.text);
          if (b?.type === "tool_use") {
            toolCalls.push({
              id: b.id,
              type: "function",
              function: {
                name: b.name,
                arguments: JSON.stringify(b.input || {}),
              },
            });
          }
        }
        const msg: any = {
          role: "assistant",
          content: textParts.join("\n\n") || "",
        };
        if (toolCalls.length) msg.tool_calls = toolCalls;
        out.push(msg);
      }
    }
    return out;
  };

  for (const p of providerOrder) {
    const hasKey = !!API_KEYS[p.id];
    if (!p.live && !hasKey) continue;

    const modelKeys =
      targetModel && p.models[targetModel]
        ? [targetModel]
        : Object.keys(p.models);

    for (const mk of modelKeys) {
      const mc = p.models[mk];
      try {
        // ── OpenRouter OpenAI-compatible chat.completions ───────
        if (p.id === "openrouter") {
          if (!hasKey)
            throw Object.assign(new Error("Missing OpenRouter API key"), {
              type: "auth_failure",
            });

          const normTools = p.normalizeSchemaTypes
            ? p.normalizeSchemaTypes(tools)
            : tools;
          const oaiTools = p.translateTools
            ? p.translateTools(normTools)
            : normTools.map((x) => ({
                type: "function",
                function: {
                  name: x.name,
                  description: x.description || x.name,
                  parameters: x.parameters,
                },
              }));
          const oaiMsgs = toOpenAIMessages(msgs, gc);

          const body: any = { model: mk, messages: oaiMsgs, max_tokens: 4096, temperature: Math.max(0, Math.min(2, temperature)) };
          if (mc.supportsTools && tools.length) {
            body.tools = oaiTools;
            body.tool_choice = "auto"; // Fix: Free models often fail with 400 on "required"
          }
          const scrubbed = p.scrubParams ? p.scrubParams(mk, body) : body;

          const url = "https://openrouter.ai/api/v1/chat/completions";
          const headers: Record<string, string> = {
            "Content-Type": "application/json",
            Authorization: "Bearer " + (overrideKey || API_KEYS[p.id] || ""),
            "HTTP-Referer": "https://appai.local",
            "X-OpenRouter-Title": "The Mantle",
          };

          if (onChunk) scrubbed.stream = true;
          const res = await fetch(url, {
            method: "POST",
            headers,
            body: JSON.stringify(scrubbed),
          });
          if (!res.ok) {
            const e = await res.json().catch(() => ({}));
            const msg = e.error?.message || e.message || "HTTP " + res.status;
            if (res.status === 401) throw Object.assign(new Error(msg), { type: "auth_failure" });
            if (res.status === 402) throw Object.assign(new Error(msg), { type: "balance" });
            if (res.status === 429) {
              const ra = parseInt(res.headers.get("retry-after") || "0", 10);
              if (ra > 0 && ra <= 30) {
                await new Promise((r) => setTimeout(r, ra * 1000));
                continue;
              }
              throw Object.assign(new Error(msg), { type: "rate_limit_daily" });
            }
            throw Object.assign(new Error(msg), { type: "server_error" });
          }

          if (onChunk) {
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            let toolCallsBuffer = {};
            let usage = null;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              const chunk = decoder.decode(value, { stream: true });
              const lines = chunk.split("\n").filter((l) => l.trim() !== "");
              for (const line of lines) {
                if (line.startsWith("data: ")) {
                  const dataStr = line.slice(6);
                  if (dataStr === "[DONE]") break;
                  try {
                    const d = JSON.parse(dataStr);
                    const delta = d.choices?.[0]?.delta || {};
                    if (delta.content) {
                      fullText += delta.content;
                      onChunk(fullText);
                    }
                    if (delta.tool_calls) {
                      for (const tc of delta.tool_calls) {
                        if (!toolCallsBuffer[tc.index]) toolCallsBuffer[tc.index] = { id: tc.id, name: tc.function?.name, arguments: "" };
                        if (tc.id) toolCallsBuffer[tc.index].id = tc.id;
                        if (tc.function?.name) toolCallsBuffer[tc.index].name = tc.function.name;
                        if (tc.function?.arguments) toolCallsBuffer[tc.index].arguments += tc.function.arguments;
                      }
                    }
                    if (d.usage) usage = d.usage;
                  } catch (e) {}
                }
              }
            }

            const parseArgs = (s) => {
              try { return JSON.parse(s); } catch {
                try { return JSON.parse(s.replace(/,\s*([}\]])/g, "$1").replace(/'/g, '"')); } catch { return { _raw: s }; }
              }
            };

            return {
              provider: p.id,
              model: mk,
              text: fullText,
              toolUses: Object.values(toolCallsBuffer).map((tc: any) => ({
                id: tc.id,
                name: tc.name,
                input: parseArgs(tc.arguments),
              })),
              totalTokens: usage ? (usage.total_tokens || usage.prompt_tokens + usage.completion_tokens) : 0,
              inputTokens: usage ? (usage.prompt_tokens || 0) : 0,
              outputTokens: usage ? (usage.completion_tokens || 0) : 0,
            };
          }

          const d = await res.json();
          const ch = d.choices?.[0] || {};
          const msg = ch.message || {};
          let finishReason = ch.finish_reason;
          let text = Array.isArray(msg.content)
            ? msg.content.filter((b) => b?.type === "text").map((b) => b.text || "").join("")
            : (msg.content || msg.reasoning_content || ""); // reasoning_content fallback for thinking models (deepseek-r1)
          const parseArgs = (a) => {
            if (a == null) return {};
            if (typeof a === "object") return a;
            const s = String(a);
            try { return JSON.parse(s); } catch {}
            try { return JSON.parse(s.replace(/,\s*([}\]])/g, "$1").replace(/'/g, '"')); } catch {}
            return { _raw: s };
          };
          const grokUsage = d.usage || {};
          let toolUses = (msg.tool_calls || []).map((tc) => ({
            id: tc.id,
            name: tc?.function?.name,
            input: parseArgs(tc?.function?.arguments),
          }));
          let providerDiagnostic: any = null;
          if (!String(text || "").trim() && !toolUses.length) {
            providerDiagnostic = {
              emptyResponse: true,
              retried: true,
              finishReason,
              messageShape: Object.keys(msg || {}),
            };
            const retryBody = {
              ...scrubbed,
              messages: [
                ...(scrubbed.messages || []),
                {
                  role: "user",
                  content:
                    "Your previous response had no readable final content. Return a concise visible answer or a valid tool call now. Do not expose private reasoning.",
                },
              ],
            };
            const retryRes = await fetch(url, {
              method: "POST",
              headers,
              body: JSON.stringify(retryBody),
            });
            if (retryRes.ok) {
              const retryJson = await retryRes.json();
              const retryChoice = retryJson.choices?.[0] || {};
              const retryMsg = retryChoice.message || {};
              finishReason = retryChoice.finish_reason || finishReason;
              text = Array.isArray(retryMsg.content)
                ? retryMsg.content.filter((b) => b?.type === "text").map((b) => b.text || "").join("")
                : (retryMsg.content || retryMsg.reasoning_content || "");
              toolUses = (retryMsg.tool_calls || []).map((tc) => ({
                id: tc.id,
                name: tc?.function?.name,
                input: parseArgs(tc?.function?.arguments),
              }));
              providerDiagnostic.retryFinishReason = finishReason;
              providerDiagnostic.retryMessageShape = Object.keys(retryMsg || {});
            }
            if (!String(text || "").trim() && !toolUses.length) {
              text = "[Provider returned no readable final content after one retry. Diagnostic logged in MODEL.REQUEST; no private reasoning was exposed.]";
            }
          }
          return {
            provider: p.id,
            model: mk,
            text,
            toolUses,
            stop: finishReason,
            providerDiagnostic,
            totalTokens: grokUsage.total_tokens || (grokUsage.prompt_tokens || 0) + (grokUsage.completion_tokens || 0),
            inputTokens: grokUsage.prompt_tokens || 0,
            outputTokens: grokUsage.completion_tokens || 0,
          };
        }

        // Unknown provider type: skip
        throw Object.assign(new Error("Unsupported provider: " + p.id), {
          type: "unsupported",
        });
      } catch (err) {
        if (err.type === "auth_failure" || err.type === "balance") throw err;
        if (modelKeys.indexOf(mk) < modelKeys.length - 1) continue;
        if (providerOrder.indexOf(p) === providerOrder.length - 1) throw err;
        break;
      }
    }
  }
  throw Object.assign(new Error("All providers exhausted"), {
    type: "exhausted",
  });
};

// v5.1 armPromptViewVCW: strip arm-irrelevant metadata when building the VCW
// block for an arm's prompt. Arms see clean "[N] opcode: payload" lines — the
// underlying tVCWs[sid] retains full fidelity and the Mantle still sees it all
// through reflexReadArmVCW.
const armPromptViewVCW = (entries) =>
  entries.map((e, i) => {
    const op = e?.opcode || e?.op || "?";
    const raw = e?.payload;
    const pay = typeof raw === "string" ? raw : JSON.stringify(raw ?? "");
    return "[" + i + "] " + op + ": " + (pay.length > 400 ? pay.slice(0, 400) + "…" : pay);
  }).join("\n");
const buildCtx = (entries, sf, trigger, gc, ci = null, threshold = DEDUP_THRESHOLD, armView = false, quarantineZone: any[] = []) => {
  // §1.7 / §2.3 Context Assembly — Primer (system param) → Immunity → Custom Instructions → Somatic Form → VCW → Trigger
  // Implements Part 1 §1.7 Steps 1 (body entries via GC), 4 (Veil via HIDE), 7 (secondary contamination scan below).
  // GC is passed as system param in callAPI — NOT injected into messages array
  const msgs: any[] = [];
  // §1.7 Step 7 — Secondary scan: cross-crystal contamination guard (HF-B19).
  // Filter out any entry whose id or refId matches a quarantined block sequence.
  // This prevents quarantined blocks from resurfacing via reference in the assembled context.
  const qSet = new Set((quarantineZone || []).map(String));
  const cleanEntries: any[] = qSet.size > 0
    ? entries.filter((e: any) => !qSet.has(String(e.id)) && !qSet.has(String(e.refId)))
    : entries;
  const contaminated = entries.length - cleanEntries.length;
  // Step 1: Immunity — quarantined/deprecated entries
  const dep = cleanEntries
    .filter((e: any) => e.weight < 1 || e.meta?.quarantined)
    .map((e: any) => e.id);
  if (dep.length || contaminated > 0)
    msgs.push({
      role: "user",
      content: "SYSTEM DIRECTIVE: Ignore deprecated IDs: " + dep.join(",") +
        (contaminated > 0 ? " | Secondary scan stripped " + contaminated + " quarantine-contaminated block(s)." : ""),
    });
  // Step 2: Custom Instructions — operational rules, function bindings, few-shot priming
  if (ci) {
    const _ci = ci;
    // Inject operational rules
    if (_ci.operationalRules?.length)
      msgs.push({
        role: "user",
        content:
          "[INSTRUCTIONS]\nOperational Rules:\n" +
          _ci.operationalRules
            .map((r: any, i: number) => i + 1 + ". " + r)
            .join("\n"),
      });
    // Inject function bindings summary
    const bindKeys = Object.keys(_ci.functionBindings || {});
    const custKeys = Object.keys(_ci.customFunctions || {});
    if (bindKeys.length || custKeys.length)
      msgs.push({
        role: "user",
        content:
          "[INSTRUCTIONS]\nFunction Bindings (deterministic, work without MIND via reflexExecBinding):\n" +
          bindKeys
            .map(
              (k) => "- " + k + ": " + JSON.stringify(_ci.functionBindings[k])
            )
            .join("\n") +
          (custKeys.length
            ? "\nCustom functions:\n" +
              custKeys
                .map(
                  (k) =>
                    "- " +
                    k +
                    ": " +
                    (_ci.customFunctions[k]?.description || "no desc")
                )
                .join("\n")
            : ""),
      });
    // Inject pending immune overrides for MIND awareness
    const pending = (_ci.immuneOverrides || []).filter(
      (o: any) => o.status === "pending"
    );
    if (pending.length)
      msgs.push({
        role: "user",
        content:
          "[IMMUNE:pending]\n" +
          pending
            .map(
              (o: any) =>
                "Entry " +
                o.entryId +
                ": " +
                o.reason +
                " (pending — will apply next cycle)"
            )
            .join("\n"),
      });
    // Few-shot priming — synthetic tool exchange so model sees tool_use pattern in its own history
    if (_ci.fewShot?.length) {
      let fsAb: any = null;
      const fsFl = () => {
        if (fsAb) {
          msgs.push(fsAb);
          fsAb = null;
        }
      };
      let fsIdx = 0;
      for (const fs of _ci.fewShot) {
        if (fs.role === "user") {
          fsFl();
          msgs.push({ role: "user", content: fs.content });
        } else if (fs.role === "assistant_text") {
          if (!fsAb) fsAb = { role: "assistant", content: [] };
          fsAb.content.push({ type: "text", text: fs.content });
        } else if (fs.role === "assistant_call") {
          if (!fsAb)
            fsAb = {
              role: "assistant",
              content: [{ type: "text", text: "Initializing..." }],
            };
          const tid = "toolu_boot_" + String(fsIdx++).padStart(4, "0");
          fsAb.content.push({
            type: "tool_use",
            id: tid,
            name: fs.name,
            input: fs.input || {},
          });
          fsFl();
          /* tool_result must follow immediately */ const nextFs =
            _ci.fewShot[_ci.fewShot.indexOf(fs) + 1];
          if (nextFs?.role === "tool_result")
            msgs.push({
              role: "user",
              content: [
                {
                  type: "tool_result",
                  tool_use_id: tid,
                  content: nextFs.content,
                },
              ],
            });
        } else if (fs.role === "tool_result") {
          /* handled above with assistant_call */
        }
      }
      fsFl();
    }
  }
  // Step 3: Somatic Form — polymorphic body only; skip for fixed body or arm contexts (sf = null)
  if (sf != null) {
    msgs.push({
      role: "user",
      content:
        "[INSTRUCTIONS:somatic]\n" +
        JSON.stringify(sf),
    });
  }
  // Step 4: VCW entries — CompactVCW compression
  // Historical (system/heartbeat/IO/somatic) → single CompactVCW compressed block
  // Conversational (USER.INPUT, BRAIN.THOUGHT, BRN.CALL, RFL.RESULT) → proper messages
  const CONV_OPS = new Set(["BRAIN.THOUGHT", "BRN.CALL", "RFL.RESULT", "USER.INPUT"]);
  const SKIP_OPS = new Set(["BRAIN.RESPONSE", "BRAIN.DECISION"]);
  const histEntries: any[] = [];
  const convSeq: any[] = [];
  for (const e of entries) {
    if (SKIP_OPS.has(e.opcode)) continue;
    if (CONV_OPS.has(e.opcode)) convSeq.push(e);
    else histEntries.push(e);
  }
  // Emit compressed history as a single user message block.
  // v5.1: for arms (armView=true), use the clean armPromptViewVCW format — arms
  // don't need CompactVCW's aged/immune tiering and don't benefit from metadata.
  if (histEntries.length) {
    if (armView) {
      msgs.push({
        role: "user",
        content: "[VCW]\n" + armPromptViewVCW(histEntries),
      });
    } else {
      const { immune, main } = PromptAssembler._split(histEntries);
      const immuneText = immune.length
        ? CompactVCW.toWire(immune, threshold).replace("[VCW:", "[IMMUNE:")
        : "[IMMUNE:v4|n:0|r:0]";
      const vcwText = CompactVCW.toWire(main, threshold);
      msgs.push({ role: "user", content: immuneText + "\n\n" + vcwText });
    }
  }
  // Emit conversation messages with proper tool-use / tool-result formatting
  const tracked = new Set();
  let ab = null;
  const tsMap = {};
  for (const e of convSeq) tsMap[e.id] = e.timestamp || "";
  const mkTid = (id) =>
    "toolu_" + (tsMap[id] || "").replace(/\D/g, "").slice(0, 14) + "_" + id;
  const fl = () => {
    if (ab) {
      msgs.push(ab);
      ab = null;
    }
  };
  for (const e of convSeq) {
    if (e.opcode === "BRAIN.THOUGHT") {
      if (!ab) ab = { role: "assistant", content: [] };
      ab.content.push({ type: "text", text: e.payload });
    } else if (e.opcode === "BRN.CALL") {
      if (!ab)
        ab = {
          role: "assistant",
          content: [{ type: "text", text: "Thinking..." }],
        };
      try {
        const d = JSON.parse(e.payload);
        ab.content.push({
          type: "tool_use",
          id: mkTid(e.id),
          name: d.name,
          input: d.input || {},
        });
        tracked.add(e.id);
      } catch {}
    } else if (e.opcode === "RFL.RESULT" && e.refId && tracked.has(e.refId)) {
      fl();
      msgs.push({
        role: "user",
        content: [
          {
            type: "tool_result",
            tool_use_id: mkTid(e.refId),
            content: String(e.payload || ""),
          },
        ],
      });
    } else if (e.opcode === "USER.INPUT") {
      fl();
      msgs.push({ role: "user", content: e.payload });
    }
  }
  // Step 5: Trigger
  fl();
  msgs.push({ role: "user", content: trigger });
  // merge consecutive same-role string msgs
  return msgs.reduce((a: any[], m: any) => {
    const p = a[a.length - 1];
    if (
      p &&
      p.role === m.role &&
      typeof p.content === "string" &&
      typeof m.content === "string"
    )
      p.content += "\n\n" + m.content;
    else a.push({ ...m });
    return a;
  }, []);
};

// ── CompactVCW Wire Format v4.0 (VCL v4.0) ─────────────────────
// §3.0 Deterministic VCW-to-text compressor for LLM API injection.
// Same entries → same text every time (critical for prompt cache exploitation).
// Implements AppAI VCL v4.0 spec (AppAI_VCL_v4.0.md).
const CompactVCW = (() => {
  const ACTOR_SYM = { USER:"U", BRAIN:"B", REFLEX:"X", SYSTEM:"S", HEARTBEAT:"H", DATA:"D" };
  const OPCODE_SYM = {
    "USER.INPUT":"UI","IO.BODY_FOCUS":"IF","IO.BODY_TOUCH":"IT","EDIT.COMMIT_ON_BLUR":"EB",
    "BRAIN.RESPONSE":"BR","BRAIN.THOUGHT":"BT",
    "BRN.CALL":"BC",
    "RFL.RESULT":"RR","RFL.FAIL":"RF",
    "SYS.BOOT":"SB","SYS.WISDOM":"SW","SYS.CORRECT":"SC",
    "SYS.CRITICAL":"SK","SYS.SUBCONSCIOUS":"SS",
    "SYS.BODY_MORPH":"XM","SYS.BODY_MORPH_PATCH":"XP",
    "SYS.BODY_MORPH_ROLLBACK":"XR","SYS.BODY_MORPH_FAIL":"XF",
    "SYS.SOMATIC_INIT":"SI","SYS.SOMATIC_VERIFY":"SV",
    "SYS.REBIRTH":"SZ","SYS.REBIRTH_COMPLETE":"SR",
    "SYS.AWAKEN":"SA","SYS.AWAKENING_START":"AW",
    "DISPATCH.INTENTION":"DI","DISPATCH.DELEGATED":"DD",
    "DISPATCH.NOTIFIED":"DN","DISPATCH.COMPLETED":"DC",
    "THOUGHT.NORMAL":"TN","THOUGHT.NULL":"TX","CONTRADICTION_OBSERVED":"CO",
    "BODY.PRIMER_LOAD":"BP","HB.COMPACT":"HQ",
    "SYS.KEY_UPDATE":"KU","SYS.MIND_RECONFIGURE":"MR","SYS.THEME_CHANGE":"TH",
    "SYS.RESOURCE":"RS","SYS.STARVATION":"RX",
    "IO.USERVIEW":"IU","IO.PROPRIOCEPTION":"IP",
    "HB.HEALTH":"HH","HB.CACHE":"HC","HB.VALIDATE":"HV","HB.IMMUNE":"HI",
    "HB.COMPILE":"HX","HB.CHECK":"HK","HB.MIND":"HM","HB.DREAM":"HD",
    "HB.OPTIMIZE":"HO","HB.PROMPT":"HP","HB.PLAN":"HL",
    "ARM.SPAWN":"TS","ARM.PULSE":"TP","ARM.DELIVER":"TY",
    "ARM.STASIS":"TZ","ARM.WAKE":"TW",
    "ARM.SEVER":"TD","ARM.PULSE_CHANGE":"TC","ARM.ERROR":"TE",
    "ARM.RECONFIGURE":"TR",
    "CONTENT.SAVE":"CS","CONTENT.ESSAY":"CE","CONTENT.CODE":"CC",
    "CONTENT.NOTE":"CN","CONTENT.DOC":"CD","CONTENT.LOG":"CL","CONTENT.DATA":"CA",
  };
  const DEDUP_MAX_REFS = 99;
  const AGED_MAX = 80;
  const PAYLOAD_KEYS = { name:"fn", input:"in", output:"out", result:"res", error:"err", status:"st", message:"msg" };

  // djb2 hash — must match spec for cross-language compatibility
  const _hash = (text) => {
    let h = 5381;
    for (let i = 0; i < text.length; i++)
      h = (((h << 5) + h) + text.charCodeAt(i)) >>> 0;
    return h.toString(16).padStart(8, "0");
  };

  const _tier = (entry) => {
    const w = entry.weight ?? 1.0;
    const meta = entry.meta || {};
    if (meta.immutable) return "immutable";
    const n = parseInt(entry.id || "999", 10);
    if (!isNaN(n) && n <= 1) return "immutable";
    if (w < 1.0) return "aged";
    return "active";
  };

  const _ts = (ts) => {
    if (!ts) return "";
    const t = ts.split("T");
    if (t.length < 2) return ts;
    return t[1].replace("Z","").split(".")[0];
  };

  const _compactPayload = (payload) => {
    if (typeof payload !== "string") return String(payload ?? "");
    try {
      const obj = JSON.parse(payload);
      if (!obj || typeof obj !== "object" || Array.isArray(obj)) return payload;
      const out = {};
      for (const [k, v] of Object.entries(obj)) {
        const nk = PAYLOAD_KEYS[k] || k;
        out[nk] = (typeof v === "number" && v === Math.floor(v)) ? Math.floor(v) : v;
      }
      // sort_keys for determinism
      const sorted = {};
      for (const k of Object.keys(out).sort()) sorted[k] = out[k];
      return JSON.stringify(sorted);
    } catch { return payload; }
  };

  const _buildDedup = (entries, threshold) => {
    const cands = {};
    for (const e of entries) {
      const snap = e.meta?.stateSnapshot;
      if (snap) {
        const s = JSON.stringify(snap);
        if (s.length >= threshold) {
          const h = _hash(s);
          cands[h] = cands[h] || { text: s, count: 0 };
          cands[h].count++;
        }
      }
    }
    let n = 1;
    const idx = {};
    for (const [h, info] of Object.entries(cands)) {
      if (info.count >= 2 && n <= DEDUP_MAX_REFS) {
        idx[h] = { ref: "R" + String(n).padStart(2,"0"), text: info.text, defined: false };
        n++;
      }
    }
    return idx;
  };

  const _dedup = (text, idx, threshold) => {
    if (text.length < threshold) return text;
    const h = _hash(text);
    if (!idx[h]) return text;
    const entry = idx[h];
    if (!entry.defined) { entry.defined = true; return `[DEF:${entry.ref}]${text}[/DEF]`; }
    return `[REF:${entry.ref}]`;
  };

  const _encode = (entry, idx, threshold) => {
    const tier = _tier(entry);
    const eid  = entry.id || "000";
    const actor = entry.actor || "SYSTEM";
    const opcode = entry.opcode || "SYS.INIT";
    const payload = entry.payload || "";
    const weight = entry.weight ?? 1.0;
    const refId = entry.refId;
    const ts = entry.timestamp || "";
    const meta = entry.meta || {};
    const aS = ACTOR_SYM[actor] || actor[0] || "?";
    const oS = OPCODE_SYM[opcode] || opcode;

    if (tier === "immutable") {
      const p = _dedup(_compactPayload(payload), idx, threshold);
      return `!${eid}|${aS}${oS}|${_ts(ts)}|${p}`;
    }
    if (tier === "aged") {
      const p = String(payload);
      return `~${eid}|${aS}${oS}|${p}` + (weight !== 0 ? `|w:${weight}` : "");
    }
    // active
    let p = _compactPayload(payload);
    const snap = meta.stateSnapshot;
    if (snap) {
      const ss = _dedup(JSON.stringify(snap), idx, threshold);
      p = p ? `${ss} ${p}` : ss;
    }
    p = _dedup(p, idx, threshold);
    let line = `@${eid}|${aS}${oS}|${_ts(ts)}|${p}`;
    if (refId) line += `|r:${refId}`;
    if (weight !== 1.0) line += `|w:${weight}`;
    if (meta.generation != null) line += `|g:${meta.generation}`;
    if (meta.type && meta.type !== "conversation") line += `|t:${meta.type}`;
    if (meta.durationMs != null) line += `|+${meta.durationMs}ms`;
    return line;
  };

  return {
    // Encode VCW entries to CompactVCW wire format.
    // DETERMINISTIC: same entries → same output → prompt cache hit.
    // threshold: dedup min chars (default DEDUP_THRESHOLD, configurable per-agent via state.dedupThreshold)
    toWire: (entries, threshold = DEDUP_THRESHOLD) => {
      if (!entries || !entries.length) return "[VCW:v4|n:0|r:0]";
      const t = Math.max(DEDUP_THRESHOLD_MIN, Math.min(DEDUP_THRESHOLD_MAX, threshold));
      const idx = _buildDedup(entries, t);
      const lines = entries.map((e) => {
        try { return _encode(e, idx, t); }
        catch { return `@${e.id || "???"}|S??|ERR|encoding_error`; }
      });
      const refCount = Object.values(idx).filter((v) => v.defined).length;
      return `[VCW:v4|n:${entries.length}|r:${refCount}]\n` + lines.join("\n");
    },
  };
})();

// ── PromptAssembler ────────────────────────────────────────────
// §3.1 Assembles the full API system context in 5 labeled sections:
// [PRIMER] → [COMMANDS] → [IMMUNE:n] → [INSTRUCTIONS] → [VCW:v4|n:X|r:Y]
// [IMMUNE] is always emitted even when empty — keeps [VCW] at a stable
// byte offset for prompt cache exploitation.
const PromptAssembler = {
  _split: (entries) => {
    const IMMUNE_OPS = new Set(["HB.IMMUNE", "SYS.CORRECT"]);
    const immune = [], main = [];
    for (const e of entries) {
      if (IMMUNE_OPS.has(e.opcode) && (e.weight ?? 1.0) > 0.0) immune.push(e);
      else main.push(e);
    }
    return { immune, main };
  },
  // Build the full 5-section system context string.
  // primer: identity text ([PRIMER] content)
  // commands: reflex + zombie primitives catalog ([COMMANDS] content)
  // entries: VCW entries array (split into immune + main)
  // instructions: custom instructions text ([INSTRUCTIONS] content, may be "")
  // threshold: dedup threshold for CompactVCW (state.dedupThreshold)
  assemble: (primer, commands, entries, instructions = "", threshold = DEDUP_THRESHOLD) => {
    const { immune, main } = PromptAssembler._split(entries);
    const immuneText = immune.length
      ? CompactVCW.toWire(immune, threshold).replace("[VCW:", "[IMMUNE:")
      : "[IMMUNE:v4|n:0|r:0]";
    const vcwText = CompactVCW.toWire(main, threshold);
    const instrSection = instructions
      ? "[INSTRUCTIONS]\n\n" + instructions
      : "[INSTRUCTIONS]";
    return (
      "[PRIMER]\n\n" + primer +
      "\n\n[COMMANDS]\n\n" + commands +
      "\n\n" + immuneText +
      "\n\n" + instrSection +
      "\n\n" + vcwText
    );
  },
};

// ── somatic validation ─────────────────────────────────────────
const vForm = (f) => {
  if (!f?.layout || !f?.modules || !f?.activeReflexes)
    return { ok: false, err: "Missing fields" };
  if (!["grid", "stack", "split-pane", "floating"].includes(f.layout.type))
    return { ok: false, err: "Bad layout" };
  for (const m of f.modules) {
    if (!CELLS.includes(m.type))
      return { ok: false, err: "Unknown cell: " + m.type };
    if (m.reflexBinding && !RFX.includes(m.reflexBinding))
      return { ok: false, err: "Unknown binding: " + m.reflexBinding };
  }
  for (const r of f.activeReflexes)
    if (!RFX.includes(r)) return { ok: false, err: "Unknown reflex: " + r };
  return { ok: true };
};

function ShardVisualizerCell({ props: cellProps, vs }) {
  const canvasRef = useRef(null);
  const pixelBuffer = vs?.pixelBuffer;
  const pixelBlocks = vs?.pixelBlocks || [];
  const quarantineZone = new Set(vs?.quarantineZone || []);
  const side = vs?.pngSide || SHARD_SIDE_DEFAULT;
  const pixelFill = vs?.pixelFill || 0;
  const cap = vs?.cap || 0;
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = "#0a0a1a";
    ctx.fillRect(0, 0, W, H);
    if (pixelBuffer && pixelBuffer.length >= side * side * 4) {
      // Render pixel buffer scaled to canvas
      const tmpCanvas = document.createElement("canvas");
      tmpCanvas.width = side; tmpCanvas.height = side;
      const tmpCtx = tmpCanvas.getContext("2d");
      const rgba = new Uint8ClampedArray(pixelBuffer.length);
      for (let i = 0; i < pixelBuffer.length; i++) rgba[i] = pixelBuffer[i];
      tmpCtx.putImageData(new ImageData(rgba, side, side), 0, 0);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tmpCanvas, 0, 0, W, H);
      // Red overlay for quarantined blocks
      for (const block of pixelBlocks) {
        if (quarantineZone.has(block.seq)) {
          const sx = (block.pixelStart % side) / side * W;
          const sy = Math.floor(block.pixelStart / side) / side * H;
          ctx.fillStyle = "rgba(248,113,113,0.35)";
          ctx.fillRect(sx, sy, Math.max(2, W / side), Math.max(2, H / side));
        }
      }
    } else {
      // Empty shard — show grid placeholder
      ctx.strokeStyle = "rgba(30,30,60,0.6)";
      ctx.lineWidth = 0.5;
      const GRID = 16;
      for (let i = 0; i <= GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i * W / GRID, 0); ctx.lineTo(i * W / GRID, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * H / GRID); ctx.lineTo(W, i * H / GRID); ctx.stroke();
      }
      ctx.fillStyle = "#1a1a3a";
      ctx.font = "10px monospace";
      ctx.fillText("no pixel data", W / 2 - 38, H / 2);
    }
  }, [pixelBuffer, pixelBlocks.length, side]);
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "#09091a", padding: 8, gap: 6, overflow: "hidden" }}>
      <div style={{ color: "#3a3a7a", fontSize: 9, textTransform: "uppercase", letterSpacing: "0.12em", flexShrink: 0 }}>
        VCW Shard — PNG Image View
      </div>
      <canvas ref={canvasRef} width={256} height={200}
        style={{ width: "100%", imageRendering: "pixelated", border: "1px solid #1a1a3a", flexShrink: 0 }} />
      <div style={{ display: "flex", gap: 10, fontSize: 9, color: "#333", flexShrink: 0 }}>
        <span><span style={{ color: "#A78BFA" }}>■</span> header</span>
        <span><span style={{ color: "#60A5FA" }}>■</span> payload</span>
        <span><span style={{ color: "#F87171" }}>■</span> quarantine</span>
      </div>
      <div style={{ fontSize: 9, color: "#2a2a5a", fontFamily: "monospace", flexShrink: 0 }}>
        {pixelBlocks.length} blocks · {pixelFill} pixels · {side}×{side} · {cap.toFixed(2)}% fill
      </div>
    </div>
  );
}

function ImmuneSystemCell({ props: cellProps, vs }) {
  const logs = vs?.immuneLogs || [];
  const qZone = vs?.quarantineZone || [];
  const lastScan = vs?.lastImmuneScan;
  // Badge severity: quarantined blocks or CRC errors are anomalies. Axis-
  // periodicity findings (Hofstadter-X/Y) alone are informational — ordinary
  // text/JSON is inherently periodic, so FFT power without CRC damage or
  // quarantine must not brand a healthy organism "⚠ ANOMALY". The full scan
  // detail stays visible in the rows below; only the verdict is graded.
  const lastLog = logs[logs.length - 1];
  const hasAnomaly = qZone.length > 0 || !!(lastLog && lastLog.crcErrors > 0);
  const totalCrcErrors = logs.reduce((a, l) => a + (l.crcErrors || 0), 0);
  const rows = [
    ["Last scan", lastScan ? lastScan.slice(11,19) : "never", "#888"],
    ["Scans logged", String(logs.length), "#94A3B8"],
    ["Quarantine zone", qZone.length + " blocks", qZone.length > 0 ? "#F87171" : "#34D399"],
    ["Anomaly type", lastLog?.anomalyType || "none", lastLog?.anomalyDetected ? "#F87171" : "#34D399"],
    ["CRC errors", String(totalCrcErrors), totalCrcErrors > 0 ? "#F87171" : "#34D399"],
    ["FFT variance", lastLog ? lastLog.variance.toFixed(2) : "—", "#94A3B8"],
    ["Max axis power", lastLog ? lastLog.maxAxisPower.toFixed(2) : "—", "#94A3B8"],
  ];
  return (
    <div style={{ padding: "10px 12px", background: "#0a0a18", height: "100%", overflowY: "auto", boxSizing: "border-box" }}>
      <div style={{ color: "#3a3a7a", fontSize: 9, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
        <span>MRI Immune System</span>
        <span style={{ color: hasAnomaly ? "#F87171" : "#34D399", fontWeight: 700 }}>
          {hasAnomaly ? "⚠ ANOMALY" : "● CLEAN"}
        </span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 8 }}>
        {rows.map(([label, val, color]) => (
          <div key={label} style={{ display: "flex", justifyContent: "space-between", borderBottom: "1px solid #12122a", paddingBottom: 3 }}>
            <span style={{ color: "#3a3a5a", fontSize: 10 }}>{label}</span>
            <span style={{ color: color, fontSize: 10, fontFamily: "monospace" }}>{val}</span>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 9, color: "#2a2a4a", marginBottom: 6, lineHeight: 1.4 }}>
        CRC-8 pre-scan · 2D FFT band scan · Hofstadter Cross detection · Quarantine marks pixel range
      </div>
      <div>
        {logs.slice(-8).reverse().map((l, i) => (
          <div key={i} style={{ fontSize: 9, fontFamily: "monospace", color: l.anomalyDetected ? "#F87171" : "#1a2a1a", marginBottom: 1 }}>
            {l.anomalyDetected ? "⚠" : "·"} row={l.rowStart ?? l.z ?? "?"} {l.anomalyType || "ok"} v={l.variance?.toFixed(1) ?? "—"}{l.crcErrors > 0 ? ` crc:${l.crcErrors}` : ""}
          </div>
        ))}
      </div>
    </div>
  );
}

function CanvasCell({ mod, vs, rm }) {
  const p = mod?.props || {};
  const mode = p.mode || (p.chartType ? "chart" : "draw"); // default to draw unless explicitly charting
  const bindKey = p.bindKey || "canvas." + mod.id + ".strokes";

  // ── chart mode (VCW capacity bar or explicit bar data) ──
  if (mode === "chart") {
    const chartType = p.chartType || "vcwBar";
    const rawFill = p.fillColor || "#a78bfa";
    const fillColor =
      typeof rawFill === "string" && /^#[a-z]+$/i.test(rawFill)
        ? rawFill.slice(1)
        : rawFill;

    let label = "VCW Capacity";
    let pct: number | null = null;

    if (chartType === "bar" && p.data && typeof p.data === "object") {
      const full = Number(p.data.full);
      const max = Number(p.data.max || 100);
      label = String(p.data.label || label);
      if (Number.isFinite(full) && Number.isFinite(max) && max > 0)
        pct = Math.max(0, Math.min(100, (full / max) * 100));
    }

    if (pct == null) {
      pct = Math.max(0, Math.min(100, Number(vs?.cap || 0)));
      if (typeof p.label === "string") label = p.label;
    }

    const showPct = Number.isFinite(pct) ? pct : 0;
    const barW = Math.round(showPct);

    return (
      <div
        style={{
          flex: "1 1 0",
          background: "#0a0a1a",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          padding: 14,
        }}
      >
        <div style={{ width: "min(520px, 92%)" }}>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "baseline",
              marginBottom: 8,
            }}
          >
            <div style={{ color: "#888", fontSize: 11, fontWeight: 600 }}>
              {label}
            </div>
            <div
              style={{ color: "#555", fontSize: 10, fontFamily: "monospace" }}
            >
              {showPct.toFixed(1)}%
            </div>
          </div>
          <div
            style={{
              height: 14,
              borderRadius: 999,
              background: "#12122a",
              border: "1px solid #252540",
              overflow: "hidden",
            }}
          >
            <div
              style={{
                height: "100%",
                width: barW + "%",
                background: fillColor || "#a78bfa",
              }}
            />
          </div>
          <div
            style={{
              marginTop: 8,
              color: "#2a2a4a",
              fontSize: 10,
              fontFamily: "monospace",
            }}
          >
            entries: {vs?.vcwEntries?.length || 0}
          </div>
        </div>
      </div>
    );
  }

  // ── draw mode (simple SVG “paint”) ──
  const initial = vs?.bodyFields?.[bindKey];
  const [strokes, setStrokes] = useState(() =>
    Array.isArray(initial) ? initial : []
  );
  const drawing = useRef(false);
  const cur = useRef([]);
  const wrapRef = useRef(null);

  useEffect(() => {
    const bv = vs?.bodyFields?.[bindKey];
    if (Array.isArray(bv)) setStrokes(bv);
  }, [vs?.bodyFields?.[bindKey]]); // eslint-disable-line

  const persist = useCallback(
    async (next) => {
      if (rm?.reflexExecBinding)
        await rm.reflexExecBinding({
          name: "state.set",
          args: { key: bindKey, value: next },
        });
    },
    [rm, bindKey]
  );

  const pt = (e) => {
    const r = wrapRef.current?.getBoundingClientRect?.();
    const x = e.clientX - (r?.left || 0);
    const y = e.clientY - (r?.top || 0);
    return { x: Math.max(0, x), y: Math.max(0, y) };
  };

  const onDown = async (e) => {
    drawing.current = true;
    cur.current = [pt(e)];
    try {
      e.currentTarget.setPointerCapture(e.pointerId);
    } catch {}
  };
  const onMove = (e) => {
    if (!drawing.current) return;
    cur.current = [...cur.current, pt(e)];
    // local live update (don’t persist every move)
    setStrokes((s) => {
      const next = [...s];
      next[next.length - 1] = cur.current;
      return next;
    });
  };
  const onUp = async (e) => {
    if (!drawing.current) return;
    drawing.current = false;
    const next = [...strokes, cur.current].filter(
      (x) => Array.isArray(x) && x.length > 0
    );
    cur.current = [];
    setStrokes(next);
    await persist(next);
    try {
      e.currentTarget.releasePointerCapture(e.pointerId);
    } catch {}
  };

  // Optional command channel from ButtonGrid: bodyFields["canvas.command"] = clear|undo|random|save
  const lastCmd = useRef(null);
  useEffect(() => {
    const cmd = vs?.bodyFields?.["canvas.command"];
    if (!cmd || cmd === lastCmd.current) return;
    lastCmd.current = cmd;

    (async () => {
      const c = String(cmd).toLowerCase();
      if (c === "clear") {
        setStrokes([]);
        await persist([]);
      } else if (c === "undo") {
        const next = strokes.slice(0, -1);
        setStrokes(next);
        await persist(next);
      } else if (c === "random") {
        const w = wrapRef.current?.clientWidth || 600;
        const h = wrapRef.current?.clientHeight || 360;
        const s: any[] = [];
        let x = w * 0.2,
          y = h * 0.5;
        for (let i = 0; i < 80; i++) {
          x += Math.random() * 40 - 20;
          y += Math.random() * 40 - 20;
          s.push({
            x: Math.max(0, Math.min(w, x)),
            y: Math.max(0, Math.min(h, y)),
          });
        }
        const next = [...strokes, s];
        setStrokes(next);
        await persist(next);
      } else if (c === "save") {
        try {
          const payload = { savedAt: iso(), strokes };
          const url = URL.createObjectURL(
            new Blob([JSON.stringify(payload, null, 2)], {
              type: "application/json",
            })
          );
          const a = document.createElement("a");
          a.href = url;
          a.download = "mantle-canvas-" + Date.now() + ".json";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch {}
      }
      if (rm?.reflexExecBinding)
        await rm.reflexExecBinding({
          name: "state.set",
          args: { key: "canvas.command", value: "" },
        });
    })();
  }, [vs?.bodyFields?.["canvas.command"]]); // eslint-disable-line

  const strokeColor = p.strokeColor || "#c4b5fd";
  const strokeWidth = Number(p.strokeWidth || 2);

  return (
    <div
      ref={wrapRef}
      style={{
        flex: "1 1 0",
        background: "#060612",
        border: "1px solid #252540",
        borderRadius: 6,
        margin: 10,
        position: "relative",
        overflow: "hidden",
      }}
      onPointerDown={onDown}
      onPointerMove={onMove}
      onPointerUp={onUp}
      onPointerCancel={onUp}
    >
      <svg
        width="100%"
        height="100%"
        style={{ display: "block", touchAction: "none" }}
      >
        {strokes.map((s, i) => {
          const d = s
            .map((p, j) => (j === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`))
            .join(" ");
          return (
            <path
              key={i}
              d={d}
              fill="none"
              stroke={strokeColor}
              strokeWidth={strokeWidth}
              strokeLinecap="round"
              strokeLinejoin="round"
              opacity={0.95}
            />
          );
        })}
      </svg>
      {strokes.length === 0 && (
        <div
          style={{
            position: "absolute",
            inset: 0,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            color: "#2a2a4a",
            fontSize: 11,
            fontStyle: "italic",
          }}
        >
          Paint here (mouse/touch)
        </div>
      )}
    </div>
  );
}
