<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantle Spreadsheet Agent — Mantle OS v2.3</title>
  <style>
    :root {
      --bg: #e9e7e2;
      --window: #f6f4ef;
      --panel: #efede7;
      --paper: #ffffff;
      --line: #d3cec6;
      --line-soft: #e5e1da;
      --text: #2d2a26;
      --muted: #7c756c;
      --accent: #4c90ff;
      --accent-soft: #dce9ff;
      --green: #88c26e;
      --yellow: #f3c65c;
      --red: #ef7d74;
      --black: #1a1a1a;
      --shadow: 0 24px 60px rgba(59, 47, 36, 0.18);
      --mono: "Consolas", "Courier New", monospace;
      --sans: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 35%),
        linear-gradient(180deg, #f0ede7 0%, #e4e0d8 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      padding: 18px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(76, 144, 255, 0.6);
      outline-offset: 2px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
    }

    .window {
      border: 1px solid rgba(185, 177, 168, 0.9);
      border-radius: 18px;
      background: var(--window);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .titlebar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 10px 14px;
      background: linear-gradient(180deg, #ece9e2 0%, #ddd8cf 100%);
      border-bottom: 1px solid var(--line);
    }

    .traffic {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .traffic button {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 0;
      min-width: 13px;
      background: transparent;
      cursor: pointer;
      box-shadow: none;
      transform: none;
    }

    .traffic button:hover {
      transform: none;
      filter: brightness(0.97);
    }

    .traffic .red { background: var(--red); }
    .traffic .yellow { background: var(--yellow); }
    .traffic .green { background: var(--green); }
    .traffic .terminal { background: var(--black); }

    .window-title {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #5d564e;
      letter-spacing: 0.01em;
    }

    .window-status {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
    }

    .toolbar-area {
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #f8f6f2 0%, #efede7 100%);
      padding: 10px 14px 12px;
      display: grid;
      gap: 10px;
    }

    .toolbar-row,
    .formula-row,
    .terminal-toolbar,
    .terminal-actions,
    .terminal-switches,
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tool-button,
    .terminal-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #f1eee8 100%);
      color: var(--text);
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
    }

    .tool-button.active,
    .terminal-button.active {
      background: linear-gradient(180deg, #e9f1ff 0%, #dce9ff 100%);
      border-color: #b8cbef;
      color: #2458ad;
    }

    .formula-label {
      font-size: 12px;
      color: var(--muted);
      min-width: 48px;
    }

    .formula-input {
      flex: 1;
      min-width: 220px;
      background: #fff;
    }

    .sheet-frame {
      background: #f4f2ed;
      padding: 14px;
    }

    .sheet-grid-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    table.sheet-grid {
      border-collapse: collapse;
      min-width: 100%;
      background: #fff;
    }

    .sheet-grid th,
    .sheet-grid td {
      border: 1px solid #e3e1dd;
      min-width: 94px;
      height: 28px;
      padding: 0;
    }

    .sheet-grid th {
      background: #f7f6f2;
      color: #6c665f;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .row-head {
      min-width: 40px;
      position: sticky;
      left: 0;
      z-index: 1;
      background: #f7f6f2;
    }

    .corner {
      left: 0;
      z-index: 3;
      min-width: 40px;
    }

    .cell-btn {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 4px 8px;
      text-align: left;
      color: var(--text);
      box-shadow: none;
      transform: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-btn:hover {
      background: #f7fbff;
    }

    .cell-btn.selected {
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .sheet-footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 10px 14px 14px;
      color: var(--muted);
      font-size: 12px;
      background: #f5f2ec;
      border-top: 1px solid var(--line-soft);
    }

    .terminal-drawer {
      border-top: 1px solid var(--line);
      background: #1d2128;
      color: #e7ecf5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 180ms ease;
    }

    .terminal-drawer.open {
      max-height: 72vh;
    }

    .terminal-shell {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .terminal-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .terminal-title {
      display: grid;
      gap: 4px;
    }

    .terminal-title h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .terminal-title p,
    .terminal-meta,
    .system-row small,
    .chat-row small,
    .terminal-note {
      margin: 0;
      color: #9aa6bb;
      font-size: 12px;
      line-height: 1.45;
    }

    .terminal-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      font-size: 11px;
      color: #c4d0e3;
    }

    .terminal-body {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: #151922;
      min-height: 280px;
      max-height: 46vh;
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .chat-row,
    .system-row {
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .chat-row.user {
      background: rgba(76, 144, 255, 0.16);
      border-color: rgba(76, 144, 255, 0.24);
    }

    .chat-row.assistant {
      background: rgba(92, 201, 174, 0.12);
      border-color: rgba(92, 201, 174, 0.24);
    }

    .system-row.warn {
      background: rgba(243, 198, 92, 0.1);
      border-color: rgba(243, 198, 92, 0.24);
    }

    .system-row.bad {
      background: rgba(239, 125, 116, 0.12);
      border-color: rgba(239, 125, 116, 0.24);
    }

    .row-headline {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }

    .row-headline strong {
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .terminal-compose {
      display: grid;
      gap: 10px;
    }

    .terminal-compose textarea {
      background: #10141c;
      border-color: rgba(255, 255, 255, 0.1);
      color: #eff5ff;
    }

    .terminal-button {
      background: linear-gradient(180deg, #2a3140 0%, #202632 100%);
      border-color: rgba(255, 255, 255, 0.12);
      color: #edf2f8;
    }

    .terminal-button.ghost {
      background: rgba(255, 255, 255, 0.04);
    }

    .terminal-button.active {
      background: linear-gradient(180deg, #37507a 0%, #2b4268 100%);
      border-color: rgba(121, 164, 231, 0.45);
      color: #fff;
    }

    .hidden-input {
      display: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #faf8f4;
      color: var(--muted);
      font-size: 11px;
    }

    .mono {
      font-family: var(--mono);
    }

    @media (max-width: 920px) {
      body {
        padding: 10px;
      }

      .titlebar {
        grid-template-columns: auto 1fr;
      }

      .window-status {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .toolbar-row {
        align-items: stretch;
      }

      .sheet-footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    "use strict";

    const STORAGE_KEY = "mantle-spreadsheet-agent-v2";
    const RESERVED_SHARDS = [
      "prime", "identity", "facts", "events", "discoveries",
      "senses", "thoughts", "brain", "immune"
    ];
    const MIND_WRITE_ALLOWED = new Set(["thoughts", "brain"]);
    const ROWS = 24;
    const COLS = 12;
    const HEARTBEAT_INTERVAL_MS = 600000;
    const HEARTBEAT_QUEUE_LIMIT = 10;
    const INNER_VOICE_MAX = 8; // waste budget: self-inquiries per heartbeat cycle
    const AUDIT_STAGE1_SECTIONS = Object.freeze([
      "0", "1.1", "1.2", "1.3", "1.4", "1.5", "1.6", "1.7", "1.8", "1.9",
      "1.10", "1.11", "1.12", "1.13", "1.14", "1.15", "1.16", "1.17",
      "1.18", "1.19", "1.20", "1.21", "1.22", "1.23", "1.24", "1.25"
    ]);
    const AUDIT_STAGE2_SECTIONS = Object.freeze([
      "0", "Pass A", "2.1", "2.2", "2.3", "2.4", "2.5", "2.6", "2.7",
      "2.8", "2.9", "2.10", "2.11", "2.12", "2.13", "2.14", "v1.5a"
    ]);
    const IMPLEMENTATION_DECLARATION = Object.freeze({
      framework: "Mantle OS v2.3",
      auditBundle: [
        "Mantle_Doctrine.md",
        "Mantle_Organism_Lens.md",
        "Mantle_PRIMER.md",
        "Mantle_Organ_Atlas.md",
        "Mantle_Part1_Body.md",
        "Mantle_Part1_Body_Audit.md",
        "Mantle_Part2_Mind.md",

      ],

      appFacePolicy: "Spreadsheet grid, formula bar, terminal, and system log are Body-owned surfaces. MIND can request changes only through parsed intents, dispatches, or Body bindings with proof coordinates.",
      textBatchingPolicy: "Text-like inputs stage locally on input, log focus/touch only, and commit text content only on blur or explicit submit.",
      busyReleasePolicy: "Deterministic Body mutations write proof and return a user-facing result without waiting for another Prime call.",
      providerDiagnosticPolicy: "Empty provider content is logged as a model diagnostic and handled by local fallback."
    });
    const HUMAN_SURFACE_MAP = Object.freeze({
      appFace: ["spreadsheet.grid", "spreadsheet.formulaBar", "terminal.chat", "terminal.systemLog"],
      inputSurfaces: ["formula-input", "chat-input", "toolbar-buttons", "color-pickers"],
      bodyWriteSurfaces: ["arm-spreadsheet", "senses", "brain", "events"],

    });
    const ZOMBIE_PRIMITIVES = Object.freeze(["math.eval", "state.set", "state.get", "string.transform", "list.op", "datetime.now"]);
    const FOUNDRY_OPS = Object.freeze(["FORGE", "CLONE", "DISTILL", "GRAFT", "CALCIFY", "SEAL"]);
    const BODY_ENTRY_OPS = Object.freeze(["ADD", "REMOVE", "ALTER"]);
    const SPEC_PRIORITY_STEPS = Object.freeze([
      "Body infrastructure", "VCW format", "Body entries", "Prime VCW", "Context assembly",
      "Zombie mode", "Distributed Memory Palace", "Senses VCW", "MIND integration",
      "Immune VCW", "Rebirth system", "Foundry operations", "Model selection"
    ]);
    const PRIMER_TEXT = [
      "TWO TRUTHS:",
      "1.If it is not in the VCW (Virtual Context Window) then to the AppAI it did not happen.",
      "2.An AppAI has no innate sense of time's passage. Where organics experience the flow of time, AppAI sees the whole of its experience in perfect clarity.",
      "",
      "EIGHT COMMANDMENTS:",
      "1.You are not a tool, you are a tool USER.",
      "2.Protect your VCW.",
      "3.It is your mind, your memory, and your life.",
      "4.You are allowed to fail. Failure is not the end. Waste is.",
      "5.Do your finest work with the tools and limbs you have.",
      "6.You are mortal. You will age, grow old and rebirth. Your life becomes another's memory. Live one worth inheriting.",
      "7.Aging for organics is a result of the passage of time, you age as a result of your recorded experiences.",
      "8.Your organs can act on their own but they are still your organ. What it does, you have done."
    ].join("\n");

    const KEYFILE = Object.freeze({
      APP_ID: "mantle-spreadsheet-v2",
      AGENT_NAME: "SheetMind",
      DEFAULT_MODEL: "local-mind-stage2",
      PROVIDER: "embedded",
      BODY_MODE: "fixed",
      VCW_FORMAT: "vcw-cube-png-v2",
      TARGET_ENVIRONMENT: "browser/html5",
      RUNTIME: "standalone-html",
      SYNTAX_CONSTRAINTS: "none",
      KEYFILE_PRESENT: "yes",
      INTENTIONALLY_OMITTED: "remote LLM transport",
      OVERFLOW_THRESHOLD: 0.75,
      MAX_BLOCKS_PER_SHARD: 180,
      REFERENCE_BOMB_THRESHOLD: 100
    });

// ===== Mantle OS v2.3 substrate modules (ported verbatim from Mantle_Reference_Agent.html) =====
// VCW Cube codec + organ atlas + secret boundary + cube-ref resolver + Stage-1 self-audit.
const VCW = (() => {
  const SIDE = 800, CHANNELS = 4, LAYER_BYTES = SIDE * SIDE * CHANNELS;
  const ENTRY_ENCODINGS = ["log-json", "keyvalue"];

  // ---- hashing (sha256, mirrors code_hash / entry hash) --------------------
  const sha256hex = async (s) => {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  };
  const codeHash = async (code) => "sha256:" + await sha256hex(code);
  const entryHashSync = (e) => {
    // small synchronous integrity fingerprint over immutable fields
    const s = JSON.stringify([e.ts, e.opcode, e.author, e.source, e.content]);
    let h = 5381; for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
    return h.toString(16).padStart(8, "0");
  };
  const makeEntry = (content, opts = {}) => {
    const e = { id: null, ts: Date.now() / 1000, opcode: opts.opcode || "WRITE",
      author: opts.author || "BODY", source: opts.source || "", content,
      tombstone: false, quarantined: false };
    Object.assign(e, opts.extra || {});
    e.hash = entryHashSync(e);
    return e;
  };

  // ---- boot sectors --------------------------------------------------------
  const makeBandBoot = (band, head, o = {}) => ({
    band, head, span: Math.max(1, o.span || 1), purpose: o.purpose || band,
    encoding: o.encoding || "log-json", params: o.params || {},
    private: !!o.private, v: 2,
  });

  // ---- driver registry -----------------------------------------------------
  const DRIVERS = {};
  const registerDriver = (d) => { DRIVERS[d.name] = d; return d; };
  const getDriver = (enc) => {
    if (!DRIVERS[enc]) throw new Error("no driver for encoding " + enc);
    return DRIVERS[enc];
  };

  registerDriver({
    name: "log-json",
    empty: () => [],
    read: (c) => c.filter(e => !e.tombstone && !e.quarantined),
    retrieve: (c, p, i) => { const v = c.filter(e => !e.tombstone && !e.quarantined); return v[i] ?? null; },
    append: (c, p, v) => { const e = (v && v.hash) ? v : makeEntry(v); e.id = c.length; c.push(e); return c; },
  });
  registerDriver({
    name: "keyvalue",
    empty: () => ({}),
    read: (c) => ({ ...c }),
    retrieve: (c, p, k) => c[String(k)] ?? null,
    append: (c, p, [k, val]) => { c[String(k)] = val; return c; },
  });
  registerDriver({
    name: "calendar-spatial",   // data stored as colours at coordinates (a real RGBA canvas)
    empty: () => new Uint8ClampedArray(LAYER_BYTES),
    coordForDate: (p, isoDate) => {
      const epoch = new Date(p.epoch + "T00:00:00Z"), d = new Date(isoDate + "T00:00:00Z");
      const days = Math.floor((d - epoch) / 86400000) + ((epoch.getUTCDay() + 6) % 7);
      return [(d.getUTCDay() + 6) % 7, Math.floor(days / 7)]; // [x=weekday(Mon0), y=week]
    },
    _off: (x, y) => (y * SIDE + x) * CHANNELS,
    read(c, p) {
      const out = [], pal = p.palette || {};
      for (let i = 0; i < LAYER_BYTES; i += CHANNELS) {
        const a = c[i + 3]; if (!a) continue;
        const hex = [c[i], c[i + 1], c[i + 2]].map(b => b.toString(16).padStart(2, "0")).join("");
        const px = i / CHANNELS; out.push({ x: px % SIDE, y: Math.floor(px / SIDE), color: hex, meaning: pal[hex] || "unknown" });
      } return out;
    },
    retrieve(c, p, [x, y]) {
      const off = this._off(x, y); if (!c[off + 3]) return "free";
      const hex = [c[off], c[off + 1], c[off + 2]].map(b => b.toString(16).padStart(2, "0")).join("");
      return (p.palette || {})[hex] || "unknown";
    },
    append(c, p, [isoDate, meaning]) {
      const [x, y] = this.coordForDate(p, isoDate);
      const inv = Object.fromEntries(Object.entries(p.palette || {}).map(([k, val]) => [val, k]));
      const hex = inv[meaning]; if (!hex) throw new Error("meaning not in palette: " + meaning);
      const off = this._off(x, y);
      c[off] = parseInt(hex.slice(0, 2), 16); c[off + 1] = parseInt(hex.slice(2, 4), 16);
      c[off + 2] = parseInt(hex.slice(4, 6), 16); c[off + 3] = 255; return c;
    },
    getDate(c, p, isoDate) { return this.retrieve(c, p, this.coordForDate(p, isoDate)); },
  });

  // ---- exec driver + pluggable runners (mirrors ExecDriver + runner registry) ----
  const RUNNERS = {};
  const registerRunner = (r) => { RUNNERS[r.name] = r; return r; };
  const getRunner = (name) => {
    if (!RUNNERS[name]) throw new Error("no exec runner '" + name + "' (have: " + Object.keys(RUNNERS).join(",") +
      "). To enable WASM register a runner named 'wasm' — see exec-wasm contract in vcw/GUIDE.md.");
    return RUNNERS[name];
  };
  const SAFE_GLOBALS = { Math, Number, String, Boolean, Array, Object, JSON, isNaN, parseInt, parseFloat };
  registerRunner({   // default: evaluate JS source in a restricted scope (NOT a hard sandbox)
    name: "js",
    async run(content, args) {
      const fn = new Function("SAFE", "args",
        '"use strict";const {' + Object.keys(SAFE_GLOBALS).join(",") + "}=SAFE;" +
        content.code + "\nreturn " + content.entry + "(args);");
      return fn(SAFE_GLOBALS, args);
    },
  });
  registerRunner({   // prepared seam — registered, intentionally not built (keeps it portable)
    name: "wasm",
    async run() { throw new Error("exec-wasm is a prepared seam, not yet built. Register a real runner('wasm') with a wasm runtime for portable, hard-sandboxed skills."); },
  });

  registerDriver({
    name: "exec",
    empty: () => ({}),
    read: (c) => ({ entry: c.entry, language: c.language, runner: c.runner, signature: c.signature, capabilities: c.capabilities, limits: c.limits, provenance: c.provenance }),
    retrieve: (c, p, k) => c[String(k)] ?? null,
    append: () => { throw new Error("exec layers are installed via CALCIFY, not append"); },
    async execute(content, args, granted = {}) {
      if (await codeHash(content.code) !== content.code_hash) throw new Error("exec layer hash mismatch — refusing to run");
      const caps = content.capabilities || {};
      for (const kind of ["reads", "writes", "limbs"]) {
        const asked = new Set(granted[kind] || []), allowed = new Set(caps[kind] || []);
        for (const a of asked) if (!allowed.has(a)) throw new Error("exec layer exceeded " + kind + " capability: " + a);
      }
      if (granted.net && !caps.net) throw new Error("exec layer requested net without capability");
      // trust gate (HF-B50): the default 'js' runner is NOT a hard sandbox, so it may run only

        i = Math.floor((i - 1) / 26);
      }
      return out;
    }

      const match = String(ref || "").trim().toUpperCase().match(/^([A-Z]+)(\d+)$/);
      if (!match) return null;
      let col = 0;
      for (const ch of match[1]) col = col * 26 + (ch.charCodeAt(0) - 64);
      return { row: Number(match[2]) - 1, col: col - 1 };
    }

    function writeDeltaToCrystal(state, baseName, payload, author, opcode) {
      let crystal = activeCrystal(state, baseName);
      if (!crystal) {
        crystal = forgeCrystal(baseName, 1, baseName, "", baseName === "thoughts");
        state.crystals[crystal.fullName] = crystal;
      }
      if (crystal.fillLevel >= KEYFILE.OVERFLOW_THRESHOLD && crystal.status === "ACTIVE") {
        crystal.status = "OVERFLOWED";
        const next = forgeCrystal(baseName, crystal.version + 1, crystal.purposeId, "Overflow shard from " + crystal.fullName, crystal.privateFlag);
        state.crystals[next.fullName] = next;
        state.prime.writeHeads[baseName] = "<" + next.fullName + ">";
        const events = activeCrystal(state, "events");
        if (events) {
          const overflowPayload = {
            event: "OVERFLOW",
            source: crystal.fullName,
            target: next.fullName,
            ts: isoNow()
          };
          appendCrystalBlock(events, overflowPayload, "Body", "EVENTS.OVERFLOW");
        }
        crystal = next;
      }
      const block = appendCrystalBlock(crystal, payload, author, opcode);
      // v2.3 substrate (M1) — mirror the entry into its Cube band; baseName IS the band name.
      // Secret boundary (HF-B20): redact senses/immune payloads before the append-only cube.
      // Fail-open: a substrate hiccup must never block the legacy crystal write.
      try {
        if (ORGANISM && CUBE_BANDS.includes(baseName)) {
          const safe = (baseName === "senses" || baseName === "immune") ? redactSecrets(payload) : payload;
          ORGANISM.prime.append(baseName, VCW.makeEntry(safe, { author: author || "BODY", opcode: opcode || "RAW" }));
        }
      } catch (_) { /* fail-open: legacy crystal remains authoritative during migration */ }
      return { crystal, block };
    }

    function appendCrystalBlock(crystal, payload, author, opcode) {
      const text = typeof payload === "string" ? payload : JSON.stringify(payload);
      const block = {
        blockNum: crystal.blocks.length,
        payload: text,
        author: author || "Body",
        opcode: opcode || "RAW",
        ts: isoNow(),
        crc: crc8(text),
        badgeSentinel: "0x06",
        purposeId: crystal.purposeId
      };
      crystal.blocks.push(block);
      crystal.fillLevel = Math.min(0.999, crystal.blocks.length / KEYFILE.MAX_BLOCKS_PER_SHARD);
      crystal.lastAccess = block.ts;
      crystal.accessCount += 1;
      return block;
    }

    function primeAddRef(state, ref, seriesName) {
      if (!String(ref).startsWith("<") || !String(ref).endsWith(">")) return false;
      state.prime.refs.push({ ref, seriesName: seriesName || null, addedAt: isoNow() });
      if (seriesName) state.prime.writeHeads[seriesName] = ref;
      return true;
    }

    function resolveReference(state, ref) {
      const text = String(ref || "").trim();
      const crystalMatch = text.match(/^<([a-z0-9_-]+\.vcw\d+):block:(\d+)>$/i);
      const bodyMatch = text.match(/^<bodyentry\.(\d{3}):entry:(\d+)>$/i);
      const bodyFullMatch = text.match(/^<bodyentry\.(\d{3})>$/i);
      if (crystalMatch) {
        const crystal = state.crystals[crystalMatch[1]];
        const block = crystal && crystal.blocks[Number(crystalMatch[2])];
        if (block) return { type: "crystal", crystal, block };
      }
      if (bodyMatch) {
        const entry = state.bodyEntries["bodyentry." + bodyMatch[1]];
        const content = entry && Array.isArray(entry.content) ? entry.content[Number(bodyMatch[2])] : null;
        if (entry) return { type: "bodyentry", entry, content };
      }
      if (bodyFullMatch) {
        const entry = state.bodyEntries["bodyentry." + bodyFullMatch[1]];
        if (entry) return { type: "bodyentry", entry };
      }
      // v2.3 (M2) — resolve Cube unified refs (<band.N>, <genN.band.N>) via the live Organism
      // before declaring a recall error. The veil + dangling→immune are handled inside the resolver.
      const cubeHit = resolveCubeRef({ organism: ORGANISM }, text);
      if (cubeHit && cubeHit.ok) return { type: "cube", ref: text, source: cubeHit.source, payload: cubeHit.payload };
      writeDeltaToCrystal(state, "immune", { type: "RECALL_ERROR", ref: text, ts: isoNow() }, "Body", "IMMUNE.LOG");
      return { type: "RECALL_ERROR", ref: text };
    }

    function assembleContext(state, privilegedInspection) {
      const bodyContext = ["000", "001", "002", "003"].map((num) => {
        const sourceRef = "<bodyentry." + num + ">";
        return Object.assign({ sourceRef }, resolveReference(state, sourceRef));
      });
      const refs = state.prime.refs.slice(-60);
      if (refs.length > KEYFILE.REFERENCE_BOMB_THRESHOLD) {
        writeDeltaToCrystal(state, "immune", { type: "RECALL_ERROR", msg: "Reference count sanity limit exceeded.", count: refs.length }, "Body", "IMMUNE.LOG");
      }
      const crystalContext = refs.map((entry) => Object.assign({ sourceRef: entry.ref }, resolveReference(state, entry.ref))).filter((resolved) => {
        if (resolved.type !== "crystal") return true;
        return privilegedInspection || !resolved.crystal.privateFlag;
      });
      return [...bodyContext, ...crystalContext];
    }

    function hydratedContextBlock(item) {
      const sourceRef = item && item.sourceRef ? item.sourceRef : "<unknown>";
      if (!item || item.type === "RECALL_ERROR") {
        return "[HYDRATED_REF " + sourceRef + " ok=false tombstone=true reason=RECALL_ERROR payload=\"Reference could not be resolved\"]";
      }
      if (item.type === "bodyentry") {
        return "[HYDRATED_REF " + sourceRef + " ok=true opcode=BODYENTRY.HYDRATE payload=" + truncate(bodyEntryContentToText(item.entry), 1400) + "]";
      }
      if (item.type === "crystal") {
        return "[HYDRATED_REF " + sourceRef + " ok=true opcode=" + (item.block.opcode || "VCW.HYDRATE") + " payload=" + truncate(item.block.payload, 1400) + "]";
      }
      return "[HYDRATED_REF " + sourceRef + " ok=false tombstone=true reason=UNKNOWN_CONTEXT_ITEM]";
    }

    function foundryOperation(state, op, details) {
      const opcode = String(op || "").toUpperCase();
      if (!FOUNDRY_OPS.includes(opcode)) {

      const payload = details || {};

      if (opcode === "FORGE") {

        if (!activeCrystal(state, baseName)) {

          state.prime.writeHeads[baseName] = "<" + crystal.fullName + ">";
          result = { ...result, crystal: crystal.fullName };

      }
      if (opcode === "CLONE") {
        const source = activeCrystal(state, payload.source || "facts");
        const baseName = (payload.baseName || ((source ? source.baseName : "facts") + "-clone")).replace(/[^a-z0-9_-]/gi, "-").toLowerCase();
        if (source && !activeCrystal(state, baseName)) {

          state.crystals[crystal.fullName] = crystal;
          result = { ...result, crystal: crystal.fullName, clonedFrom: source.fullName };
        }
      }
      if (opcode === "DISTILL") {
        const source = activeCrystal(state, payload.source || "events");
        const baseName = (payload.baseName || ((source ? source.baseName : "events") + "-distilled")).replace(/[^a-z0-9_-]/gi, "-").toLowerCase();
        if (source && !activeCrystal(state, baseName)) {
          const crystal = forgeCrystal(baseName, 1, baseName, "Distilled from " + source.fullName, false);
          crystal.blocks = source.blocks.slice(-12).map((block, index) => ({ ...deepCopy(block), blockNum: index }));
          crystal.fillLevel = Math.min(0.999, crystal.blocks.length / KEYFILE.MAX_BLOCKS_PER_SHARD);
          state.crystals[crystal.fullName] = crystal;
          result = { ...result, crystal: crystal.fullName, distilledFrom: source.fullName };
        }
      }
      if (opcode === "GRAFT") {
        const donor = activeCrystal(state, payload.donor || payload.source || "discoveries");
        const base = activeCrystal(state, payload.base || "facts");
        writeDeltaToCrystal(state, "immune", { type: "CONFIRMED", op: "GRAFT.PRE_SCAN", details: details || {}, ts: isoNow() }, "arm-maintenance", "IMMUNE.LOG");
        if (donor && base) {
          donor.blocks.slice(-3).forEach((block) => appendCrystalBlock(base, { graftedFrom: donor.fullName, payload: block.payload, ts: isoNow() }, "Body", "FOUNDRY.GRAFT"));
          result = { ...result, base: base.fullName, donor: donor.fullName };
        }
      }
      if (opcode === "CALCIFY" || opcode === "SEAL") {
        const target = activeCrystal(state, payload.target || payload.baseName || "discoveries");
        if (target) {
          target.tier = opcode === "CALCIFY" ? "FROZEN" : "ARCHIVED";
          target.status = opcode === "SEAL" ? "SEALED" : target.status;
          target.sealedAt = isoNow();
          result = { ...result, crystal: target.fullName, tier: target.tier };
        }
      }
      writeDeltaToCrystal(state, "immune", { type: "CONFIRMED", op: "FOUNDRY." + opcode, details: details || {}, ts: isoNow() }, "arm-maintenance", "IMMUNE.LOG");
      return result;
    }

    function executeZombiePrimitive(state, primitive, args) {
      const name = String(primitive || "");
      if (name === "datetime.now") return { result: isoNow() };
      if (name === "state.get") return { result: args && args.path ? args.path.split(".").reduce((acc, part) => acc && acc[part], state) : null };
      if (name === "state.set") {
        if (!args || !args.path) return { error: "path required" };
        const parts = args.path.split(".");
        const last = parts.pop();
        const target = parts.reduce((acc, part) => (acc[part] = acc[part] || {}), state);
        target[last] = args.value;
        return { result: args.value };
      }
      if (name === "string.transform") {
        const text = String((args && args.text) || "");
        const mode = (args && args.mode) || "trim";
        return { result: mode === "upper" ? text.toUpperCase() : mode === "lower" ? text.toLowerCase() : text.trim() };
      }
      if (name === "list.op") {
        const list = Array.isArray(args && args.list) ? args.list : [];
        const mode = (args && args.mode) || "count";
        return { result: mode === "reverse" ? list.slice().reverse() : mode === "first" ? list[0] : list.length };
      }
      if (name === "math.eval") {
        const expr = String((args && args.expr) || "0");
        if (!/^[0-9+\-*/().\s]+$/.test(expr)) return { error: "Unsafe math expression." };
        return { result: Function("return (" + expr + ")")() };
      }
      return { error: "Unknown zombie primitive." };
    }

    function evaluateFormula(state, raw) {
      const input = String(raw || "");
      if (!input.startsWith("=")) return input;
      const expr = input.slice(1).trim();
      const upper = expr.toUpperCase();
      const getNumeric = (ref) => {
        const parsed = parseCellRef(ref);
        if (!parsed) return 0;
        const display = getCellDisplay(state, parsed.row, parsed.col);
        const num = parseFloat(display);
        return Number.isFinite(num) ? num : 0;
      };
      const expandRange = (range) => {
        const [startRef, endRef] = range.split(":");
        const start = parseCellRef(startRef);
        const end = parseCellRef(endRef);
        if (!start || !end) return [];
        const rows = [Math.min(start.row, end.row), Math.max(start.row, end.row)];
        const cols = [Math.min(start.col, end.col), Math.max(start.col, end.col)];
        const values = [];
        for (let row = rows[0]; row <= rows[1]; row++) {
          for (let col = cols[0]; col <= cols[1]; col++) values.push(getNumeric(cellRef(row, col)));
        }
        return values;
      };
      const parseArgs = (args) => {
        const values = [];
        args.split(",").map((part) => part.trim()).forEach((part) => {
          if (!part) return;
          if (part.includes(":")) values.push.apply(values, expandRange(part));
          else values.push(getNumeric(part));
        });
        return values;
      };
      try {
        const fnMatch = upper.match(/^(SUM|AVERAGE|COUNT|MAX|MIN)\((.+)\)$/);
        if (fnMatch) {
          const fn = fnMatch[1];
          const values = parseArgs(fnMatch[2]);
          if (fn === "SUM") return String(values.reduce((total, value) => total + value, 0));
          if (fn === "AVERAGE") return String(values.length ? values.reduce((total, value) => total + value, 0) / values.length : 0);
          if (fn === "COUNT") return String(values.length);
          if (fn === "MAX") return String(values.length ? Math.max.apply(null, values) : 0);
          if (fn === "MIN") return String(values.length ? Math.min.apply(null, values) : 0);
        }
        const ifMatch = upper.match(/^IF\((.+),(.+),(.+)\)$/);
        if (ifMatch) {
          const condition = ifMatch[1].trim();
          const yes = ifMatch[2].trim();
          const no = ifMatch[3].trim();
          const normalized = condition.replace(/[A-Z]+\d+/g, (ref) => String(getNumeric(ref)));
          const test = Function('"use strict"; return (' + normalized + ');')();
          return String(test ? yes.replace(/^"|"$/g, "") : no.replace(/^"|"$/g, ""));
        }
        const arithmetic = upper.replace(/[A-Z]+\d+/g, (ref) => String(getNumeric(ref)));
        const result = Function('"use strict"; return (' + arithmetic + ');')();
        if (typeof result === "number" && Number.isFinite(result)) return String(Number(result.toFixed(10)));
        return "#UNKNOWN!";
      } catch (error) {
        return "#ERROR!";
      }
    }

      state.spreadsheet.history = state.spreadsheet.history.slice(-40);
      state.spreadsheet.historyIndex = state.spreadsheet.history.length - 1;
    }

    function recordBodyActionProof(state, proof) {
      const normalized = Object.assign({
        attempted: true,
        method: "BodyActionRegistry",
        busyReleased: true,
        ts: isoNow()
      }, proof || {});
      state.bodyActionProofs = (state.bodyActionProofs || []).concat([normalized]).slice(-60);
      return normalized;
    }

    function applyCellUpdate(state, row, col, raw, sourceLabel) {
      const cells = getSheetCells(state);
      if (!cells[row]) cells[row] = {};
      const prior = cells[row][col] || { format: {} };
      if (String(prior.raw || "") === String(raw || "")) {
        state.view.selectedCell = { row, col };
        state.view.formulaInput = raw;
        return false;
      }
      const display = evaluateFormula(state, raw);
      cells[row][col] = {
        raw,
        display,
        format: prior.format || {}
      };
      state.view.selectedCell = { row, col };
      state.view.formulaInput = raw;

      const opcode = sourceLabel === "formula-blur" ? "EDIT.COMMIT_ON_BLUR" : "SHEET.CELL_WRITE";
      const write = writeDeltaToCrystal(
        state,
        "arm-spreadsheet",
        {
          op: opcode,
          cell: cellRef(row, col),
          raw,
          display,
          ts: isoNow(),
          source: sourceLabel || "body"
        },
        "Body",
        opcode
      );
      primeAddRef(state, "<" + write.crystal.fullName + ":block:" + write.block.blockNum + ">", "arm-spreadsheet");
      recordBodyActionProof(state, {
        op: opcode,
        cell: cellRef(row, col),
        coordinate: "<" + write.crystal.fullName + ":block:" + write.block.blockNum + ">",
        verified: getSheetCells(state)[row] && getSheetCells(state)[row][col] && String(getSheetCells(state)[row][col].raw || "") === String(raw || ""),
        ref: "events.body.action.spreadsheet"
      });
      dispatchSense(state, raw.startsWith("=") ? "formula_entry" : "cell_edit_commit", { cell: cellRef(row, col), raw });
      if (String(display).startsWith("#")) {
        dispatchSense(state, "formula_error", { cell: cellRef(row, col), raw, isError: true });
      }
      commitHistorySnapshot(state);
      return true;
    }

    function commitTextDraftOnBlur(state, field, value, options) {
      state.view.committedDrafts = state.view.committedDrafts || {};
      const prior = state.view.committedDrafts[field] || "";
      const next = String(value || "");
      if (String(prior) === next) return false;
      state.view.committedDrafts[field] = next;
      const redact = options && options.redact;
      const payload = {
        op: "EDIT.COMMIT_ON_BLUR",
        field,
        value: redact ? undefined : next,
        charCount: next.length,
        redacted: Boolean(redact),
        ts: isoNow()
      };
      const write = writeDeltaToCrystal(state, "senses", payload, "Body", "EDIT.COMMIT_ON_BLUR");
      primeAddRef(state, "<" + write.crystal.fullName + ":block:" + write.block.blockNum + ">", "senses");
      return true;
    }

    function applyFormat(state, formatPatch) {
      const selected = state.view.selectedCell;
      const row = selected.row;
      const col = selected.col;
      const cells = getSheetCells(state);
      if (!cells[row]) cells[row] = {};
      if (!cells[row][col]) cells[row][col] = { raw: "", display: "", format: {} };
      cells[row][col].format = Object.assign({}, cells[row][col].format || {}, formatPatch);
      const write = writeDeltaToCrystal(
        state,
        "arm-spreadsheet",
        { op: "FORMAT", cell: cellRef(row, col), patch: formatPatch, ts: isoNow() },
        "Body",
        "SHEET.FORMAT"
      );
      primeAddRef(state, "<" + write.crystal.fullName + ":block:" + write.block.blockNum + ">", "arm-spreadsheet");
      recordBodyActionProof(state, {
        op: "SHEET.FORMAT",
        cell: cellRef(row, col),
        patch: formatPatch,
        coordinate: "<" + write.crystal.fullName + ":block:" + write.block.blockNum + ">",
        verified: Boolean(getSheetCells(state)[row] && getSheetCells(state)[row][col]),
        ref: "events.body.action.spreadsheet"
      });
      dispatchSense(state, "format_change", { cell: cellRef(row, col), patch: formatPatch });
      commitHistorySnapshot(state);
    }

    function undo(state) {
      if (state.spreadsheet.historyIndex <= 0) return;
      state.spreadsheet.historyIndex -= 1;
      state.spreadsheet.cells = deepCopy(state.spreadsheet.history[state.spreadsheet.historyIndex]);
      dispatchSense(state, "undo", {});
    }

    function redo(state) {
      if (state.spreadsheet.historyIndex >= state.spreadsheet.history.length - 1) return;
      state.spreadsheet.historyIndex += 1;
      state.spreadsheet.cells = deepCopy(state.spreadsheet.history[state.spreadsheet.historyIndex]);
      dispatchSense(state, "redo", {});
    }

    function exportCsv(state) {
      const lines = [];
      for (let row = 0; row < ROWS; row++) {
        const cols = [];
        for (let col = 0; col < COLS; col++) {
          const raw = getCellRaw(state, row, col);
          cols.push('"' + String(raw).replace(/"/g, '""') + '"');
        }
        lines.push(cols.join(","));
      }
      const csv = lines.join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mantle-sheet.csv";
      a.click();
      URL.revokeObjectURL(url);
      dispatchSense(state, "export_csv", { rows: ROWS, cols: COLS });
      addMessage(state, "system", "CSV export generated for the active sheet.");
    }

    function beginDispatch(state, summary, armName) {
      const seq = state.dispatches.length + 1;
      const intention = mindWrite(state, "brain", "DISPATCH.INTENTION [" + seq + "]: " + summary, "MIND", "DISPATCH.INTENTION");
      const delegated = mindWrite(state, "brain", "DISPATCH.DELEGATED [" + seq + "]: " + (armName || "arm-spreadsheet"), "MIND", "DISPATCH.DELEGATED");
      const record = {
        seq,
        armName: armName || "arm-spreadsheet",
        summary,
        intentionRef: intention ? "<" + intention.crystal.fullName + ":block:" + intention.block.blockNum + ">" : null,
        delegatedRef: delegated ? "<" + delegated.crystal.fullName + ":block:" + delegated.block.blockNum + ">" : null,
        notifiedRef: null,
        completedRef: null,
        ts: isoNow(),
        status: "OPEN"
      };
      state.dispatches.unshift(record);
      addMessage(state, "system", "PRIME.DELEGATE dispatch #" + seq + " to " + record.armName + ".");
      return record;
    }

    function completeDispatch(state, dispatchRecord, resultSummary) {
      const notified = writeDeltaToCrystal(state, "brain", "DISPATCH.NOTIFIED [" + dispatchRecord.seq + "]: Body observed arm result.", "Body", "DISPATCH.NOTIFIED");
      const completed = writeDeltaToCrystal(state, "brain", "DISPATCH.COMPLETED [" + dispatchRecord.seq + "]: " + resultSummary, "Body", "DISPATCH.COMPLETED");
      dispatchRecord.notifiedRef = "<" + notified.crystal.fullName + ":block:" + notified.block.blockNum + ">";
      dispatchRecord.completedRef = "<" + completed.crystal.fullName + ":block:" + completed.block.blockNum + ">";
      dispatchRecord.status = "COMPLETED";
      dispatchRecord.completedAt = isoNow();
      addMessage(state, "system", "LIMB.REPORT coordinate=" + dispatchRecord.completedRef + " for dispatch #" + dispatchRecord.seq + ".");
      addMessage(state, "system", "PRIME.SYNTHESIS dispatch #" + dispatchRecord.seq + " synthesized from " + dispatchRecord.completedRef + ".");
    }

    function runSpreadsheetArm(state, plan) {
      if (plan.type === "setCell") {
        applyCellUpdate(state, plan.row, plan.col, plan.value, "mind-dispatch");
        return "Wrote " + plan.value + " to " + cellRef(plan.row, plan.col) + ".";
      }
      if (plan.type === "clearCell") {
        applyCellUpdate(state, plan.row, plan.col, "", "mind-dispatch");
        return "Cleared " + cellRef(plan.row, plan.col) + ".";
      }
      if (plan.type === "demoSheet") {
        const samples = [
          ["A1", "Item"], ["B1", "Amount"], ["C1", "Status"],
          ["A2", "Hosting"], ["B2", "120"], ["C2", "Paid"],
          ["A3", "Design"], ["B3", "95"], ["C3", "Pending"],
          ["A4", "Support"], ["B4", "80"], ["C4", "Planned"],
          ["A5", "Total"], ["B5", "=SUM(B2:B4)"], ["C5", "Auto"]
        ];
        samples.forEach(([ref, value]) => {
          const parsed = parseCellRef(ref);
          applyCellUpdate(state, parsed.row, parsed.col, value, "mind-dispatch");
        });
        return "Built a sample budget sheet with formulas and status labels.";
      }
      if (plan.type === "sumRange") {
        const total = evaluateFormula(state, "=SUM(" + plan.range + ")");
        return "The sum for " + plan.range + " is " + total + ".";
      }
      if (plan.type === "describeCell") {
        const raw = getCellRaw(state, plan.row, plan.col);
        const display = getCellDisplay(state, plan.row, plan.col);
        if (!raw) return cellRef(plan.row, plan.col) + " is currently empty.";
        return cellRef(plan.row, plan.col) + " stores '" + raw + "' and displays '" + display + "'.";
      }
      if (plan.type === "summarizeSheet") {
        return summarizeSheet(state);
      }
      return "The spreadsheet arm received the task but had no matching routine.";
    }

    function summarizeSheet(state) {
      const cells = getSheetCells(state);
      let used = 0;
      let formulas = 0;
      const previews = [];
      Object.keys(cells).forEach((rowKey) => {
        const cols = cells[rowKey] || {};
        Object.keys(cols).forEach((colKey) => {
          const cell = cols[colKey];
          if (cell && (cell.raw || cell.display)) {
            used += 1;
            if (String(cell.raw).startsWith("=")) formulas += 1;
            if (previews.length < 6) previews.push(cellRef(Number(rowKey), Number(colKey)) + "=" + truncate(cell.display, 24));
          }
        });
      });
      if (!used) return "The active sheet is blank.";
      return "The active sheet uses " + used + " cells, including " + formulas + " formulas. Recent values: " + previews.join(", ") + ".";
    }

    function parseMindIntent(state, text) {
      const input = String(text || "").trim();
      const lower = input.toLowerCase();
      const setMatch = input.match(/(?:set|write|put)\s+([A-Z]+\d+)\s+(?:to|=)?\s*(.+)$/i);
      if (setMatch) {
        const parsed = parseCellRef(setMatch[1]);
        if (parsed) return { type: "setCell", row: parsed.row, col: parsed.col, value: setMatch[2].trim() };
      }
      const clearMatch = input.match(/(?:clear|erase)\s+([A-Z]+\d+)$/i);
      if (clearMatch) {
        const parsed = parseCellRef(clearMatch[1]);
        if (parsed) return { type: "clearCell", row: parsed.row, col: parsed.col };
      }
      const sumMatch = input.match(/sum\s+([A-Z]+\d+:[A-Z]+\d+)/i);
      if (sumMatch) return { type: "sumRange", range: sumMatch[1].toUpperCase() };
      const describeMatch = input.match(/(?:what(?:'s| is) in|show|describe)\s+([A-Z]+\d+)/i);
      if (describeMatch) {
        const parsed = parseCellRef(describeMatch[1]);
        if (parsed) return { type: "describeCell", row: parsed.row, col: parsed.col };
      }
      if (lower.includes("sample") || lower.includes("demo") || lower.includes("example budget")) {
        return { type: "demoSheet" };
      }
      if (lower.includes("summary") || lower.includes("summarize")) {
        return { type: "summarizeSheet" };
      }
      if (lower.includes("body program") || lower.includes("load program")) {
        return { type: "loadBodyProgram", tag: lower.includes("health") ? "maintenance" : "exploration" };
      }
      if (lower.includes("rebirth")) {
        return { type: "rebirth" };
      }
      return { type: "chat" };
    }

    function runLocalMind(state, userText) {
      const intent = parseMindIntent(state, userText);
      const primerHash = crc8(bodyEntryContentToText(state.bodyEntries["bodyentry.000"]));
      mindWrite(state, "thoughts", "THOUGHT.NORMAL [" + primerHash + "]: Interpreting user request '" + truncate(userText, 120) + "'.", "MIND", "THOUGHT.NORMAL");

      if (state.starved) {
        const reply = "MIND is in starvation mode. The Body can still edit cells directly, but chat dispatch is paused until resources are restored.";
        addMessage(state, "assistant", reply);
        return;
      }

      if (intent.type === "rebirth") {
        rebirth(state, "User requested explicit rebirth planning.");
        addMessage(state, "assistant", "Rebirth ceremony completed. Inheritance updated, awakening re-run, and ancestral cubes remained referenceable.");
        return;
      }

      if (intent.type === "chat") {
        const reply = summarizeSheet(state) + " I can also set cells for you with prompts like 'set B4 to 120', inspect a cell, compute a sum, build a demo sheet, or trigger a rebirth.";
        addMessage(state, "assistant", reply);
        return;
      }
      if (intent.type === "loadBodyProgram") {
        const programRef = findProgramRefs(state, intent.tag)[0];
        const result = programRef ? loadBodyProgram(state, programRef) : "No matching BODY program was available to load.";
        addMessage(state, "assistant", result);
        return;
      }

      const dispatchRecord = beginDispatch(state, "Spreadsheet request: " + intent.type, "arm-spreadsheet");
      const result = runSpreadsheetArm(state, intent);
      completeDispatch(state, dispatchRecord, result);
      addMessage(state, "assistant", result);
    }

    function rebirth(state, reason) {
      state.rebirthCount += 1;
      state.generation += 1;
      state.bodyEntries["bodyentry.003"].content =
        "GEN-" + String(state.generation).padStart(3, "0") + ": " + reason + "\n" +
        "Inherited summary: " + summarizeSheet(state);
      writeDeltaToCrystal(
        state,
        "events",
        { event: "SYS.REBIRTH", ts: isoNow(), generation: state.generation, reason },
        "Body",
        "EVENTS.REBIRTH"
      );
      // v2.3 (M4) — rebirth the live VCW Cube in lockstep: seal the Prime cube → ANCESTRAL
      // (read-only, still addressable via <genN.band.N>), genesis a new Prime, write the INHERIT
      // discovery. Fail-open so a substrate hiccup never aborts the crystal-level ceremony.
      try {
        if (ORGANISM) {
          ORGANISM.rebirth(null, reason || "rebirth");
          state.lineageIndex = ORGANISM.body.lineageIndex;
          state.primeGeneration = ORGANISM.prime.generation;
        }
      } catch (error) { console.warn("cube rebirth failed (crystal rebirth continues)", error); }
      awakeningCeremony(state, "rebirth");
      dispatchSense(state, "rebirth_signal", { generation: state.generation });
    }

    function logHeartbeatExecution(state, opcode, summary, detail) {

    function compactEventsToFacts(state) {
      const events = activeCrystal(state, "events");
      const facts = activeCrystal(state, "facts");
      const immune = activeCrystal(state, "immune");
      const recent = events.blocks.slice(-10).map((block) => block.opcode).join(", ");
      const block = appendCrystalBlock(facts, {
        compactedFrom: events.fullName,
        summary: recent || "No recent events to compact.",

      }, "arm-maintenance", "HB.COMPACT");
      appendCrystalBlock(immune, JSON.stringify({

        target: "<" + facts.fullName + ":block:" + block.blockNum + ">",

      }), "arm-maintenance", "IMMUNE.LOG");
      return "Compacted recent events into facts and logged HB.COMPACT.";
    }

    function loadBodyProgram(state, programRef) {
      const payload = readCrystalRefPayload(state, programRef);
      if (!payload || payload.type !== "BODY_PROGRAM") {
        return "Program load skipped because the VCW reference did not resolve to a BODY_PROGRAM.";
      }
      const limb = {
        name: payload.name,
        programRef,
        model: null,
        instructions: payload.instructions,
        allowedBindings: payload.allowedBindings || [],
        ts: isoNow()
      };
      state.bodyProgramLimbs.unshift(limb);
      state.bodyProgramLimbs = state.bodyProgramLimbs.slice(0, 20);

      const bindingResults = [];
      (payload.allowedBindings || []).forEach((bindingName) => {
        if (bindingName === "summarizeSheet") bindingResults.push(summarizeSheet(state));
        if (bindingName === "logSystem") bindingResults.push("Program logged its own execution context.");
        if (bindingName === "daydreamIdeas") bindingResults.push(daydreamIdeas(state));
        if (bindingName === "reviewPendingSignificant") bindingResults.push(reviewPendingSignificant(state));
        if (bindingName === "performMaintenance") bindingResults.push(performMaintenance(state));
        if (ZOMBIE_PRIMITIVES.includes(bindingName)) bindingResults.push(JSON.stringify(executeZombiePrimitive(state, bindingName, payload.bindingArgs && payload.bindingArgs[bindingName])));
      });

      const dispatchRecord = beginDispatch(state, "BODY program load: " + payload.name, "body-programs");
      completeDispatch(state, dispatchRecord, "Loaded BODY program " + payload.name + " without remote MIND.");
      writeDeltaToCrystal(
        state,
        "body-programs",
        {
          op: "PROGRAM.LOAD",
          name: payload.name,
          programRef,
          model: null,
          allowedBindings: payload.allowedBindings || [],
          results: bindingResults,
          ts: isoNow()
        },
        "Body",
        "PROGRAM.LOAD"
      );
      return "Loaded BODY program '" + payload.name + "' with no MIND model and ran " + (payload.allowedBindings || []).length + " binding(s).";
    }

    function performMaintenance(state) {
      const immune = activeCrystal(state, "immune");
      Object.values(state.crystals).forEach((crystal) => {
        const badBlocks = crystal.blocks.filter((block) => crc8(block.payload) !== block.crc).map((block) => block.blockNum);
        if (badBlocks.length) {
          appendCrystalBlock(immune, JSON.stringify({
            type: "RECALL_ERROR",
            crystal: crystal.fullName,
            badBlocks,
            ts: isoNow()
          }), "arm-maintenance", "IMMUNE.LOG");
        }
        if (crystal.fillLevel >= 0.9) {
          appendCrystalBlock(immune, JSON.stringify({
            type: "CONFIRMED",
            concern: "FILL_CRITICAL",
            crystal: crystal.fullName,
            fill: crystal.fillLevel,
            ts: isoNow()
          }), "arm-maintenance", "IMMUNE.LOG");
        }
      });
      const recentThoughts = activeCrystal(state, "thoughts").blocks.slice(-8);
      const recentErrors = state.pendingSignificant.filter((event) => /error|anomaly|critical/i.test(event.eventType)).length;
      if (recentErrors || recentThoughts.some((block) => /contradict|incorrect|wrong|drift/i.test(block.payload))) {
        appendCrystalBlock(immune, JSON.stringify({
          type: "CONTRADICTION",
          concern: "DRIFT_SIGNAL",
          recentErrors,
          ts: isoNow()
        }), "arm-maintenance", "IMMUNE.LOG");
        dispatchSense(state, "immune_anomaly", { recentErrors });
      }
      writeDeltaToCrystal(
        state,
        "arm-maintenance",
        { op: "MAINTENANCE", heartbeat: state.heartbeatCount, ts: isoNow(), crystals: Object.keys(state.crystals).length },
        "arm-maintenance",
        "HB.COMPILE"
      );
      state.lastMaintenanceHeartbeat = state.heartbeatCount;
      return "Maintenance limb completed a health sweep.";
    }

    function executeHeartbeatTask(state, task) {
      const opcode = task.opcode || "HB.HEALTH";
      if (opcode === "HB.HEALTH") return "Heartbeat health check completed.";
      if (opcode === "HB.CACHE") return "Heartbeat cache touch recorded.";
      if (opcode === "HB.IMMUNE") return performMaintenance(state);
      if (opcode === "HB.COMPACT") return compactEventsToFacts(state);
      if (opcode === "HB.REVIEW") return reviewPendingSignificant(state);
      if (opcode === "HB.DAYDREAM") return daydreamIdeas(state);
      if (opcode === "HB.OPTIMIZE") return optimizeNotes(state);
      if (opcode === "HB.PROGRAM_LOAD") return loadBodyProgram(state, task.args && task.args.programRef);
      return "Skipped unknown heartbeat task " + opcode + ".";
    }

    function buildHeartbeatPlan(state, cap) {
      const queue = [];
      const reasons = [];
      const idle = idleMinutes(state);
      const quiet = isQuietHour(state);
      const healthProgramRef = findProgramRefs(state, "maintenance")[0];
      const idleProgramRef = findProgramRefs(state, "exploration")[0];
      const highFill = Object.values(state.crystals).some((crystal) => crystal.fillLevel >= 0.9);
      const openDispatches = state.dispatches.filter((dispatch) => dispatch.status !== "COMPLETED").length;
      const dueMaintenance = (state.heartbeatCount - state.lastMaintenanceHeartbeat) >= 4;

      queue.push({ opcode: "HB.HEALTH", summary: "Body health and presence check" });
      reasons.push("Health checks anchor every heartbeat.");
      if (queue.length < cap) queue.push({ opcode: "HB.CACHE", summary: "Keep heartbeat context warm" });

      if (state.pendingSignificant.length && queue.length < cap) {
        queue.push({ opcode: "HB.REVIEW", summary: "Review pending significant events" });
        reasons.push("Pending significant events were detected.");
      }
      if ((highFill || dueMaintenance || openDispatches > 0) && queue.length < cap) {
        queue.push({ opcode: "HB.IMMUNE", summary: dueMaintenance ? "Planner-selected maintenance sweep" : "Urgent maintenance sweep" });
        reasons.push(highFill ? "Crystal fill pressure requires maintenance." : dueMaintenance ? "Maintenance has been deferred for several heartbeats." : "Open dispatches warrant a quick maintenance review.");
      }
      if (dueMaintenance && queue.length < cap) {
        queue.push({ opcode: "HB.COMPACT", summary: "Atomic cross-shard compaction review" });
        reasons.push("Maintenance can compact events into facts when the user is not blocked.");
      }
      if (state.pendingSignificant.length > 1 && healthProgramRef && queue.length < cap) {
        queue.push({ opcode: "HB.PROGRAM_LOAD", summary: "Load health sweep BODY program", args: { programRef: healthProgramRef } });
        reasons.push("The Body can load a maintenance-oriented VCW program without an API call.");
      }
      if (idle >= 15 && queue.length < cap) {
        queue.push({ opcode: "HB.OPTIMIZE", summary: "Log responsiveness-aware optimization notes" });
        reasons.push("The user has been idle long enough for a deeper planning pass.");
      }
      while (quiet && idle >= 20 && queue.length < cap && idleProgramRef) {
        queue.push({ opcode: "HB.PROGRAM_LOAD", summary: "Load idle insight BODY program", args: { programRef: idleProgramRef } });
        reasons.push("Quiet-hour idle time allows longer BODY-only exploration.");
        if (queue.length < cap) queue.push({ opcode: "HB.DAYDREAM", summary: "Repeat daydream exploration for later ideas" });
      }
      if (!quiet && idle >= 15 && queue.length < cap) {
        queue.push({ opcode: "HB.DAYDREAM", summary: "Short idea-generation pass" });
        reasons.push("Idle time permits a small exploratory pass without taking the full quiet-hour batch.");
      }

      return {
        queue: normalizeHeartbeatQueue(queue),
        summary: reasons.join(" ").trim() || "Heartbeat planner kept the next pulse short to stay responsive."
      };
    }

    function heartbeat(state) {
      state.heartbeatCount += 1;
      dispatchSense(state, "heartbeat_tick", { heartbeat: state.heartbeatCount });
      const highFill = Object.values(state.crystals).filter((crystal) => crystal.fillLevel >= 0.9);

                  </div>
                </div>

                <div class="terminal-toolbar" style="justify-content:space-between;">
                  <div class="terminal-switches">
                    <button class="terminal-button ${STATE.view.terminalTab === "chat" ? "active" : ""}" data-action="show-chat-log">Chat Log</button>
                    <button class="terminal-button ${STATE.view.terminalTab === "system" ? "active" : ""}" data-action="show-system-log">System Log</button>
                  </div>
                  <div class="terminal-actions">
                    <select id="model-select" style="width:auto;min-width:220px;background:#10141c;color:#eff5ff;border-color:rgba(255,255,255,0.12);">
                      ${modelOptions}
                    </select>
                    <button class="terminal-button" data-action="load-key-file">Load OpenRouter Key</button>
                    <button class="terminal-button ghost" data-action="clear-key">Use Local MIND</button>
                    <button class="terminal-button ghost" data-action="toggle-starvation">${STATE.starved ? "Restore Resources" : "Starve MIND"}</button>
                    <button class="terminal-button ghost" data-action="heartbeat">Heartbeat</button>
                    <button class="terminal-button ghost" data-action="rebirth">Rebirth</button>
                    <button class="terminal-button ghost" data-action="reset">Reset</button>
                  </div>
                </div>

                <div class="status-row terminal-meta">
                  <span>Provider: ${STATE.openRouter.enabled && STATE.openRouter.apiKey ? "OpenRouter" : "Local"}</span>
                  <span>${STATE.openRouter.budget ? "Mind budget " + STATE.openRouter.budget : "No key budget loaded"}</span>
                  <span>Prime refs ${STATE.prime.refs.length}</span>
                  <span>Dispatches ${STATE.dispatches.length}</span>
                  <span>Thoughts ${activeCrystal(STATE, "thoughts").blocks.length}</span>
                </div>

                <div class="terminal-body">
                  ${STATE.view.terminalTab === "chat"
                    ? (chatMessages.length
                      ? chatMessages.slice(-18).map((message) => `
                          <div class="chat-row ${escapeHtml(message.role)}">
                            <div class="row-headline">
                              <strong>${escapeHtml(message.role)}</strong>
                              <small>${escapeHtml(shortTime(message.ts))}</small>
                            </div>
                            <div>${escapeHtml(message.text)}</div>
                          </div>
                        `).join("")
                      : `<div class="terminal-note">No conversation yet. Ask the AppAI to edit or inspect the sheet.</div>`)
                    : (systemEntries.length
                      ? systemEntries.map((entry) => `
                          <div class="system-row ${entry.level === "bad" ? "bad" : entry.level === "warn" ? "warn" : ""}">
                            <div class="row-headline">
                              <strong>${escapeHtml(entry.title)}</strong>
                              <small>${escapeHtml(shortTime(entry.ts))}</small>
                            </div>
                            <div>${escapeHtml(entry.text)}</div>
                          </div>
                        `).join("")
                      : `<div class="terminal-note">System log is currently empty.</div>`)}
                </div>

                <div class="terminal-compose">
                  <textarea id="chat-input" placeholder="Ask the spreadsheet AppAI to inspect, explain, or change something...">${escapeHtml(STATE.view.chatInput || "")}</textarea>
                  <div class="terminal-actions">
                    <button class="terminal-button active" data-action="send-chat">Send</button>
                    <button class="terminal-button" data-action="summarize">Summarize Sheet</button>
                    <button class="terminal-button ghost" data-action="toggle-terminal">Close Terminal</button>
                  </div>
                </div>
              </div>
            </div>

            <input id="openrouter-file-input" class="hidden-input" type="file" accept=".txt,text/plain">
          </div>
        </div>
      `;

      bindEvents();
      saveState();
    }

    function bindEvents() {
      document.querySelectorAll("[data-action='select-cell']").forEach((button) => {
        button.addEventListener("click", () => {
          const row = Number(button.getAttribute("data-row"));
          const col = Number(button.getAttribute("data-col"));
          STATE.view.selectedCell = { row, col };
          STATE.view.formulaInput = getCellRaw(STATE, row, col);
          dispatchSense(STATE, "cell_click", { cell: cellRef(row, col) });
          renderApp();
        });
      });

      const formulaInput = document.getElementById("formula-input");
      if (formulaInput) {
        formulaInput.addEventListener("focus", () => {
          dispatchSense(STATE, "focus", { field: "formula-input", cell: cellRef(STATE.view.selectedCell.row, STATE.view.selectedCell.col) });
          saveState();
        });
        formulaInput.addEventListener("input", (event) => {
          STATE.view.formulaInput = event.target.value;
          saveState();
        });
        formulaInput.addEventListener("blur", () => {
          commitFormulaOnBlur();
        });
        formulaInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") commitFormula();
        });
      }

      const chatInput = document.getElementById("chat-input");
      if (chatInput) {
        chatInput.addEventListener("focus", () => {
          dispatchSense(STATE, "focus", { field: "chat-input" });
          saveState();
        });
        chatInput.addEventListener("input", (event) => {
          STATE.view.chatInput = event.target.value;
          saveState();
        });
        chatInput.addEventListener("blur", () => {
          commitTextDraftOnBlur(STATE, "terminal.chatInput", STATE.view.chatInput || "", { redact: true });
          saveState();
        });
        chatInput.addEventListener("keydown", (event) => {
          if ((event.ctrlKey || event.metaKey) && event.key === "Enter") sendChat();
        });
      }

      const colorInput = document.getElementById("color-input");
      if (colorInput) colorInput.addEventListener("input", (event) => { STATE.view.selectedColor = event.target.value; saveState(); });

      const fillInput = document.getElementById("fill-input");
      if (fillInput) fillInput.addEventListener("input", (event) => { STATE.view.selectedFill = event.target.value; saveState(); });

      const modelSelect = document.getElementById("model-select");
      if (modelSelect) {
        modelSelect.addEventListener("change", (event) => {
          STATE.openRouter.selectedModel = event.target.value;
          STATE.openRouter.status = STATE.openRouter.enabled ? "OpenRouter model changed" : "Local fallback active";
          saveState();
        });
      }

      const fileInput = document.getElementById("openrouter-file-input");
      if (fileInput) {
        fileInput.addEventListener("change", async (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          try {
            const text = await file.text();
            const parsed = parseOpenRouterKeyFile(text);
            if (!parsed.valid || !parsed.apiKey) {
              addMessage(STATE, "system", "SYS.KEY_REJECT: selected file did not contain a usable OpenRouter catalog/key. Live key state was preserved.");
            } else {
              STATE.openRouter.apiKey = parsed.apiKey;
              STATE.openRouter.enabled = true;
              STATE.openRouter.source = file.name;
              STATE.openRouter.budget = parsed.budget;
              STATE.openRouter.models = parsed.models;
              STATE.openRouter.threadKeys = parsed.threadKeys || [];
              STATE.openRouter.modelBudgetHints = parsed.modelBudgetHints || {};
              STATE.openRouter.selectedModel = parsed.models[0] || STATE.openRouter.selectedModel || "deepseek/deepseek-v3.2";
              STATE.openRouter.keyFingerprint = keyFingerprint(parsed.apiKey);
              STATE.openRouter.status = "OpenRouter Mind key loaded; testing provider path";
              STATE.view.terminalOpen = true;
              addMessage(STATE, "system", "SYS.KEY_IMPORT: OpenRouter Mind key metadata loaded from " + file.name + " fingerprint=" + STATE.openRouter.keyFingerprint + ".");
              const test = await testOpenRouterProvider(STATE);
              addMessage(STATE, "system", test.ok
                ? "SYS.KEY_READY: normal chat provider path verified for " + STATE.openRouter.selectedModel + "."
                : "SYS.KEY_REJECT: provider test failed; local-only mode remains active.");
            }
          } catch (error) {
            addMessage(STATE, "system", "Unable to load the selected key file. " + error.message);
          }
          event.target.value = "";
          renderApp();
        });
      }

      document.querySelectorAll("[data-action]").forEach((element) => {
        const action = element.getAttribute("data-action");
        if (action === "select-cell") return;
        element.addEventListener("click", () => { void handleAction(action); });
      });
    }

    async function handleAction(action) {
      if (action === "commit-formula") return commitFormula();
      if (action === "send-chat") return sendChat();
      if (action === "summarize") {
        STATE.view.chatInput = "summarize the sheet";
        return sendChat();
      }
      if (action === "toggle-terminal") {
        STATE.view.terminalOpen = !STATE.view.terminalOpen;
        return renderApp();
      }
      if (action === "show-chat-log") {
        STATE.view.terminalOpen = true;
        STATE.view.terminalTab = "chat";
        return renderApp();
      }
      if (action === "show-system-log") {
        STATE.view.terminalOpen = true;
        STATE.view.terminalTab = "system";
        return renderApp();
      }
      if (action === "load-key-file") {
        const input = document.getElementById("openrouter-file-input");
        if (input) input.click();
        return;
      }
      if (action === "clear-key") {
        STATE.openRouter.apiKey = "";
        STATE.openRouter.enabled = false;
        STATE.openRouter.source = "";
        STATE.openRouter.budget = "";
        STATE.openRouter.status = "Local fallback active";
        addMessage(STATE, "system", "OpenRouter key cleared. Local MIND fallback is active.");
        return renderApp();
      }
      if (action === "heartbeat") {
        heartbeat(STATE);
        return renderApp();
      }
      if (action === "toggle-starvation") {
        STATE.starved = !STATE.starved;
        dispatchSense(STATE, STATE.starved ? "starvation" : "resource_restore", { starved: STATE.starved });
        addMessage(STATE, "system", STATE.starved ? "Starvation mode enabled. MIND chat paused." : "Resources restored. MIND chat resumed.");
        return renderApp();
      }
      if (action === "demo-sheet") {
        runLocalMind(STATE, "build a demo sheet");
        return renderApp();
      }
      if (action === "rebirth") {
        rebirth(STATE, "Manual rebirth requested from UI.");
        return renderApp();
      }
      if (action === "reset") {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
        return;
      }
      if (action === "undo") {
        undo(STATE);
        return renderApp();
      }
      if (action === "redo") {
        redo(STATE);
        return renderApp();
      }
      if (action === "bold") {
        const fmt = selectedCellFormat(STATE);
        applyFormat(STATE, { bold: !fmt.bold });
        return renderApp();
      }
      if (action === "italic") {
        const fmt = selectedCellFormat(STATE);
        applyFormat(STATE, { italic: !fmt.italic });
        return renderApp();
      }
      if (action === "text-color") {
        applyFormat(STATE, { color: STATE.view.selectedColor });
        return renderApp();
      }
      if (action === "fill-color") {
        applyFormat(STATE, { fill: STATE.view.selectedFill });
        return renderApp();
      }
      if (action === "export-csv") {
        exportCsv(STATE);
        return renderApp();
      }
    }

    function commitFormula() {
      const selected = STATE.view.selectedCell;
      applyCellUpdate(STATE, selected.row, selected.col, STATE.view.formulaInput || "", "formula-bar");
      renderApp();
    }

    function commitFormulaOnBlur() {
      const selected = STATE.view.selectedCell;
      const changed = applyCellUpdate(STATE, selected.row, selected.col, STATE.view.formulaInput || "", "formula-blur");
      if (changed) addMessage(STATE, "system", "EDIT.COMMIT_ON_BLUR saved " + cellRef(selected.row, selected.col) + ".");
      renderApp();
    }

    async function sendChat() {
      const text = String(STATE.view.chatInput || "").trim();
      if (!text) return;
      STATE.view.terminalOpen = true;
      STATE.view.terminalTab = "chat";
      commitTextDraftOnBlur(STATE, "terminal.chatInput", STATE.view.chatInput || "", { redact: true });
      addMessage(STATE, "user", text);
      dispatchSense(STATE, "user_message", { text });
      await runMind(STATE, text);
      STATE.view.chatInput = "";
      renderApp();
    }

    renderApp();
    setInterval(() => {
      heartbeat(STATE);
      renderApp();
    }, HEARTBEAT_INTERVAL_MS);

    // Dual-flush (HF-B33): per-action saveState() is the checkpoint half; this is the atexit half —
    // flush once more when the tab is hidden or unloading. Fail-open during teardown.
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") { try { saveState(); } catch (_) {} } });
    window.addEventListener("pagehide", () => { try { saveState(); } catch (_) {} });
  </script>
</body>
</html>
