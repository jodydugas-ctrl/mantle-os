     description: Repeat actions a specified number of times or until a condition is met
     use_when: |
     Use LoopAction when the user wants to:
     - Repeat an action X times (e.g., "send 5 SMS messages", "flash torch 3 times")
     - Do something multiple times in a row
     - Iterate until a condition is met
     - Create infinite/endless loops with break conditions

     IMPORTANT: When user says "X times", "repeat", "loop", or "multiple times",
     use LoopAction instead of duplicating the same action multiple times.
     note: |
     Requires matching EndLoopAction. Place all actions to repeat between LoopAction and EndLoopAction.
     Structure in m_actionList: [LoopAction, ...actions to repeat..., EndLoopAction]
     Supports fixed count, variable count, while-do, do-while, and endless loops.
     params:
     m_option:
     - int
