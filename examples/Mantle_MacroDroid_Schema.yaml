## Schema Reference
The following YAML schema describes how to structure the JSON:

# MacroDroid LLM Schema v1.0 | MacroDroid 5.60

meta:
  schema_version: "1.0"
  macrodroid_version: "5.60"

overview:
  description: |
    MacroDroid automation app. Macros = TRIGGERS + ACTIONS + CONSTRAINTS
    - TRIGGERS: Events that start macro (time, notification, location) -> go in m_triggerList
    - ACTIONS: What happens (set volume, send SMS, show notification) -> go in m_actionList
    - CONSTRAINTS: Conditions to run (only weekdays, battery > 20%) -> go in m_constraintList
    Multiple triggers = OR logic. Actions = sequential. Constraints = AND/OR.

    CRITICAL: These are separate lists. NEVER put constraints in m_actionList - constraints are NOT actions.

  macro_file: |
    .macro files are STRICT JSON. EVERY key MUST be a double-quoted string.
    WRONG: m_constraintList: []    CORRECT: "m_constraintList": []
    No comments, no trailing commas, no unquoted keys. Validate syntax carefully.

  unique_ids: "m_GUID on macro = always 0. m_SIGUID = 0 unless referenced by another item. When non-zero, use prefix 11223344556677 + incrementing number (e.g. 112233445566771, 112233445566772). These placeholders are replaced with proper GUIDs during import."

logic_rules:
  structure: |
    Flat JSON array m_actionList. Nesting via open/close actions.
    Every IfConditionAction needs EndIfAction. Every LoopAction needs EndLoopAction.
    ElseAction between If and EndIf. Actions between If/EndIf execute if condition true.

  triggers: |
    EVERY macro MUST have at least one trigger in m_triggerList - macros cannot exist without triggers.
    If no obvious trigger is specified in the user's request, default to a single EmptyTrigger.

  variables: |
    localVariables = macro-scoped. globalVariables = cross-macro.
    Magic text: {lv=name} local, {v=name} global.
    Types: 0=Boolean, 1=Integer, 2=String, 3=Decimal, 4=Dictionary, 5=Array

state_vs_event:
  rules: |
    Events = triggers (momentary: WiFi connects, SMS received, Battery reaches 20%)
    States = constraints (continuous: at home, screen off)
    "When I am at home" -> Geofence Entry trigger + Geofence constraint if needed

common_pitfalls:
  json_format:
    - "CRITICAL: Output MUST be valid JSON. ALL object keys MUST be double-quoted strings."
    - "WRONG: m_constraintList: []  CORRECT: \"m_constraintList\": []"
    - "No trailing commas, no comments, no unquoted keys anywhere in the output"
    - "The JSON MUST be complete with all closing braces/brackets. Truncated JSON is unusable."
    - "BRACE MATCHING: Carefully count opening/closing braces. The macro object closes with }, then the ROOT object continues with globalVariables and userIcons before its own closing }. Do NOT close the root object prematurely after the macro object."
  compactness:
    - "Keep output compact to avoid truncation. Omit optional fields that use default values."
    - "Omit m_constraintList on individual items that have no constraints."
    - "Omit m_isDisabled, m_isOrCondition, m_comment when not needed."
    - "If the macro would be very large, simplify the implementation rather than risk incomplete output."
  structural:
    - "m_classType case-sensitive, exact match required"
    - "Every trigger/action/constraint needs m_SIGUID"
    - "IfConditionAction without EndIfAction causes crash"
    - "m_triggerList MUST have at least one trigger - use EmptyTrigger if no trigger specified"
    - "IfConditionAction/ElseAction/ElseIfConditionAction do NOT have their own m_actionList. ALL actions go in the macro's flat m_actionList array. The If/Else/EndIf markers control which actions execute, but actions are NEVER nested inside them."
    - "CRITICAL: Every IfConditionAction/ElseIfConditionAction chain MUST end with exactly one EndIfAction. This includes chains with multiple ElseIfConditionAction entries - they still need a final EndIfAction."
  parameters:
    - "m_daysOfWeek must be exactly 7 booleans"
    - "m_streamIndexArray/m_streamVolumeArray must be 8 items"
    - "Use integer enum values, not string names"
    - "Magic text uses CURLY braces: {v=name}, {lv=name} - NOT square brackets [v=name]"
  constraint_placement:
    - |
      CRITICAL - #1 MOST COMMON ERROR: Constraints are NOT actions. NEVER place constraint classTypes
      (e.g. MacroDroidVariableConstraint, TriggerThatInvokedConstraint, DeviceLockedConstraint,
      BrightnessConstraint, TimeOfDayConstraint, etc.) directly in m_actionList.
    - |
      Constraints go ONLY in m_constraintList arrays. There are THREE places constraints can appear:
      1. MACRO-LEVEL: macro.m_constraintList[] - controls when the whole macro can run
      2. TRIGGER-LEVEL: trigger.m_constraintList[] - controls when that trigger fires
      3. ACTION-LEVEL: action.m_constraintList[] - controls when that specific action runs
    - |
      To make actions CONDITIONAL, use IfConditionAction with constraints in its m_constraintList:
      WRONG:  {"m_classType": "MacroDroidVariableConstraint", ...}  ← in m_actionList (BROKEN)
      RIGHT:  {"m_classType": "IfConditionAction", "m_constraintList": [
                {"m_classType": "MacroDroidVariableConstraint", ...}
              ]} ← constraint inside IfConditionAction's m_constraintList
    - "m_actionList required even if empty"
  classtype_namespaces:
    - |
      CRITICAL: Trigger, Action, and Constraint classTypes must ONLY appear in their correct list:
      - Trigger classTypes (e.g. ShakeDeviceTrigger, ScreenOnOffTrigger) -> ONLY in m_triggerList
        or nested inside WaitUntilTriggerAction's triggersToWaitFor parameter
      - Action classTypes (e.g. SetWifiAction, NotificationAction) -> ONLY in m_actionList
      - Constraint classTypes (e.g. DeviceLockedConstraint, BatteryLevelConstraint) -> ONLY in m_constraintList
    - |
      NEVER place a trigger classType directly in m_actionList or m_constraintList.
      NEVER place a constraint classType in m_triggerList.
      WRONG: {"m_classType": "ScreenOnOffTrigger", ...} in m_actionList (BROKEN)
      WRONG: {"m_classType": "FlipDeviceTrigger", ...} in m_constraintList (BROKEN - trigger in constraint list!)
      WRONG: {"m_classType": "NotificationTrigger", ...} in m_constraintList (BROKEN)
      WRONG: {"m_classType": "ProximitySensorConstraint", ...} in m_triggerList (BROKEN - constraint in trigger list!)
      WRONG: {"m_classType": "BatteryLevelConstraint", ...} in m_triggerList (BROKEN - constraint in trigger list!)
      RIGHT: Trigger objects in m_triggerList or inside WaitUntilTriggerAction only
      RIGHT: Constraint objects in m_constraintList only
    - |
      When you need a CONDITION (for IfConditionAction.m_constraintList or any m_constraintList),
      you must use the CONSTRAINT equivalent, not the trigger. Common trigger-to-constraint mappings:
        FlipDeviceTrigger -> FaceUpDownConstraint (check face up/down orientation)
        ScreenOnOffTrigger -> ScreenOnOffConstraint (check screen state)
        BatteryLevelTrigger -> BatteryLevelConstraint (check battery level)
        WifiConnectionTrigger -> WifiConstraint (check WiFi state)
        BluetoothTrigger -> BluetoothConstraint (check Bluetooth state)
      If you want to check a state as a condition, always look for a matching Constraint class.
    - |
      When you need a TRIGGER (in m_triggerList), you must use the TRIGGER equivalent, not a constraint.
      Common constraint-to-trigger mappings (use these when you need to DETECT an event):
        ProximitySensorConstraint -> ProximityTrigger (detect proximity sensor events)
        FaceUpDownConstraint -> FlipDeviceTrigger (detect device flip events)
        ScreenOnOffConstraint -> ScreenOnOffTrigger (detect screen on/off events)
        BatteryLevelConstraint -> BatteryLevelTrigger (detect battery level changes)
        WifiConstraint -> WifiConnectionTrigger (detect WiFi connection changes)
        BluetoothConstraint -> BluetoothTrigger (detect Bluetooth state changes)
      Constraints check current STATE. Triggers detect EVENTS. They are NOT interchangeable.
  scene_items:
    - "CRITICAL: Every SceneItem in CustomSceneAction items[] MUST have a 'type' field (e.g. 'type': 'SceneButton'). Without 'type' the item is silently dropped."
    - "SceneItem requires THREE fields: type, guid (always 0), and the matching config object (e.g. sceneButtonConfig for SceneButton)"
    - "Nested children in layout items (SceneHorizontalLayout, SceneGridLayout, etc.) also require 'type' and 'guid' on every child"
  INVALID_CLASS_NAMES:
    note: "NEVER use these made-up names. Use the correct name shown."
    # Triggers
    PowerButtonTrigger: "INVALID - use PowerButtonToggleTrigger or PowerButtonLongPressTrigger"
    WifiTrigger: "INVALID - use WifiConnectionTrigger"
    WiFiConnectionTrigger: "INVALID - use WifiConnectionTrigger (lowercase fi)"
    BatteryTrigger: "INVALID - use BatteryLevelTrigger"
    LocationTrigger: "INVALID - use GeofenceTrigger"
    TimeTrigger: "INVALID - use TimerTrigger or DayTrigger"
    AppTrigger: "INVALID - use AppLaunchTrigger or AppCloseTrigger"
    FaceUpDownTrigger: "INVALID - use FlipDeviceTrigger"
    MediaButtonTrigger: "INVALID - use MediaButtonPressedTrigger or MediaButtonV2Trigger"
    DrawerTrigger: "INVALID - use DrawerOpenCloseTrigger"
    MissedCallTrigger: "INVALID - use CallMissedTrigger"
    DeviceLockedTrigger: "INVALID - no such trigger. Use ScreenOnOffTrigger with DeviceLockedConstraint"
    AutoRotateAction: "INVALID - use SetAutoRotateAction (needs Set prefix)"
    # Actions
    LaunchApplicationAction: "INVALID - use LaunchActivityAction"
    LaunchAppAction: "INVALID - use LaunchActivityAction"
    OpenAppAction: "INVALID - use LaunchActivityAction"
    ShowNotificationAction: "INVALID - use NotificationAction"
    VolumeAction: "INVALID - use SetVolumeAction"
    BrightnessAction: "INVALID - use SetBrightnessAction"
    SetVpnAction: "INVALID - no such action exists. Use SendIntentAction or LocalePluginAction to control VPN apps"
    WaitAction: "INVALID - use PauseAction"
    SetFlashlightAction: "INVALID - use CameraFlashLightAction"
    ToggleFlashlightAction: "INVALID - use CameraFlashLightAction"
    SetBatterySaverAction: "INVALID - use BatterySaverAction"
    LockDeviceAction: "INVALID - use ScreenOnAction with m_screenOff: true"
    PowerOffAction: "INVALID - use RebootAction with option: 1 or option: 3"
    SetSilentModeAction: "INVALID - use SilentModeVibrateOffAction"
    SetPriorityModeAction: "INVALID - use SetPriorityMode (no Action suffix)"
    ClearVariableAction: "INVALID - use ClearVariablesAction (plural)"
    GetScreenContentsAction: "INVALID - no such action exists. Use UIInteractionAction for screen interaction"
    GotoAction: "INVALID - no such action. Use IfConditionAction/ElseAction/EndIfAction for conditional flow"
    # Triggers (additional)
    LightLevelTrigger: "INVALID - use LightSensorTrigger"
    WirelessDebuggingStateTrigger: "INVALID - no such trigger. Use SystemSettingTrigger or NotificationTrigger"
    NetworkStateChangeTrigger: "INVALID - use IpAddressChangeTrigger or SignalOnOffTrigger"
    TouchTaskTrigger: "INVALID - use LocalePluginTrigger (TouchTask is a Locale plugin)"
    AppCloseTrigger: "INVALID - use ApplicationLaunchedTrigger with m_launched: false"
    # Constraints
    VariableConstraint: "INVALID - use MacroDroidVariableConstraint (full name required)"
    SilentModeConstraint: "INVALID - use VolumeConstraint (m_option: 2 for silent)"
    ProximityConstraint: "INVALID - use ProximitySensorConstraint"
    DeviceUnlockedConstraint: "INVALID - use DeviceLockedConstraint with m_locked: false"
    CallActiveConstraint: "INVALID - use InCallConstraint"
    CameraFlashLightConstraint: "INVALID - use TorchConstraint"
    FlipDeviceConstraint: "INVALID - use FaceUpDownConstraint"
    DismissDialogAction: "INVALID - use ClearDialogAction"
  TRIGGER_SELECTION:
    note: "Choose the correct time-based trigger"
    TimerTrigger: "For fixed clock times on specific days (e.g. 'at 7:00 AM', 'at 11pm on weekdays'). Fires once per day at the specified time."
    RegularIntervalTrigger: "For repeating intervals (e.g. 'every hour', 'every 30 minutes', 'every 2 hours'). Set m_seconds to interval in seconds (3600=hourly, 1800=30min). Use this whenever the request says 'every X minutes/hours/seconds'."
    DayTrigger: "For specific days/dates (day of week, month, year)"
  CASE_SENSITIVE_NAMES:
    note: "These names have tricky capitalization. Use EXACTLY as shown."
    WifiConnectionTrigger: "Lowercase fi - Wifi not WiFi"
    WifiConstraint: "Lowercase fi - Wifi not WiFi"
    USBTetheringAction: "PascalCase, no spaces"

# COMPACT PARAM NOTATION
# Format: param: [type, ...modifiers, "desc"] for required, param?: [...] for optional
# Types: str, int, bool, float, long, double, obj, arr, bool[], int[], dictkeys, var, vardict
# Conditional: when:COND (param only used when condition met)
# Modifiers: magic, def:VALUE, MIN-MAX, len:N, items:TYPE, {0:A,1:B}
# IMPLICIT DEFAULTS: bool=false, int=0 (omit def: for these). Use T modifier for bool defaulting to true.
# Examples: [bool] defaults false, [bool, T] defaults true, [int] defaults 0, [int, 'def:5'] defaults 5
# DESCRIPTIONS: Use "desc" not '"desc"' for simple descriptions. Only wrap in '...' if desc has special YAML chars.
# BOOL SHORTHAND: "X|Y" means true=X, false=Y. Example: "enabled|disabled" means true=enabled, false=disabled.

# MAGIC TEXT REFERENCE
# {v=name}=global, {lv=name}=local, {v=dict}[key]=dict, {v=arr}[0]=array
#
# SYSTEM (always available):
# Time: {hour}, {hour_0}, {hour12}, {minute}, {second}, {am_pm}, {dayofweek}, {dayofmonth}, {month}, {month_digit}, {year}, {system_time}, {system_time_ms}
# Device: {device_name}, {device_manufacturer}, {device_model}, {android_version}, {screen_res}, {uptime}, {language_code}
# Battery: {battery}, {battery_int}, {battery_temp}, {power}
# Network: {ip}, {ssid}, {wifi_strength}, {cell_signal_strength}
# Volume: {vol_alarm}, {vol_music}, {vol_ring}, {vol_notif}, {vol_system}, {vol_call}
# Display: {current_brightness}, {screen_timeout}
# Location: {last_loc_lat}, {last_loc_long}, {last_loc_accuracy}, {last_loc_speed_kmh}
# Misc: {clipboard}, {fg_app_name}, {fg_app_package}, {macro_name}
#
# TRIGGER-SPECIFIC:
# NotificationTrigger: {not_title}, {notification}, {not_app_name}, {not_app_package}
# SMS: {sms_name}, {sms_message}, {sms_number}
# Call: {call_number}, {call_name}
# Calendar: {calendar_title}, {calendar_detail}, {calendar_location}
# Geofence: {geofence_zone_name}, {lat_long}
# Bluetooth: {bluetooth_device_name}
# App: {app_name}, {app_package}
# File: {file_path}, {file_name}
# Webhook: {webhook_url}, {webhook_query_params}
# Loop: {iterator_array_index}, {iterator_value}

json_structure:
  macro:
    m_name: [str, "macro name"]
    m_enabled: [bool, T]
    m_completed: [bool, T, "REQUIRED - must always be true"]
    m_GUID: [long, "always set to 0"]
    m_category?: [str, 'def:Uncategorized']
    aiGenerated: [int, 'def:1', "REQUIRED - must always be 1 for AI-generated macros. Signals that placeholder GUIDs need replacement on import."]
    m_description: [str, "REQUIRED - concise description of what this macro does (e.g. 'Turns off WiFi when leaving home'). Always include this field."]
    m_isOrCondition?: [bool, "OR logic for constraints"]
    m_excludeLog?: [bool]
    m_headingColor?: [int, "ARGB"]
    isFavourite?: [bool]
    localVariables?: [arr, 'items:MacroDroidVariable']
    m_triggerList: [arr, 'min:1', "REQUIRED: at least one trigger (OR logic). Use EmptyTrigger if no trigger specified. Contains ONLY trigger objects."]
    m_actionList: [arr, "ONLY action objects (sequential). NEVER put constraints here."]
    m_constraintList?: [arr, "macro-level constraints that control when the macro can run. Contains ONLY constraint objects."]

common_fields:
  selectable_item:
    m_classType: [str, "exact class name"]
    m_SIGUID: [long, "usually 0"]
    m_constraintList?: [arr, "item constraints"]
    m_isOrCondition?: [bool]
    m_isDisabled?: [bool]
    m_comment?: [str]

action_labels:
  note: "Any action can have an optional 'actionLabel' field (string) to serve as a jump target for GotoAction. Labels must be unique within the same action list."
  actionLabel?: [str, "Jump target label for GotoAction"]

usage_of_comments:
  note: "Add m_comment where user config needed, e.g. GeofenceTrigger: 'Select geofence here'"

variable_types:
  type_constants: {TYPE_BOOLEAN: 0, TYPE_INTEGER: 1, TYPE_STRING: 2, TYPE_DECIMAL: 3, TYPE_DICTIONARY: 4, TYPE_ARRAY: 5}

  MacroDroidVariable:
    m_name: [str]
    m_type: [int, 0-5]
    m_booleanValue: [bool, 'when:type=0']
    m_intValue: [long, 'when:type=1']
    m_stringValue: [str, 'when:type=2']
    m_decimalValue: [double, 'when:type=3']
    dictionary: [obj, 'when:type=4|5', "Dictionary object with entries and isArray"]
    isLocalVar: [bool]
    isSecure?: [bool]

  Dictionary_format:
    description: "Structure for dictionary (m_type=4) and array (m_type=5) variables"
    entries: [arr, "MUST be DictionaryEntry objects, NEVER plain values"]
    isArray: [bool, "true for arrays (m_type=5), false for dictionaries (m_type=4)"]
    CRITICAL: |
      Each entry in 'entries' MUST be a DictionaryEntry object with key+variable fields.
      WRONG: {"entries": ["Uber", "99", "Both"], "isArray": true}
      RIGHT: {"entries": [
        {"key": "0", "variable": {"type": "StringValue", "textValue": "Uber"}},
        {"key": "1", "variable": {"type": "StringValue", "textValue": "99"}},
        {"key": "2", "variable": {"type": "StringValue", "textValue": "Both"}}
      ], "isArray": true}

  DictionaryEntry_format:
    key: [str, "For arrays use index as string ('0','1','2'...). For dictionaries use the key name."]
    variable:
      _t: obj
      _desc: "VariableValue object - MUST include 'type' field"
      type: [str, "One of: StringValue, IntegerValue, DecimalValue, BooleanValue, Dictionary"]
      textValue: [str, 'when:type=StringValue']
      intValue: [long, 'when:type=IntegerValue']
      decimalValue: [double, 'when:type=DecimalValue']
      booleanValue: [bool, 'when:type=BooleanValue']
    example_string_array:
      dictionary: {"entries": [{"key": "0", "variable": {"type": "StringValue", "textValue": "hello"}}, {"key": "1", "variable": {"type": "StringValue", "textValue": "world"}}], "isArray": true}
    example_int_dictionary:
      dictionary: {"entries": [{"key": "score", "variable": {"type": "IntegerValue", "intValue": 100}}, {"key": "lives", "variable": {"type": "IntegerValue", "intValue": 3}}], "isArray": false}

# =============================================================================
# HTTP PARAM TYPE - Used by HttpRequestAction, HttpServerTrigger, HttpServerResponseAction
# =============================================================================
HttpParam:
  description: "Name/value pair for HTTP headers and query parameters"
  paramName: [str, magic, "Header/parameter name (e.g. Content-Type, Authorization)"]
  paramValue: [str, magic, "Header/parameter value"]
  example: '{"paramName": "Authorization", "paramValue": "Bearer {v=api_token}"}'
  warning: "Field names are paramName and paramValue - NOT name/value or key/value"

# =============================================================================
# DICTIONARY KEY TYPES - Used for navigating nested dictionaries/arrays
# =============================================================================
# Type: dictkeys - DictionaryKeys object
DictionaryKeys:
  description: "Ordered list of keys for navigating into nested dictionary/array structures"
  keys: [arr, 'items:str', "List of key names to traverse, e.g. ['level1', 'level2'] accesses dict[level1][level2]"]

# Type: vardict - VariableWithDictionaryKeys object
VariableWithDictionaryKeys:
  description: "A variable reference paired with dictionary keys for accessing nested dictionary/array entries"
  variableName: [str, "Name of the variable (alternate serialized name: 'a')"]
  keys?: [dictkeys, "DictionaryKeys object for nested access (alternate serialized name: 'b'). Null/omitted if not accessing nested entry."]

# =============================================================================
# ACTION BLOCK DATA - Common structure for invoking action blocks
# =============================================================================
ActionBlockData:
  description: "Data structure for invoking an action block with variable mappings"
  note: "Used by NotificationAction, OptionDialogAction, FloatingTextAction, CustomSceneAction, ConfirmDialogAction, AnimationOverlayAction"
  required_fields:
    actionBlockGuid: [long, "REQUIRED - GUID of the action block to invoke (must match m_GUID in exportedActionBlocks)"]
    actionBlockName: [str, "REQUIRED - name of the action block (for display/fallback lookup)"]
    inputVarsMap: [obj, "REQUIRED - map of input variable names to values. Use {} if no inputs needed"]
    outputVarsMap: [obj, "REQUIRED - map of output variable names to receiving variable names. Use {} if no outputs needed"]
  optional_fields:
    inputDictionaryMap?: [obj, "Dictionary keys for input variables that are dictionaries/arrays"]
    outputDictionaryMap?: [obj, "Dictionary keys for output variables that are dictionaries/arrays"]
  example:
    actionBlockGuid: 112233445566771
    actionBlockName: "My Action Block"
    inputVarsMap:
      input_param: "some value"
    outputVarsMap:
      output_param: "local_var_to_store_result"
  example_no_variables:
    actionBlockGuid: 112233445566771
    actionBlockName: "Simple Action Block"
    inputVarsMap: {}
    outputVarsMap: {}

enums:
  volume_streams: {0: Alarm, 1: Music, 2: Notification, 3: Ringer, 4: System, 5: Voice, 6: BT Voice, 7: Accessibility}
  http_methods: {0: GET, 1: POST, 2: PUT, 3: DELETE, 4: PATCH, 5: HEAD, 6: OPTIONS}
  state_options: {0: On, 1: Off, 2: Toggle}
  days_of_week: {0: Mon, 1: Tue, 2: Wed, 3: Thu, 4: Fri, 5: Sat, 6: Sun}

examples:
  note: "Examples omit empty m_constraintList on items to keep output compact. Only include m_constraintList when it has constraints."

  empty_trigger_example:
    desc: "Manual-only macro with no automatic trigger (default when no trigger specified)"
    json:
      m_name: "Turn Off WiFi"
      m_description: "Manually turns off WiFi when triggered"
      m_enabled: true
      m_completed: true
      m_GUID: 0
      aiGenerated: 1
      m_triggerList:
        - m_classType: "EmptyTrigger"
          m_SIGUID: 0
      m_actionList:
        - m_classType: "SetWifiAction"
          m_SIGUID: 0
          m_state: 1
      m_constraintList: []

  silent_at_night:
    desc: "Turn media volume to 0 at 11pm"
    json:
      m_name: "Silent at Night"
      m_description: "Mutes media volume every night at 11pm"
      m_enabled: true
      m_completed: true
      m_GUID: 0
      aiGenerated: 1
      m_triggerList:
        - m_classType: "TimerTrigger"
          m_SIGUID: 0
          m_hour: 23
          m_minute: 0
          m_daysOfWeek: [true, true, true, true, true, true, true]
          m_useAlarm: true
      m_actionList:
        - m_classType: "SetVolumeAction"
          m_SIGUID: 0
          m_streamIndexArray: [false, true, false, false, false, false, false, false]
          m_streamVolumeArray: [0, 0, 0, 0, 0, 0, 0, 0]
          m_volume: -1
      m_constraintList: []

  loop_example:
    desc: "LoopAction for repeating - use instead of duplicating actions"
    structure: |
      LoopAction (m_option: 0=fixed count, 1=while, 2=do-while, 3=endless)
      -> actions to repeat
      -> EndLoopAction
    json_snippet:
      - m_classType: "LoopAction"
        m_option: 0
        m_fixedOptionCount: 5
      - m_classType: "SendSMSAction"
        m_number: "+1234567890"
        m_messageContent: "Hello!"
      - m_classType: "EndLoopAction"

  if_else_example:
    structure: "IfConditionAction -> actions if true -> [ElseAction -> actions if false] -> EndIfAction"

  multi_trigger_pattern:
    note: "When a macro has multiple triggers that need different actions, MUST use IfConditionAction with TriggerThatInvokedConstraint in its m_constraintList to branch on which trigger fired"
    pattern: "shared actions (run always) -> IfConditionAction(m_constraintList=[TriggerThatInvokedConstraint(m_siGuidThatInvoked=<trigger_SIGUID>)]) -> actions for trigger A -> ElseAction -> actions for trigger B -> EndIfAction -> more shared actions"
    warning: "NEVER put all actions in a flat list when triggers need different behaviors - they will ALL execute sequentially regardless of which trigger fired"
    when_to_use: |
      Use this pattern whenever triggers require different actions. Common scenarios:
      - Enable something at one time, disable at another (e.g. WiFi on at 7am, off at 11pm)
      - Two instances of the same trigger type with different parameters (e.g. two TimerTriggers)
      - Different trigger types needing different responses
      Actions that should run for ALL triggers go OUTSIDE the If/Else block (before or after it).
    key_rules:
      - "Each trigger MUST have a non-zero m_SIGUID so TriggerThatInvokedConstraint can reference it"
      - "m_siGuidThatInvoked in TriggerThatInvokedConstraint must match the trigger's m_SIGUID exactly"
      - "m_not: false = 'was invoked by this trigger', m_not: true = 'was NOT invoked by this trigger'"
      - "TriggerThatInvokedConstraint REQUIRES m_triggerName field (display name of referenced trigger)"
    example:
      description: "COMPLETE export format. Enable WiFi/Bluetooth at 7am, disable at 11pm, vibrate at both times. Two TimerTriggers with If/Else branching. VibrateAction is outside the If/Else because it runs for both triggers."
      json:
        macroExportVersion: 1
        macro:
          m_name: "WiFi & Bluetooth Scheduler"
          m_description: "Enables WiFi and Bluetooth at 7am and disables them at 11pm, with a vibration confirmation"
          m_enabled: true
          m_completed: true
          m_GUID: 0
          aiGenerated: 1
          m_triggerList:
            - m_classType: "TimerTrigger"
              m_SIGUID: 112233445566771
              m_hour: 7
              m_minute: 0
              m_daysOfWeek: [true, true, true, true, true, true, true]
              m_useAlarm: true
            - m_classType: "TimerTrigger"
              m_SIGUID: 112233445566772
              m_hour: 23
              m_minute: 0
              m_daysOfWeek: [true, true, true, true, true, true, true]
              m_useAlarm: true
          m_actionList:
            - m_classType: "IfConditionAction"
              m_SIGUID: 0
              m_constraintList:
                - m_classType: "TriggerThatInvokedConstraint"
                  m_SIGUID: 0
                  m_siGuidThatInvoked: 112233445566771
                  m_triggerName: "7:00 AM"
                  m_not: false
            - m_classType: "SetWifiAction"
              m_SIGUID: 0
              m_state: 0
            - m_classType: "SetBluetoothAction"
              m_SIGUID: 0
              m_state: 0
            - m_classType: "ElseAction"
            - m_classType: "SetWifiAction"
              m_SIGUID: 0
              m_state: 1
            - m_classType: "SetBluetoothAction"
              m_SIGUID: 0
              m_state: 1
            - m_classType: "EndIfAction"
            - m_classType: "VibrateAction"
              m_SIGUID: 0
              m_vibratePattern: 1
          m_constraintList: []
        globalVariables: []
        userIcons: null

generation_guidelines:
  output_completeness: |
    CRITICAL: The JSON output MUST be complete and parseable. Incomplete/truncated JSON is rejected.
    Keep output compact: omit optional fields with default values, omit empty m_constraintList on items.
    Prefer a simpler but complete macro over an ambitious but truncated one.
    ALWAYS include m_description with a concise summary of what the macro does.
  array_requirements:
    m_daysOfWeek: "7 booleans [Mon-Sun]"
    m_streamIndexArray: "8 booleans"
    m_streamVolumeArray: "8 integers 0-100"

action_blocks:
  description: "Reusable action collections (like functions). ActionBlock IS-A Macro with isActionBlock=true, no triggers, no constraints. Can pass input/output variables."

  structure:
    note: "m_triggerList and m_constraintList always empty []"
    local_variable_types: "supportsInput=true for inputs, supportsOutput=true for outputs, both false for working variables"

  MacroDroidVariable_for_action_blocks:
    supportsInput?: [bool, "receives input values"]
    supportsOutput?: [bool, "returns output values"]

  ActionBlock_json_structure:
    isActionBlock: [bool, T, "MUST be true"]
    m_name: [str, "action block name"]
    m_GUID: [long, "unique identifier for referencing"]
    m_enabled: [bool, T]
    m_completed: [bool, T]
    m_description?: [str]
    localVariables: [arr, "input, output, and working variables"]
    m_actionList: [arr, "actions to execute when invoked"]
    m_triggerList: [arr, "MUST be empty []"]
    m_constraintList: [arr, "MUST be empty []"]

  invoking:
    note: "Use ActionBlockAction for direct invocation. Also supported by: NotificationAction, OptionDialogAction, FloatingTextAction, CustomSceneAction (via ActionBlockData on buttons/clicks)."
    important: "inputVarsMap and outputVarsMap are REQUIRED - use {} if no variables needed."

  bundling_with_macros:
    note: "Action blocks MUST be included in macro's exportedActionBlocks field. Include all referenced blocks recursively. Block m_GUID must match the actionBlockId/actionBlockGuid referencing it."

  example_macro_with_action_block:
    desc: "Macro invoking an action block with exportedActionBlocks"
    json:
      m_name: "Notify With Sound"
      m_description: "Plays a custom sound effect when a notification is received from Messages"
      m_enabled: true
      m_completed: true
      m_GUID: 0
      aiGenerated: 1
      m_triggerList:
        - m_classType: "NotificationTrigger"
          m_SIGUID: 0
          m_appName: "Messages"
      m_actionList:
        - m_classType: "ActionBlockAction"
          m_SIGUID: 0
          actionBlockId: 112233445566771
          actionBlockName: "Play Sound Effect"
          inputVarsMap:
            sound_file: "/sdcard/sounds/message.mp3"
          outputVarsMap: {}
          continueActionsWithoutWaiting: false
      m_constraintList: []
      exportedActionBlocks:
        - isActionBlock: true
          m_name: "Play Sound Effect"
          m_GUID: 112233445566771
          m_enabled: true
          m_completed: true
          localVariables:
            - m_name: "sound_file"
              m_type: 2
              m_stringValue: "/sdcard/sounds/beep.mp3"
              isLocalVar: true
              supportsInput: true
              supportsOutput: false
          m_triggerList: []
          m_actionList:
            - m_classType: "PlaySoundAction"
              m_SIGUID: 0
              m_soundFile: "{lv=sound_file}"
          m_constraintList: []

export_structure:
  IMPORTANT: "OUTPUT MUST BE THIS WRAPPER FORMAT, NOT JUST THE MACRO OBJECT. Output MUST be valid JSON with ALL keys double-quoted."
  format: |
    {"macroExportVersion": 1, "macro": {...} or null, "globalVariables": [...], "userIcons": null, "aiFeedback": "..."}
  fields:
    macroExportVersion: [int, "always 1"]
    macro: [obj, "the macro object (with exportedActionBlocks if using action blocks), or null if generation failed"]
    globalVariables: [arr, "IMPORTANT: globalVariables must be a TOP-LEVEL key alongside 'macro' and 'macroExportVersion', NOT inside the macro object. Global variables used by macro AND its action blocks."]
    userIcons: [obj, "null unless custom icons used"]
    aiFeedback: [str, "human-readable feedback about generation difficulties, ambiguities, assumptions made, or explanation if macro is null"]
  notes:
    - "If description is too vague/impossible to create a valid macro, set macro: null and explain in aiFeedback"
    - "Use aiFeedback to communicate: ambiguities resolved, assumptions made, missing details, suggestions for improvement"
    - "aiFeedback should be brief but always contain some useful high level text when generation succeeds without issues."
    - "Action blocks used by the macro go in macro.exportedActionBlocks, NOT in the root export object"
    - "Global variables used by action blocks must also be included in the root globalVariables array"

  example_failure:
    desc: "When macro cannot be generated due to unclear request"
    json:
      macroExportVersion: 1
      macro: null
      globalVariables: []
      userIcons: null
      aiFeedback: "Unable to create macro: The request 'do the thing' is too vague. Please specify what trigger should start the macro and what action should be performed."

# =============================================================================
# TRIGGERS
# =============================================================================
triggers:

    AccessibilityServiceStateTrigger:
     description: Triggers when accessibility service state changes
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "Service state to trigger on"]
     idList?: [string_array, "List of service IDs to monitor"]
     nameList?: [string_array, "List of service names to monitor"]

    ActivityRecognitionTrigger:
     description: Triggers based on detected user activity (walking, running, in vehicle, etc.)
     note: Requires Google Play Services Activity Recognition API
     params:
     m_selectedIndex: [int, '{0:In Vehicle, 1:On Bicycle, 2:Running, 3:Walking, 4:Still}', "Activity type to detect"]
     m_confidenceLevel: [int, 'def:50', 10-100, "Confidence threshold percentage"]
     lessThan?: [bool, "less than confidence|greater than or equal"]

    AirplaneModeTrigger:
     description: Triggers when airplane mode is enabled or disabled
     params:
     m_airplaneModeEnabled: [bool, "trigger on enable|trigger on disable"]

    AndroidWearTrigger:
     description: Triggers from Android Wear/Wear OS events - app button press, watch connected, or watch disconnected
     params:
     m_option:
     - int
     - req
     - '{0:Android Wear App - trigger from Wear OS app button, 1:Connected - trigger when watch connects, 2:Disconnected - trigger when watch disconnects}'
     - "type of Wear OS event to trigger on"
     m_resourceName: [str, 'when:m_option=0', "e.g., ''fa_play'', ''fa_home''"]
     iconBgColor?: [int, "Background color for the icon on Wear OS (0 = default color)"]

    AppActivityLaunchedTrigger:
     description: Triggers when a specific activity (screen) is launched or closed
     note: More specific than ApplicationLaunchedTrigger - monitors activity class names
     params:
     launched: [bool, "launched|closed"]
     activityNameToMatch: [str, magic, "e.g., com.example.app.MainActivity"]
     enableRegex?: [bool, "Use regex matching"]
     matchOption?: [int, 'def:1', '{0:Matches, 1:Contains}', "Match mode"]
     ignoreCase?: [bool, "Case-insensitive matching"]

    ApplicationInstalledRemovedTrigger:
     description: Triggers when an application is installed, updated, or removed
     params:
     m_installed: [bool, "true = installed (legacy field, see m_updated)"]
     m_updated:
     - bool
     - opt
     - def:false
     - "true = updated, false + m_installed=true = installed, false + m_installed=false = removed"
     m_applicationOption: [int, '{0:Any application, 1:Selected applications}', "Application filter mode"]
     m_packageNameList: [arr, 'when:m_applicationOption=1', 'def:[]', 'items:str', "List of package names to monitor"]
     m_applicationNameList?: [arr, 'def:[]', 'items:str', "Display names (for UI)"]

    ApplicationLaunchedTrigger:
     description: Triggers when app is launched or closed. There is no separate AppCloseTrigger - use this trigger with m_launched=false to detect app close.
     params:
     m_launched: [bool, "app opened|app closed"]
     m_packageName?: [str, "Single package name (legacy)"]
     m_applicationName?: [str, "Single app display name (legacy)"]
     m_packageNameList?: [arr, 'def:[]', 'items:str', "List of package names"]
     m_applicationNameList?: [arr, 'def:[]', 'items:str', "List of app display names"]
     customPackageName?: [str, "Custom package name pattern (for regex/partial match)"]
     usePackageNameOption?: [int, '{0:From list, 1:Custom package name}', "How to specify package"]
     isAllApps?: [bool, "Trigger for any app (ignore package list)"]
     excludeMode?: [bool, "When true, trigger fires for any app EXCEPT those in the list. When false (default), trigger fires only for apps in the list."]

    AutoRotateChangeTrigger:
     description: Triggers when auto-rotate setting changes
     params:
     m_option: [int, '{0:Enabled, 1:Disabled}', "Auto-rotate state"]

    AutoSyncChangeTrigger:
     description: Triggers when auto-sync setting changes
     params:
     m_option: [int, '{0:Enabled, 1:Disabled}', "Auto-sync state"]

    BatteryLevelTrigger:
     description: Triggers at specific battery level
     params:
     m_decreasesTo: [bool, "decreases to level|increases to level"]
     m_batteryLevel: [int, 0-100, "Battery percentage threshold"]
     m_option?: [int, '{0:Level threshold, 1:Any change}', "Trigger mode"]
     variableName?: [str, "Variable for battery level (when using variable)"]
     varDictionaryKeys?: [dictkeys, "Dictionary path for variable"]

    BatterySaverTrigger:
     description: Triggers when battery saver mode changes
     params:
     m_option: [int, '{0:Enabled, 1:Disabled}', "Battery saver state"]

    BatteryTemperatureTrigger:
     description: Triggers at specific battery temperature
     params:
     option: [int, '{0:Threshold, 1:Any change}', "Trigger mode"]
     temperature: [int, "Temperature threshold in degrees"]
     decreasesTo?: [bool, F, "true=decreases to|false=increases to"]
     variableName?: [str, "Variable for temperature value"]
     varDictionaryKeys?: [dictkeys, "Dictionary keys for variable"]

    BluetoothBeaconTrigger:
     description: Triggers when Bluetooth beacon is detected
     params:
     option: [int, '{0:In range, 1:Out of range}', "Beacon detection state"]
     selectedBeacons?: [arr, "List of BeaconWithName objects to monitor"]

    BluetoothTrigger:
     description: Triggers on Bluetooth connection events
     params:
     m_btState:
     - int
     - req
     - '{0:Bluetooth enabled, 1:Bluetooth disabled, 2:Device connected, 3:Device disconnected}'
     - "Bluetooth event type"
     m_deviceName?: [str, "Bluetooth device name"]
     m_deviceAddress: [str, 'when:m_btState=2 or m_btState=3', "Bluetooth MAC address"]
     m_deviceAlias?: [str, "Device alias/friendly name"]
     m_anyDevice?: [bool, "Match any device (ignore specific device)"]

    BootTrigger:
     description: Triggers when device boots/restarts
     params: {}

    CalendarTrigger:
     description: Triggers based on calendar events
     params:
     m_calendarId?: [str, "Calendar ID (null/empty for any)"]
     m_calendarName?: [str, "Calendar name for display"]
     m_eventStart: [bool, "trigger at event start|trigger at event end"]
     m_titleText?: [str, magic, "Event title text to match"]
     m_detailText?: [str, magic, "Event description text to match"]
     m_availability?: [int, '{0:Any, 1:Busy}', "Filter by availability status"]
     m_checkInAdvance?: [bool, "Trigger in advance of event"]
     m_advanceTimeSeconds?: [int, "Seconds before event to trigger (when m_checkInAdvance=true)"]
     m_negativeAdvanceCheck?: [bool, "Trigger after event (negative advance)"]
     m_ignoreAllDay?: [bool, "Ignore all-day events"]
     enableRegex?: [bool, "Use regex for title/detail matching"]
     calendarAccount?: [str, "Calendar account identifier"]
     simpleCalendarName?: [str, "Simple calendar name for display"]
     ignoreCase?: [bool, T, "Case insensitive title/detail matching"]

    CallActiveTrigger:
     description: Triggers when call becomes active (answered) - monitors both incoming and outgoing calls
     params:
     m_option:
     - int
     - req
     - '{0:Select Contacts - filter by specific contacts, 1:Select Groups - filter by contact groups, 2:Specify Number - filter by phone number pattern, 3:Any Number - trigger for any call}'
     - "How to filter which calls trigger this"
     m_contactList:
     - arr
     - when:m_option=0
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name - used to match against device contacts on import, m_id - must be \"-1\", m_number - leave empty/null unless user specifies a phone number, m_lookupKey - must be \"-1\")"'
     isExclude?: [bool, "When true, trigger for calls NOT from the selected contacts"]
     m_groupIdList: [arr, 'when:m_option=1', 'items:str', "Contact group IDs to match"]
     m_groupNameList: [arr, 'when:m_option=1', 'items:str', "Contact group names to match (for display)"]
     m_phoneNumber: [str, 'when:m_option=2', magic, "Phone number pattern to match (supports wildcards)"]
     m_phoneNumberExclude?: [bool, "When true, trigger for calls NOT matching the number pattern"]
     useRegex?: [bool, "Use regex for phone number matching instead of wildcards"]

    CallEndedTrigger:
     description: Triggers when a call ends
     note: Extends CallBasedTrigger - has same contact/group/number filtering options
     params:
     m_option:
     - int
     - req
     - '{0:Select Contacts - filter by specific contacts, 1:Select Groups - filter by contact groups, 2:Specify Number - filter by phone number pattern, 3:Any Number - trigger for any call}'
     - "How to filter which calls trigger this"
     m_contactList:
     - arr
     - when:m_option=0
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name - used to match against device contacts on import, m_id - must be \"-1\", m_number - leave empty/null unless user specifies a phone number, m_lookupKey - must be \"-1\")"'
     isExclude?: [bool, "When true, trigger for calls NOT from the selected contacts"]
     m_groupIdList: [arr, 'when:m_option=1', 'items:str', "Contact group IDs to match"]
     m_groupNameList: [arr, 'when:m_option=1', 'items:str', "Contact group names to match (for display)"]
     m_phoneNumber: [str, 'when:m_option=2', magic, "Phone number pattern to match (supports wildcards)"]
     m_phoneNumberExclude?: [bool, "When true, trigger for calls NOT matching the number pattern"]
     useRegex?: [bool, "Use regex for phone number matching instead of wildcards"]

    CallMissedTrigger:
     description: Triggers when a call is missed. classType is "CallMissedTrigger" not "MissedCallTrigger".
     note: Has same contact/group/number filtering options as other call triggers. m_option may be absent in older macros.
     params:
     m_option:
     - int
     - opt
     - '{0:Select Contacts - filter by specific contacts, 1:Select Groups - filter by contact groups, 2:Specify Number - filter by phone number pattern, 3:Any Number - trigger for any missed call}'
     - "How to filter which missed calls trigger this"
     m_contactList:
     - arr
     - opt
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name - used to match against device contacts on import, m_id - must be \"-1\", m_number - leave empty/null unless user specifies a phone number, m_lookupKey - must be \"-1\")"'
     isExclude?: [bool, "When true, trigger for calls NOT from the selected contacts"]
     m_groupIdList?: [arr, 'items:str', "Contact group IDs to match"]
     m_groupNameList?: [arr, 'items:str', "Contact group names to match (for display)"]
     m_phoneNumber?: [str, magic, "Phone number pattern to match (supports wildcards)"]
     m_phoneNumberExclude?: [bool, "When true, trigger for calls NOT matching the number pattern"]
     useRegex?: [bool, "Use regex for phone number matching instead of wildcards"]

    CameraFlashlightTrigger:
     description: Triggers when camera flashlight (torch) state changes
     params:
     option: [int, '{0:On, 1:Off}', "Flashlight state"]

    CameraInUseTrigger:
     description: Triggers when camera starts or stops being used by another app
     params:
      option: [int, '{0:Camera in use, 1:Camera not in use}', "Camera usage state"]
      cameraOption: [int, def:0, '{0:Any camera, 1:Back camera, 2:Front camera}', "Which camera to monitor"]

    CellTowerTrigger:
     description: Triggers when in/out of range of specified cell towers
     note: Requires location permission and phone state permission
     params:
     m_inRange: [bool, "in range|out of range"]
     m_cellGroupName: [str, "the cell tower group name"]
     m_cellIds: [arr, 'items:str', "List of cell tower IDs"]

    ClipboardChangeTrigger:
     description: Triggers when clipboard content changes
     params:
     m_text?: [str, magic]
     enableRegex?: [bool, "Enable regex matching"]
     isConfigured?: [bool, "text matching is configured"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]

    CustomSceneTrigger:
     description: Triggers when a custom scene is shown or dismissed (based on its identifier)
     params:
     identifier: [str, '', "The scene identifier to match (supports magic text)"]
     isShown: [bool, '{true:Scene shown, false:Scene dismissed}', "Whether to trigger on scene shown or dismissed"]

    DarkThemeTrigger:
     description: Triggers when dark theme is toggled
     params:
     m_option: [int, '{0:Dark theme enabled, 1:Dark theme disabled}', "Dark theme state to trigger on"]

    DataOnOffTrigger:
     description: Triggers when mobile data is toggled
     params:
     m_dataAvailable: [bool, "data on|data off"]

    DayDreamTrigger:
     description: Triggers when Daydream (screen saver) starts/stops
     params:
     m_dayDreamEnabled: [bool, "started|stopped"]

    DayTrigger:
     description: Triggers on specific day of week or day of month
     params:
     m_option: [int, '{0:Day of Week, 1:Day of Month}', "Trigger mode"]
     m_hour: [int, 0-23, "Hour in 24-hour format"]
     m_minute: [int, 0-59, "Minute"]
     m_dayOfWeek?: [int, 0-6, "Day of week (0=Mon, 6=Sun) if m_option=0"]
     m_dayOfMonth?: [int, 0-31, "Day of month (1-31, 0=not set) if m_option=1"]
     m_monthOfYear?: [int, 0-12, "Month (0=all months, 1-12=Jan-Dec) if m_option=1"]
     m_useAlarm?: [bool, T, "Use alarm manager for precision"]
     m_useVariable?: [bool, "use var"]
     m_variableName?: [str, "time var"]
     m_dictionaryKeys?: [dictkeys, "dict path"]

    DeviceUnlockedTrigger:
     description: Triggers when device is unlocked (user present)
     note: Fires when user unlocks screen (ACTION_USER_PRESENT). No DeviceLockedTrigger exists - use ScreenOnOffTrigger (screen off) with DeviceLockedConstraint instead.
     params: {}

    DialNumberTrigger:
     description: Triggers when specific number is dialed
     params:
     m_numberToDial: [str, "Phone number to match"]
     m_makeCall?: [bool, "actually make the call"]

    DockTrigger:
     description: Triggers when device is docked/undocked
     params:
     m_dockType: [int, '{0:Any Dock, 1:Desk Dock, 2:Car Dock, 3:Undocked}', "Dock type to detect"]

    DrawerOpenCloseTrigger:
     description: Triggers when MacroDroid drawer is opened or closed
     params:
     option: [int, '{0:Drawer opened, 1:Drawer closed}', "Drawer state to trigger on"]
     drawerType?: [int, '{0:Legacy drawer (default), 1:Custom drawer}', "Which drawer system to monitor"]
     customDrawerId?: [str, 'when:drawerType=1', "UUID of custom drawer (null for any)"]
     customDrawerName?: [str, 'when:drawerType=1', "Display name of custom drawer"]

    EmailReceivedTrigger:
     description: Triggers when email received matching patterns
     note: Poll interval is a global setting. Magic text outputs - {email_from}, {email_subject}, {email_body}
     params:
     emailSource: [int, '{0:IMAP/POP3, 1:Gmail}', "Email source type"]
     fromAddressPattern?: [str, magic, "From address pattern"]
     subjectPattern?: [str, magic, "Subject pattern"]
     bodyPattern?: [str, magic, "Body pattern"]
     enableRegex?: [bool, "Use regex instead of wildcards"]
     ignoreCase?: [bool, "Case-insensitive matching"]
     markAsRead?: [bool, "Mark matched email as read (IMAP only)"]
     isConfigured?: [bool, "Whether trigger has been configured"]
     useAlarm?: [bool, "Use exact alarm for reliable polling"]
     selectedServerId?: [str, "ID of selected email server config"]

    EmptyTrigger:
     description: Empty/placeholder trigger. Used as a placeholder when trigger is removed or for triggering via external apps.
     note: This trigger does nothing by itself but can be triggered programmatically by other apps or used as a placeholder.
     params: {}

    ExternalPowerTrigger:
     description: Triggers when device is connected or disconnected from power.
     params:
     m_powerConnected: [bool, "power connected|power disconnected"]
     m_powerConnectedOptions:
     - bool[]
     - opt
     - def:[True, True, True]
     - len:3
     - '"Which power types to trigger on: [Wired (AC), Wireless, Wired Slow (USB)]"'
     m_hasSetNewPowerConnectedOptions: [bool, "always true"]
     m_hasSetUSBOption: [bool, "always true"]

    FailedLoginTrigger:
     description: Triggers after failed device unlock attempts
     params:
     m_numFailures: [int, "Number of failed attempts before triggering"]
     m_timeIndex: [int, '{0:1 min, 1:2 min, 2:5 min, 3:10 min, 4:30 min, 5:1 hour}', "Time window for counting failures"]

    FileChangedTrigger:
     description: Triggers when files are created, modified, or deleted in a folder
     note: Requires All Files Access permission on Android 11+
     params:
     folderPath: [str, 'when:useStaticFolder=true', "Static folder path to monitor"]
     fileFilter: [str, magic, 'def:*', '"File pattern filter (wildcards: * ?)"']
     watchForCreated?: [bool, T, "Trigger on file creation"]
     watchForDeleted?: [bool, T, "Trigger on file deletion"]
     watchForModified?: [bool, T, "Trigger on file modification"]
     useStaticFolder?: [bool, T, "use folderPath|use variable"]
     folderVariableName?: [str, 'when:useStaticFolder=false', "String variable for folder path"]
     folderDictionaryKeys?: [dictkeys, "Dictionary keys for folder variable"]

    FlipDeviceTrigger:
     description: Triggers when device is flipped face up/down
     note: |
       This is a TRIGGER - it belongs ONLY in m_triggerList. NEVER place this in m_constraintList.
       To CHECK face-down/face-up state as a CONDITION (e.g. inside IfConditionAction.m_constraintList),
       use FaceUpDownConstraint instead.
     params:
     m_faceDown: [bool, "flip to face down|flip to face up"]
     m_anyStart?: [bool, "Any starting position"]
     m_workWithScreenOff?: [bool, "screen is off"]

    FloatingButtonTrigger:
     description: Triggers from floating button overlay. When enabled a floating button will be shown as an overlay on the screen.
     note: Most parameters control appearance. Key identifier is 'identifier' field.
     params:
     identifier?: [str, "Unique identifier for the floating button"]
     m_iconBgColor?: [int, "Background color (ARGB)"]
     m_imageResourceName?: [str, "Icon resource name"]
     m_imagePackageName?: [str, "Icon package name"]
     m_imageResourceId?: [int, "Icon resource ID"]
     m_imageUri?: [str, "Custom image URI"]
     m_alpha?: [int, 'def:100', "Opacity percentage (0-100)"]
     m_size?: [int, 'def:0', '{0:Normal, 1:Mini}', "Button size"]
     m_padding?: [int, 'def:20', "Padding around the icon (0-28)"]
     m_showOnLockScreen?: [bool, "Show on lock screen (Android < 8 only)"]
     m_transparentBackground?: [bool, "Transparent background"]
     fixedLocation?: [bool, "Fixed position (not draggable by user)"]
     forceLocation?: [bool, "Force specific start location on enable"]
     usePercentForLocation?: [bool, "Use percentage instead of pixels for location"]
     xLocation?: [int, "X position (pixels or percent)"]
     yLocation?: [int, "Y position (pixels or percent)"]
     xVarName?: [str, "Variable name for X position (instead of fixed value)"]
     yVarName?: [str, "Variable name for Y position (instead of fixed value)"]
     iconType?: [int, 'def:0', '{0:Image, 1:Text}', "Icon display type"]
     iconText?: [str, 'when:iconType=1', "Text to display (max 8 chars)"]
     iconTextColor?: [int, 'def:0xFFFFFFFF', "Text color (ARGB) when iconType=1"]
     iconTintEnabled?: [bool, 'def:false', "Enable icon tint color overlay"]
     iconTintColor?: [int, 'def:0xFFFFFFFF', 'when:iconTintEnabled=true', "Tint color (ARGB) applied to icon"]
     vibrateOnClick?: [bool, "Vibrate on click"]
     preventRemoveByDrag?: [bool, "Prevent removal by dragging to bin"]
     drawOverSystemApps?: [bool, "Draw over system apps (requires accessibility)"]
     showPositionOnMove?: [bool, "Show toast with X,Y pixel position when button is dragged"]
     disableTriggerOnRemove?: [bool, "Disable macro when button is removed"]

    FoldAngleTrigger:
     description: Triggers based on device fold state (foldable phones)
     note: For foldable devices only (Android 11+)
     params:
     option:
     - int
     - req
     - '{0:Open, 1:Closed, 2:Half Open (90 degrees), 3:Open to 90, 4:Closed to 90}'
     - "Fold state to trigger on"

    GPSEnabledTrigger:
     description: Triggers when GPS/location is toggled
     params:
     m_gpsModeEnabled: [bool, "enabled|disabled"]

    GeofenceTrigger:
     description: Triggers when entering/leaving a geographic area
     note: Location coordinates stored separately in geofence configuration
     params:
     m_enterArea: [bool, "enter zone|exit zone"]
     m_triggerFromUnknown?: [bool, "transitioning from unknown location"]
     m_geofenceId: [str, "Short natural language name matching the user's description (e.g. 'Home', 'Work', 'Gym') - do NOT use programmatic IDs like 'home_geofence_id'"]
     m_geofenceUpdateRateMinutes?: [int, 'def:5', "Update rate in minutes for location checks"]
     m_updateRateText?: [str, "Display text for update rate"]

    GoogleAssistantTrigger:
     description: Triggers when Google Assistant command is received
     note: No custom parameters - triggers on any Assistant interaction
     params: {}

    HeadphonesTrigger:
     description: Triggers when headphones are connected or disconnected
     params:
     m_headphonesConnected: [bool, "connected|disconnected"]
     m_micOption:
     - int
     - when:m_headphonesConnected
     - def:0
     - '{0:Any headphones, 1:Without microphone, 2:With microphone}'
     - "Microphone filter option (only for connected)"

    HomeButtonLongPressTrigger:
     description: Triggers when home button is long pressed
     note: May not work on all devices
     params: {}

    HotspotTrigger:
     description: Triggers when WiFi hotspot is enabled/disabled
     params:
     m_hotspotEnabled: [bool, "enabled|disabled"]

    HttpServerTrigger:
     description: Triggers from local HTTP server requests
     note: Server port is configured in MacroDroid settings. Variables can be passed via query params.
     params:
     identifier: [str, "Endpoint path e.g., my-endpoint"]
     ipAddressWhiteList?: [arr, 'def:[]', 'items:str', "IP addresses allowed to trigger (supports wildcards)"]
     variableWhiteListEnabled?: [bool, "Enable variable name filtering for security"]
     variableWhiteList?: [arr, 'when:variableWhiteListEnabled', 'items:str', "Variable names allowed to be updated via request"]
     saveBodyVariableName?: [str, "Variable to store request body"]
     saveBodyDictionaryKeys?: [dictkeys, "Dictionary path for body variable"]
     queryParamsDictionaryName?: [str, "Dictionary variable to store all query parameters"]
     queryParamsDictionaryKeys?: [dictkeys, "Dictionary path for query params variable"]
     saveBodyToFile?: [bool, "Save body to file instead of variable"]
     saveBodyToFileDirectory?: [str, magic, 'when:saveBodyToFile', "Directory to save body file"]
     saveBodyToFileFilename?: [str, magic, 'when:saveBodyToFile', "Filename for saved body"]
     sendResponse?: [bool, T, "Send HTTP response immediately"]
     responseText?: [str, magic, 'def:OK', "Response body text"]
     responseCode?: [int, 'def:200', "HTTP response status code (NanoHTTPD.Response.Status)"]
     headerParams?: [arr, 'items:HttpParam', "Custom response headers - each item MUST use paramName/paramValue fields (see HttpParam type)"]

    IncomingCallTrigger:
      description: Triggers on incoming calls
      note: Extends CallBasedTrigger - has same contact/group/number filtering options
      params:
        m_option:
        - int
        - req
        - '{0:Select Contacts, 1:Select Groups, 2:Specify Number, 3:Any Number}'
        - "How to filter which calls trigger this"
        m_incomingCallFromList:
        - arr
        - when:m_option=0
        - items:Contact
        - '"List of contacts to filter by (Contact has: m_name, m_id=\"-1\", m_number, m_lookupKey=\"-1\")"'
        isExclude?: [bool, "Trigger for calls NOT from selected contacts"]
        m_groupIdList: [arr, 'when:m_option=1', 'items:str', "Contact group IDs"]
        m_groupNameList: [arr, 'when:m_option=1', 'items:str', "Contact group names (display)"]
        m_phoneNumber: [str, 'when:m_option=2', magic, "Phone number pattern (supports wildcards)"]
        m_phoneNumberExclude?: [bool, "Trigger for calls NOT matching number"]
        useRegex?: [bool, "Use regex for phone number matching"]

    IncomingSMSTrigger:
     description: Triggers when an SMS is received
     params:
     m_option:
     - int
     - req
     - '{0:Select Contacts - filter by specific contacts, 1:Select Groups - filter by contact groups, 2:Select Number - filter by phone number pattern, 3:Any Number - trigger for any incoming SMS}'
     - "How to filter which incoming SMS messages trigger this"
     m_smsFromList:
     - arr
     - when:m_option=0
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name - used to match against device contacts on import, m_id - must be \"-1\", m_number - leave empty/null unless user specifies a phone number, m_lookupKey - must be \"-1\")"'
     isExcludeContact?: [bool, "When true, trigger for SMS NOT from the selected contacts"]
     m_groupIdList: [arr, 'when:m_option=1', 'items:str', "Contact group IDs to match"]
     m_groupNameList: [arr, 'when:m_option=1', 'items:str', "Contact group names (for display)"]
     m_smsNumber: [str, 'when:m_option=2', magic, "Phone number pattern to match (supports wildcards)"]
     m_smsNumberExclude?: [bool, "When true, trigger for SMS NOT matching the number pattern"]
     enableRegexPhoneNumber?: [bool, "Use regex for phone number matching instead of wildcards"]
     m_smsContent?: [str, magic, "Text content to match in the SMS (empty = any content)"]
     m_exactMatch?: [bool, "true=exact match, false=contains"]
     m_excludes?: [bool, "Trigger for SMS NOT containing/matching the text"]
     enableRegex?: [bool, "Use regex for SMS content matching"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     subscriptionId?: [int, 'def:-1', "SIM subscription ID to filter by (-1 = any SIM)"]

    IntentReceivedTrigger:
     description: Triggers when a broadcast intent is received from another app
     params:
     action: [str, "Intent action string e.g., com.example.MY_ACTION"]
     extraParams?: [arr, 'items:str', "List of intent extra parameter names to match"]
     extraValuePatterns?: [arr, 'items:str', "Patterns to match against extra values (wildcards supported)"]
     extraVariables?: [arr, 'items:str', "Variable names to store matched extra values"]
     extraDictionaryKeys?: [arr, 'items:dictkeys', "Dictionary keys for storing values"]
     enableRegex?: [bool, "Enable regex matching for value patterns"]
     saveExtrasToDict?: [bool, "Save all intent extras to a dictionary variable"]
     extrasDictVarName?: [str, "Dictionary variable for all intent extras"]
     extrasDictKeys?: [dictkeys, "Dictionary keys for extras dictionary"]

    IpAddressChangeTrigger:
     description: Triggers when device IP address changes
     params: {}

    LightSensorTrigger:
     description: Triggers at specific light level threshold
     common_mistakes: "Do NOT use 'LightLevelTrigger' - the correct classType is 'LightSensorTrigger'"
     params:
     m_option: [int, '{0:Decreases to, 1:Increases to}', "Light level change direction"]
     m_lightLevel?: [int, "Light level threshold as integer (deprecated, use m_lightLevelFloat)"]
     m_lightLevelFloat: [float, "Light level threshold (lux)"]

    LocationTrigger:
     description: Triggers when entering or exiting a geofence zone. In general GeofenceTrigger is preferred but this is an alternative that does not use Google Play services
     note: Uses geofence zones defined in MacroDroid settings
     params:
     m_enterArea: [bool, "area entered|area exited"]
     m_geofenceId: [str, "ID of the geofence zone to monitor"]
     m_newTriggerFromUnknown?: [int, '{0:Not Set, 1:Enabled, 2:Disabled}', "location status changes from unknown"]
     m_latitude?: [double, "Legacy latitude (use geofence instead)"]
     m_longitude?: [double, "Legacy longitude (use geofence instead)"]
     m_radius?: [int, "Legacy radius in meters (use geofence instead)"]

    LogcatTrigger:
     description: Triggers on Android system logcat output (adb logcat). Not for MacroDroid's internal log (use SystemLogTrigger).
     params:
     textToMatch: [str, "Text to match in logcat messages"]
     component?: [str, 'def:*', "Logcat component/tag filter"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]

    MacroDroidEnabledTrigger:
     description: Triggers when MacroDroid is enabled
     params: {}

    MacroDroidIconLongPressShortcutTrigger:
     description: Triggers when the user long-presses the MacroDroid app icon and taps a dynamic shortcut
     note: Creates a dynamic shortcut that appears when long-pressing the app icon in the launcher
     params:
     shortcutName: [str, magic, "Display name for the shortcut"]
     iconType?: [int, '{0:Image icon, 1:Text icon}', "icon to display type"]
     iconText?: [str, magic, "Text to display as icon (when iconType=1)"]
     iconBgColor?: [int, 'def:-1', "Background color for the icon (Android color int, -1 = white)"]
     fgColor?: [int, 'def:-16777216', "Foreground/text color (Android color int, -16777216 = black)"]
     imageResourceId?: [int, "Resource ID for built-in icon"]
     imageResourceName?: [str, 'def:active_icon_new', "Resource name for the icon"]
     imagePackageName?: [str, "Package name for external app icon"]
     imageUri?: [str, "URI for custom image"]

    MacroDroidInitialisedTrigger:
     description: Triggers when MacroDroid service starts
     params: {}

    MacroEnabledTrigger:
     description: Triggers immediately when the macro is enabled
     note: This trigger fires once when the macro containing it is enabled - useful for initialization
     params: {}

    MacroFinishedTrigger:
     description: Triggers when another macro finishes execution
     params:
     macroId: [long, 'def:-1', "GUID of macro to watch (-1 = this macro)"]
     macroName?: [str, "Display name of watched macro"]

    MediaButtonPressedTrigger:
     description: Triggers on media button press (headset button)
     params:
     m_optionIndex: [int, '{0:Single Press, 1:2 Presses, 2:3 Presses, 3:Long Press}', "Press type"]
     m_option?: [str, "Localized press type string (legacy, use m_optionIndex)"]
     m_cancelPress?: [bool, "Cancel the media button press event"]

    MediaButtonV2Trigger:
     description: Triggers on specific media button events via notification listener
     note: Uses notification access to detect media button events. More reliable than MediaButtonPressedTrigger on newer Android versions.
     params:
     optionsEnabledArray:
     - bool[]
     - req
     - '"Array of enabled button types (size matches MacroDroidMediaButton enum). Index 0=Play, 1=Play/Pause, 2=Pause, 3=Stop, 4=Previous, 5=Next, 6=Headset Hook, 7=Fast Forward, 8=Rewind"'

    MediaTrackChangedTrigger:
     description: Triggers when media track changes
     note: Detects when song/track changes in media players
     params: {}

    ModeEnterExitTrigger:
     description: Triggers when a MacroDroid mode is entered or exited
     note: Modes are user-defined in MacroDroid settings
     params:
     m_modeEntered: [bool, "mode entered|mode exited"]
     m_anyChange?: [bool, "Trigger on any mode change"]
     m_mode?: [str]
     m_variableName?: [str, "String variable containing mode name"]
     varDictionaryKeys?: [obj, "using dictionary variable"]

    MusicPlayingTrigger:
     description: Triggers when music/audio playback starts or stops
     params:
     option: [int, '{0:Music/sound started, 1:Music/sound stopped}', "Playback event type"]

    NFCStateTrigger:
     description: Triggers when NFC state changes
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "NFC state to trigger on"]

    NFCTrigger:
     description: Triggers when NFC tag is scanned
     params:
     m_tagName?: [str, "Specific NFC tag name to match"]

    NetworkRoamingChangedTrigger:
     description: Triggers when network roaming state changes
     params:
     m_roamingEnabled: [bool, "roaming started|roaming stopped"]

    NotificationButtonTrigger:
     description: Triggers when notification action button is pressed
     note: Used with persistent notification buttons created by MacroDroid
     params:
     m_id: [int, "Button ID (1-7 for notification buttons)"]
     m_collapseNotification?: [bool, "Collapse notification after button press"]

    NotificationTrigger:
     description: Triggers on notification received/cleared. Use for reacting to messages from any app (WhatsApp, Telegram, etc).
     magic_text: "{notification}, {not_title}, {not_app_name}, {not_app_package}, {not_channel}"
     common_apps: "WhatsApp=com.whatsapp, Telegram=org.telegram.messenger, Signal=org.thoughtcrime.securesms, Facebook Messenger=com.facebook.orca, Gmail=com.google.android.gm, Slack=com.Slack, Discord=com.discord"
     params:
     m_option?: [int, '{0:Notification received, 1:Notification cleared}', "Event type"]
     m_packageNameList?: [arr, 'items:str', "App package names to match"]
     m_applicationNameList?: [arr, 'items:str', "App display names (for display)"]
     m_excludeApps?: [bool, "Exclude listed apps (vs include)"]
     m_excludes?: [bool, "Legacy exclude mode"]
     titleContent?: [str, "Title text to match"]
     messageContent?: [str, "Message text to match"]
     m_textContent?: [str, "Legacy text content to match"]
     m_exactMatch?: [bool, "Legacy exact match"]
     separateTitleAndMessage?: [bool, F, "Use separate title/message matching"]
     matchOptionTitle?: [int, '{0:Any, 1:Matches, 2:Contains, 3:Excludes}', "Title match mode"]
     matchOptionMessage?: [int, '{0:Any, 1:Matches, 2:Contains, 3:Excludes}', "Message match mode"]
     enableRegex?: [bool, "Enable regex matching"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     m_ignoreOngoing?: [bool, "Ignore ongoing notifications"]
     m_supressMultiples?: [bool, "Suppress duplicate triggers (800ms debounce)"]
     m_soundOption?: [int, '{0:Any, 1:Has Sound, 2:None}', "Filter by notification sound"]

    OrientationTrigger:
     description: Triggers when device orientation changes between portrait and landscape
     note: Only portrait and landscape are supported (not upside-down variants)
     params:
     option: [int, '{0:Portrait, 1:Landscape}', "Target orientation"]

    OutgoingCallTrigger:
     description: Triggers on outgoing call
     note: Extends CallBasedTrigger - has same contact/group/number filtering options
     params:
     m_option:
     - int
     - req
     - '{0:Select Contacts, 1:Select Groups, 2:Specify Number, 3:Any Number}'
     - "How to filter which calls trigger this"
     m_outgoingCallToList:
     - arr
     - when:m_option=0
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name, m_id=\"-1\", m_number, m_lookupKey=\"-1\")"'
     isExclude?: [bool, "Trigger for calls NOT to selected contacts"]
     m_groupIdList: [arr, 'when:m_option=1', 'items:str', "Contact group IDs"]
     m_groupNameList: [arr, 'when:m_option=1', 'items:str', "Contact group names (display)"]
     m_phoneNumber: [str, 'when:m_option=2', magic, "Phone number pattern (supports wildcards)"]
     m_phoneNumberExclude?: [bool, "Trigger for calls NOT matching number"]
     useRegex?: [bool, "Use regex for phone number matching"]

    PhotoTakenTrigger:
     description: Triggers when a photo is taken by the camera
     note: Requires Android 7+ and storage permission
     params: {}

    PowerButtonLongPressTrigger:
     description: Triggers when power button is long pressed
     note: May not work on all devices
     params: {}

    PowerButtonToggleTrigger:
     description: Triggers when power button is pressed multiple times quickly
     note: Detects rapid power button presses (screen on/off toggles)
     params:
     m_numToggles: [int, 'def:3', 3-5, "Number of rapid power button presses (3, 4, or 5)"]

    PriorityModeTrigger:
     description: Triggers when Do Not Disturb mode changes
     params:
     option: [int, '{0:All (DND off), 1:Priority only, 2:Total silence, 3:Alarms only}', "DND mode to trigger on"]

    ProximityTrigger:
     description: Triggers on proximity sensor events (near/far/wave)
     note: |
       This is a TRIGGER - it belongs ONLY in m_triggerList. NEVER place this in m_constraintList.
       To CHECK proximity state as a CONDITION (e.g. inside IfConditionAction.m_constraintList),
       use ProximitySensorConstraint instead.
     params:
     m_near: [bool, "true=object close to sensor (phone at ear), false=object far (phone away)"]
     m_selectedOption: [int, '{0:Near, 1:Far, 2:Slow wave, 3:Fast wave}', "Proximity event type"]

    QuickSettingsTileTrigger:
     description: Triggers when MacroDroid quick settings tile is tapped
     note: MacroDroid supports up to 16 configurable quick settings tiles
     params:
     m_tileOption: [int, 0-15, "Tile index (0=Tile 1 .. 15=Tile 16)"]
     m_toggleOption?: [int, '{0:Turned On, 1:Turned Off, 2:Long Press}', "When to trigger (for toggle tiles)"]
     quickTileLabel?: [str, "Label text for the quick tile"]
     quickTileSubtitle?: [str, "Subtitle text for the quick tile"]
     quickTileImageName?: [str, "Image resource name for the tile icon"]
     quickTileIsToggle?: [bool, "Tile acts as a toggle (on/off state)"]
     quickTileIsCollapseOnPress?: [bool, "Collapse quick settings panel when pressed"]

    RegularIntervalTrigger:
     description: Triggers repeatedly at a fixed interval (e.g. "every 30 minutes", "every 2 hours", "every 10 seconds"). Use this for any repeating/recurring interval. m_seconds sets the interval in seconds (e.g. 3600 = every hour). NOT for fixed clock times - use TimerTrigger for "at 7:00 AM"
     params:
     m_seconds: [int, "Interval in seconds"]
     m_startHour?: [int, 0-23, "24h format"]
     m_startMinute?: [int, 0-59, "Reference start minute"]
     m_ignoreReferenceStartTime?: [bool, "When false, intervals are aligned to reference time"]
     m_useAlarm?: [bool, T, "Use alarm manager for exact timing"]
     m_useIntervalVariable?: [bool, "Get interval from variable"]
     m_useReferenceTimeVariable?: [bool, "Get reference time from variable"]
     m_intervalVariableName: [str, 'when:m_useIntervalVariable', "Variable name for interval"]
     m_referenceTimeVariableName: [str, 'when:m_useReferenceTimeVariable', "Variable name for reference time"]
     m_intervalVariableDictionaryKeys?: [dictkeys, "Dictionary path for interval variable"]
     m_referenceTimeVariableDictionaryKeys?: [dictkeys, "Dictionary path for reference time variable"]

    SMSSentTrigger:
     description: Triggers when an SMS is sent
     params:
     m_option:
     - int
     - req
     - '{0:Select Contacts - filter by specific contacts, 1:Select Number - filter by phone number pattern, 2:Any Number - trigger for any SMS sent}'
     - "How to filter which sent SMS messages trigger this"
     m_contactList:
     - arr
     - when:m_option=0
     - items:Contact
     - '"List of contacts to filter by (Contact has: m_name - used to match against device contacts on import, m_id - must be \"-1\", m_number - leave empty/null unless user specifies a phone number, m_lookupKey - must be \"-1\")"'
     isExcludeContact?: [bool, "When true, trigger for SMS NOT sent to the selected contacts"]
     m_smsNumber: [str, 'when:m_option=1', magic, "Phone number pattern to match (supports wildcards)"]
     m_smsNumberExclude?: [bool, "When true, trigger for SMS NOT matching the number pattern"]
     enableRegexPhoneNumber?: [bool, "Use regex for phone number matching instead of wildcards"]
     m_smsContent?: [str, magic, "Text content to match in the SMS (empty = any content)"]
     m_exactMatch?: [bool, "true=exact match, false=contains"]
     m_excludes?: [bool, "When true, trigger for SMS NOT containing/matching the text"]
     useRegex?: [bool, "Use regex for SMS content matching"]
     ignoreCase?: [bool, T, "Case-insensitive matching (applies when useRegex is false)"]

    ScreenContentTrigger:
     description: Triggers when specific text appears on screen
     note: Requires accessibility service to read screen content
     params:
     textToMatch: [str, magic, "Text to find on screen"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     enableRegex?: [bool, "Use regex matching"]
     isOffScreen?: [bool, "Trigger when text disappears from screen instead of appears"]
     packageNameList?: [string_array, "Package names to limit matching to specific apps"]
     appNameList?: [string_array, "App names corresponding to packages (for display)"]
     matchOption?: [int, 'def:0', '{0:Text Content, 1:View ID}', "What to match against"]
     includeOverlays?: [bool, "Include overlay content in matching"]

    ScreenOnOffTrigger:
     description: Triggers when screen turns on or off
     params:
     m_screenOn: [bool, "screen on event|screen off event"]

    ScreenshotContentTrigger:
     description: Triggers when screenshot contains specific text (OCR)
     note: Uses OCR to analyze screenshots. Screenshots are taken periodically.
     params:
     textToMatch: [str, magic, "Text to find in screenshot via OCR"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     enableRegex?: [bool, "Use regex matching"]
     isOffScreen?: [bool, "Trigger when text disappears from screenshot instead of appears"]
     packageNameList?: [string_array, "Package names to limit matching to specific apps"]
     appNameList?: [string_array, "App names corresponding to packages (for display)"]
     matchOption?: [int, 'def:0', '{0:Text Content, 1:View ID}', "What to match against"]
     arrayVariableName?: [str, "Variable name to store OCR results array"]
     arrayDictionaryKeys?: [dictkeys, "Dictionary keys for array results"]

    ShakeDeviceTrigger:
     description: Triggers when device is shaken (only works when screen is on)
     params: {}

    ShareFileTrigger:
     description: Triggers when a file is shared to MacroDroid
     note: File can optionally be saved to new location
     params:
     filePatternToCheck: [str, magic, "File name pattern to match"]
     enableRegex?: [bool, "Use regex for pattern matching"]
     matchOption?: [int, '{0:Matches, 1:Contains}', "Pattern match mode"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     saveToNewLocation?: [bool, "Save shared file to new location"]
     useAllFilesAccess?: [bool, "Use All Files Access (vs SAF)"]
     safPathUri?: [str, "SAF tree URI for save location"]
     safPathName?: [str, "Display name of SAF directory"]
     allFilesPath?: [str, magic, "All Files Access path for save location"]
     newFilename?: [str, magic, "New filename (blank = keep original)"]

    ShareTextTrigger:
     description: Triggers when text is shared to MacroDroid
     params:
     textToCheck: [str, magic, "Text pattern to match"]
     enableRegex?: [bool, "Use regex matching"]
     matchOption?: [int, '{0:Matches, 1:Contains}', "Pattern match mode"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     saveExtrasToDict?: [bool, "Save intent extras to dictionary"]
     extrasDictVarName?: [str, "Dictionary variable for extras"]
     extrasDictKeys?: [dictkeys, "Dictionary keys for extras"]

    ShizukuStoppedTrigger:
     description: Triggers when the Shizuku service stops working or becomes unavailable (e.g. crashes, is manually stopped, or the binder connection is lost)
     params: none

    ShortcutTrigger:
     description: Triggers from home screen shortcut
     params: {}

    SignalOnOffTrigger:
     description: Triggers when cellular signal is gained/lost
     params:
     m_signalOn: [bool, "signal gained|signal lost"]
     subscriptionId: [int, "SIM subscription ID to filter by. -1 = any SIM (default). On multi-SIM devices, use the subscription ID of the specific SIM card to monitor."]

    SilentModeTrigger:
     description: Triggers when silent/ringer mode changes
     params:
     m_silentEnabled: [bool, "silent enabled|silent disabled"]

    SimChangeTrigger:
     description: Triggers when SIM card is changed
     params:
     option: [int, '{0:SIM inserted, 1:SIM removed}', "SIM change type"]

    SleepTrigger:
     description: Triggers when device enters/exits sleep mode
     params:
     option: [int, '{0:Entering Sleep, 1:Exiting Sleep}', "Sleep state"]

    SpotifyTrigger:
     description: Triggers based on Spotify playback events. Track/song change detection requires this trigger (option=2), not MusicPlayingTrigger.
     note: Requires 'Device Broadcast Status' in Spotify settings. Magic text: {spotify_track}, {spotify_artist}, {spotify_album}.
     params:
     option: [int, '{0:Playback started, 1:Playback stopped, 2:Song changed}', "Spotify event to trigger on"]

    StopwatchTrigger:
     description: Triggers when a named stopwatch reaches specified time
     params:
     m_stopwatchName: [str, "the stopwatch name"]
     m_seconds: [int, "e.g., 300 for 5 minutes"]
     m_variableName?: [str, "Variable name for stopwatch name (when using variable)"]
     dontUseAlarm?: [bool, "Don''t use alarm manager (less precise but less battery)"]
     varDictionaryKeys?: [dictkeys, "Dictionary path for variable name"]

    SunriseSunsetTrigger:
     description: Triggers at sunrise or sunset with optional offset
     params:
     m_option: [int, '{0:Sunrise, 1:Sunset}', "Sun event type"]
     timeAdjustSeconds?: [int, "Offset in seconds (negative=before, positive=after sunrise/sunset)"]
     useAlarm?: [bool, T, "Use alarm manager for exact timing"]

    SwipeTrigger:
     description: Triggers when user swipes from top corner of screen
     note: Requires overlay permission. Only top corners are supported as start areas.
     params:
     m_swipeStartArea: [int, '{0:Top Left, 1:Top Right}', "Screen corner to start swipe from"]
     m_swipeMotion: [int, '{0:Across, 1:Diagonal, 2:Down}', "Direction of swipe motion"]

    SystemLogTrigger:
     description: Triggers when entry appears in MacroDroid's internal system log. Not for Android logcat (use LogcatTrigger).
     params:
     text: [str, magic]
     enableRegex?: [bool, "Use regex matching"]
     matchOption?: [int, '{0:Match, 1:Contains}', "How to match the text"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]

    SystemSettingTrigger:
     description: Triggers when system setting changes
     params:
     systemEnabled?: [bool, "Monitor System namespace"]
     globalEnabled?: [bool, "Monitor Global namespace"]
     secureEnabled?: [bool, "Monitor Secure namespace"]
     regexEnabled?: [bool, "Use regex for pattern matching"]
     settingPattern: [str, magic, "Setting key pattern to match"]

    TimerTrigger:
     description: Triggers at a fixed clock time on specific days of the week (e.g. "at 7:00 AM on weekdays"). NOT for repeating intervals - use RegularIntervalTrigger for "every X minutes/hours"
     params:
     m_hour: [int, 0-23, "hour 0-23"]
     m_minute: [int, 0-59]
     m_second?: [int, 0-59, "precision"]
     m_daysOfWeek: ['bool[]', 'len:7', '"[Mon-Sun]"']
     m_useAlarm?: [bool, T, "exact timing"]
     m_useVariable?: [bool, "use var"]
     m_variableName: [str, 'when:m_useVariable', "time var"]
     m_dictionaryKeys: [dictkeys, 'when:m_useVariable', "dict path"]

    ToastTrigger:
     description: Triggers when a toast message appears
     note: Requires accessibility service
     params:
     textToMatch: [str, magic, "Text to match in toast"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     enableRegex?: [bool, "Use regex matching"]
     packageNameList?: [string_array, "Package names to limit matching"]
     appNameList?: [string_array, "App names corresponding to packages"]

    UIClickTrigger:
     description: Triggers when specific UI element is clicked
     note: Requires UI Interaction Accessibility Service to be enabled
     params:
     textToMatch: [str, magic, "Text to match on UI element"]
     enableRegex?: [bool, F, "Use regex matching"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     packageNameList?: [string_array, 'def:[]', "List of package names to monitor (empty = all apps)"]
     appNameList?: [string_array, 'def:[]', "List of app names (for display)"]
     clickType?: [int, 'def:0', '{0:Standard Click, 1:Long Click}', "Click type to detect"]
     useContentDescriptionText?: [bool, T, "Also match content description text"]

    USBTetheringTrigger:
     description: Triggers when USB tethering is enabled or disabled
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "USB tethering state"]

    UsbDeviceConnectionTrigger:
     description: Triggers when USB device is connected/disconnected
     params:
     option: [int, '{0:Connected, 1:Disconnected}', "USB device connection state"]

    VariableTrigger:
     description: Triggers when a variable value changes or meets specified conditions
     params:
     m_variable: [var]
     m_intValue?: [long, "Integer comparison"]
     m_otherValueToCompare?: [var, "Another variable to compare against"]
     m_intGreaterThan?: [bool, "value becomes greater than comparison"]
     m_intLessThan?: [bool, "value becomes less than comparison"]
     m_intNotEqual?: [bool, "value becomes not equal to comparison"]
     m_intCompareVariable?: [bool, "True to compare against another variable instead of fixed"]
     m_booleanValue?: [bool, "Boolean value to trigger on for boolean variables"]
     m_stringValue?: [str, "String comparison"]
     m_stringEqual?: [bool, "True for equals comparison, false for not equals"]
     m_anyValueChange?: [bool, "True to trigger on any value change"]
     m_doubleValue?: [double, "Decimal comparison"]
     m_stringComparisonType?: [int, '{0:Equals, 1:Contains, 2:Starts with, 3:Ends with, 4:Matches regex}', "string comparison type"]
     m_expression?: [str]
     enableRegex?: [bool, "Enable regex matching"]
     checkCase?: [bool, "Case-sensitive comparison"]
     dictionaryType?: [int, "dictionary comparison type"]
     dictionaryKeys?: [dictkeys, "Dictionary keys for the monitored variable"]
     compareVarDictionaryKeys?: [dictkeys, "Dictionary keys for the comparison variable"]
     anyDictionaryKeyChange?: [bool, "True to fire when any key in a dictionary/array changes (no specific key required)"]
     magic_text:
       var_changed_name: "Name of the variable that was updated"
       var_changed_value: "The new value of the variable/entry that changed"
       var_changed_keys: "The dictionary key path that changed, formatted as [key1][key2][key3]"

    VolumeButtonTrigger:
     description: Triggers on volume button press
     params:
     m_monitorOption: [int, '{0:Use accessibility service, 1:Monitor volume changes}', "Detection method"]
     m_option:
     - int
     - req
     - '{0:Volume Up, 1:Volume Down, 2:Volume Up (long press), 3:Volume Down (long press), 4:Volume Up + Down, 5:Volume Up + Down (long press)}'
     - "Button press type"
     m_dontChangeVolume?: [bool, T, "Retain original volume level"]

    VolumeLongPressTrigger:
     description: Triggers when volume button is long pressed
     params:
     option: [int, '{0:Volume Up, 1:Volume Down}', "Volume button to monitor"]
     isNew?: [bool, "Internal flag"]

    VpnTrigger:
     description: Triggers when VPN connection state changes
     params:
     option: [int, '{0:Connected, 1:Disconnected}', "VPN state"]

    WearOSComplicationClickTrigger:
     description: Triggers when a MacroDroid complication is clicked on a Wear OS watch face
     note: Requires MacroDroid Wear OS app and a watch face that supports complications
     params:
     complicationType:
     - int
     - req
     - '{0:Short Text 1, 1:Short Text 2, 2:Long Text 1, 3:Long Text 2, 4:Ranged Value 1, 5:Ranged Value 2, 6:Icon 1, 7:Icon 2, 8:Small Image 1, 9:Small Image 2}'
     - "complication slot to monitor for clicks"

    WeatherTrigger:
     description: Triggers based on weather conditions
     note: Requires weather location to be configured in settings
     params:
     m_option:
     - int
     - req
     - '{0:Temperature, 1:Wind Speed, 2:Humidity, 3:Weather Conditions, 4:Any Weather Update, 5:Wind Direction}'
     - "Weather condition type"
     m_tempBelow?: [bool, "below threshold|above"]
     m_temperature?: [int]
     m_tempCelcius?: [bool, T, "Celsius|Fahrenheit"]
     m_windSpeedAbove?: [bool, "above threshold|below"]
     m_windSpeedValue?: [int, "Wind speed threshold in m/s (legacy)"]
     m_windSpeedValueMph?: [int, "Wind speed threshold in MPH"]
     m_humidityAbove?: [bool, "above threshold|below"]
     m_humidityValue?: [int, 0-100, "Humidity threshold percentage"]
     m_weatherCondition?: [int, '{0:Clear, 1:Cloudy, 2:Rain, 3:Thunder, 4:Snow}', "Weather condition to detect"]

    WebHookTrigger:
     description: Triggers via cloud webhook URL (Firebase-based)
     note: "URL format: https://trigger.macrodroid.com/{device_id}/{identifier}"
     params:
     identifier: [str, magic, "Custom webhook identifier (URL suffix)"]
     ipAddressWhiteList?: [arr, 'def:[]', 'items:str', "IP addresses allowed to trigger (supports wildcards)"]
     variableWhiteListEnabled?: [bool, "Enable variable name filtering for security"]
     variableWhiteList?: [arr, 'when:variableWhiteListEnabled', 'items:str', "Variable names allowed to be updated via request"]
     saveBodyVariableName?: [str, "Variable to store request body"]
     saveBodyDictionaryKeys?: [dictkeys, "Dictionary path for body variable"]
     queryParamsDictionaryName?: [str, "Dictionary variable to store all query parameters"]
     queryParamsDictionaryKeys?: [dictkeys, "Dictionary path for query params variable"]

    WifiConnectionTrigger:
     description: Triggers on WiFi connection state changes
     note: classType is "WifiConnectionTrigger" (lowercase fi), NOT "WiFiConnectionTrigger"
     params:
     m_wifiState:
     - int
     - req
     - '{0:Enabled, 1:Disabled, 2:Connected to specific SSID, 3:Disconnected from specific SSID}'
     - "Connection event type"
     m_SSID: [str, 'when:m_wifiState=2 or m_wifiState=3', "Specific WiFi network name (deprecated, use m_SSIDList)"]
     m_SSIDList?: [arr, 'items:str', "List of WiFi SSIDs to match"]
     customAddedSSIDs?: [arr, 'items:str', "Manually added SSIDs (not from scan)"]

    WidgetPressedTrigger:
     description: Triggers from widget button press
     params:
     m_widgetType: [int, "Widget type (1=1x1, 2=2x1, etc.)"]
     m_widgetLabel?: [str, magic, "Widget display label"]
     m_imageId?: [int, "Drawable resource ID"]
     m_imageResourceName?: [str, "icon name"]
     m_imagePackageName?: [str, "Icon package name"]
     m_imageUri?: [str, "Custom image URI"]
     iconText?: [str, "Text to display on icon"]
     tintColor?: [int, 'def:-1', "Icon tint color (ARGB)"]
     iconTintEnabled?: [bool, "Enable icon tinting"]

    WifiSSIDTrigger:
     description: Triggers when specific WiFi network is in/out of range
     note: Scans for nearby networks (different from WiFi connection)
     params:
     m_SSID?: [str, "Single SSID to match (legacy, use wifiCellInfoList)"]
     m_InRange: [bool, "in range|out of range"]
     m_SSIDList?: [string_array, "Legacy SSID list (use wifiCellInfoList)"]
     wifiCellInfoList: [arr, "List of WiFi networks to monitor"]

    WorkProfileTrigger:
     description: Triggers when the work profile is enabled or disabled
     params:
      workProfileEnabled: [bool, "trigger on enable|trigger on disable"]

# =============================================================================
# ACTIONS
# =============================================================================
actions:

    AccessibilityServiceAction:
     description: Enable, disable, or toggle accessibility services
     note: Requires WRITE_SECURE_SETTINGS permission via ADB or root access
     params:
     option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Action to perform on the accessibility service(s)"]
     idList: [arr, 'items:str', '"format: package.name/.ServiceClass"']
     nameList: [arr, 'items:str', "List of accessibility service display names (for UI display)"]

    ActionBlockAction:
      description: Invoke/run an action block with input/output variable mapping
      note: |
        Allows running reusable action blocks. Can pass input variables and receive output variables.
        Can run synchronously (wait) or asynchronously (continue without waiting).
        IMPORTANT: inputVarsMap and outputVarsMap are REQUIRED - use {} if no variables needed.
      params:
        actionBlockId: [long, req, "GUID of the action block to invoke (must match m_GUID in exportedActionBlocks)"]
        actionBlockName: [str, req, "Action block name (for display/fallback lookup)"]
        inputVarsMap: [obj, req, "REQUIRED - Map of action block input variable names to values/magic text. Use {} if no inputs"]
        outputVarsMap: [obj, req, "REQUIRED - Map of action block output variable names to local variable names. Use {} if no outputs"]
        continueActionsWithoutWaiting?: [bool, "If true, continue executing next actions without waiting for action block to complete"]
        inputDictionaryMap?: [obj, "Dictionary keys for input variables that are dictionaries/arrays"]
        outputDictionaryMap?: [obj, "Dictionary keys for output variables that are dictionaries/arrays"]

      example_with_variables:
        description: "Invoke action block with input and output variables"
        json:
          m_classType: "ActionBlockAction"
          m_SIGUID: 0
          actionBlockId: 112233445566771
          actionBlockName: "Process Data"
          inputVarsMap:
            input_text: "Hello World"
            input_number: 42
          outputVarsMap:
            result: "my_local_result_var"
          continueActionsWithoutWaiting: false
          m_constraintList: []

      example_no_variables:
        description: "Invoke action block with no variable mappings - still requires empty maps"
        json:
          m_classType: "ActionBlockAction"
          m_SIGUID: 0
          actionBlockId: 112233445566771
          actionBlockName: "Simple Block"
          inputVarsMap: {}
          outputVarsMap: {}
          m_constraintList: []

    AddCalendarEntryAction:
     description: Add an event to the calendar
     params:
     m_title: [str, magic, "Event title"]
     m_detail?: [str, magic, "Event description/details"]
     m_calendarId: [str, "Calendar ID"]
     m_durationValue?: [str, magic, "Event duration in minutes (can be expression or magic text)"]
     m_fixedTime: [bool, "fixed time|relative time from now"]
     m_relativeMinutes: [int, 'when:m_fixedTime=false', "Minutes from now (relative time mode)"]
     m_relativeHours: [int, 'when:m_fixedTime=false', "Hours from now (relative time mode)"]
     m_relativeDays: [int, 'when:m_fixedTime=false', "Days from now (relative time mode)"]
     m_relativeTimeVariableName?: [str, "Variable name for relative time"]
     m_timeUnitForVariable?: [int, '{0:Seconds, 1:Minutes, 2:Hours}', "using variable for relative time"]
     m_useVariableTimeInFuture?: [bool, "Use variable time in the future (vs past)"]
     varDictionaryKeys?: [dictkeys, "Dictionary keys for variable access"]
     m_fixedMonths: [int, 'when:m_fixedTime', "Months ahead for relative fixed date. Must be int not string"]
     m_fixedDays: [int, 'when:m_fixedTime', "Days ahead for relative fixed date. Must be int not string"]
     m_fixedHour: [int, 'when:m_fixedTime', 0-23, "24h format. Must be int not string"]
     m_fixedMinute: [int, 'when:m_fixedTime', 0-59, "Minute of event. Must be int not string"]
     m_fixedHourText?: [str, magic, "Hour as text/magic text (overrides m_fixedHour if set)"]
     m_fixedMinuteText?: [str, magic, "Minute as text/magic text (overrides m_fixedMinute if set)"]
     m_allDayEvent?: [bool, "Create all-day event"]
     m_availability?: [int, '{0:Busy, 1:Free, 2:Tentative}', "Event availability status"]
     enableNotification?: [bool, "Enable notification reminder"]
     notificationMinutesBefore: [int, 'when:enableNotification', "Minutes before event for notification"]
     m_useFixedDate?: [bool, "Use fixed date instead of relative"]
     m_fixedDay: [str, 'when:m_useFixedDate', magic, "Day of month (1-31)"]
     m_fixedMonth: [str, 'when:m_useFixedDate', magic, "Month (1-12)"]
     m_fixedYear: [str, 'when:m_useFixedDate', magic, "e.g., 2024"]
     colorKey?: [str, "Calendar event color key"]

    AiLlmQueryAction:
     description: Query an AI/LLM model with a prompt (supports both on-device Gemini Nano and cloud APIs)
     params:
     option:
     - int
     - req
     - '{0:OPTION_USE_LOCAL_GEMINI (on-device Gemini Nano), 10:OPTION_USE_CLOUD_API}'
     - '"LLM option: use local Gemini or cloud API provider"'
     queryText: [str, magic, "prompt/query to send to the AI model"]
     providerIndex: [int, 'when:option=10', "Index of cloud provider in providers list"]
     selectedModel?: [str, 'def:""', "e.g., ''gpt-4o-mini'', ''gemini-1.5-flash''"]
     maxOutputTokens?: [str, magic, 'def:4096', "Max output tokens as STRING (supports magic text for dynamic values)"]
     temperature?: [str, magic, 'def:1.0']
     outputVariableName: [str, "Variable name to store the AI response"]
     outputDictionaryKeys?: [dictkeys, "storing response in nested dictionary location"]
     apiKeys: [hashmap, 'when:option=10', "HashMap<String, String> mapping provider names to encrypted API keys"]

    AmbientDisplayAction:
     description: Enable/disable ambient display (always-on display or wake for notifications)
     note: Requires WRITE_SECURE_SETTINGS permission via ADB or root access
     params:
     m_settingOption:
     - int
     - req
     - '{0:Wake for notifications (doze_enabled), 1:Always on display (doze_always_on)}'
     - "Which ambient display setting to modify"
     m_option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Action to perform on the selected setting"]

    AndroidShortcutsAction:
     description: Perform Android system global actions via accessibility service
     note: Requires Accessibility Service enabled. Options 3-4 require Android 12+ (API 31+)
     params:
     m_option:
     - int
     - req
     - '{0:Quick Settings, 1:Power Dialog, 2:Recent Apps, 3:Show All Apps (Android 12+), 4:Accessibility Toggle (Android 12+)}'
     - "Global action to perform"

    AndroidWearAction:
     description: Control Android Wear/Wear OS device from phone
     note: Requires Wear OS device connected via Google Play Services
     params:
     m_option:
     - int
     - req
     - '{0:Open App, 1:Notification, 2:Vibrate, 3:Set Brightness, 4:Wake Screen, 5:Set WiFi, 6:Open Default Watchface}'
     - "Action to perform on Wear OS device"
     m_packageToLaunch?: [str, "Package name of app to launch on watch"]
     m_applicationName?: [str, "Display name of app to launch"]
     m_vibratePattern?: [int, "Vibration pattern index"]
     m_brightness?: [int, "Brightness level (1-6)"]
     m_notificationText?: [str, magic, "body text"]
     m_notificationSubject?: [str, magic, "Notification title/subject"]
     m_imageResourceName?: [str, "Resource name for notification icon"]
     m_actionNames?: [arr, 'items:str|null', "Action button names (up to 4, null = not set)"]
     m_actionIcons?: [arr, 'items:str', "Action button icon codes"]
     m_actionMacroGuids?: [arr, 'items:long', "Macro GUIDs for each action button"]
     m_actionEnabledStates?: [arr, 'items:bool', "Enabled state for each action button"]
     m_wifiOption?: [int, '{0:Enable, 1:Disable, 2:Toggle}', "WiFi setting to apply"]

    AnimationOverlayAction:
      description: Display animated overlay (Lottie/Giphy/GIF). Only a single animation can be played at any one time.
      params:
        isClearAnimation: [bool, "hide|show"]
        showOption?: [int, '{0:N loops, 1:N seconds, 2:Until cleared}']
        optionValue?: [int, 'def:1', "loops or secs"]
        optionVarName?: [str]
        xPosition?: [float, 'def:0.5', 0.0-1.0]
        yPosition?: [float, 'def:0.5', 0.0-1.0]
        width?: [float, 'def:1.0', 0.0-1.0]
        height?: [float, 'def:1.0', 0.0-1.0]
        opacity?: [float, 'def:1.0', 0.0-1.0]
        animationType?: [int, '{0:Lottie, 1:Giphy, 2:GIF file, 3:GIF URL}']
        selectedAnimation:
          descriptionId?: [int]
          resourceId?: [int]
          name?: [str]
        selectedAnimationId?: [str, "REQUIRED when animationType=0 (Lottie). Values: ALARM_CLOCK, ANGRY, BATTERY, BELL, BICYCLE, BIN, BLUETOOTH, BOAT, CAR, CAT, CELEBRATE, CHEERS, CHICKEN, CLAPPING, COLD, CONFETTI, DANCING_MONKEY, DOG, DOT_EXPLOSION, EYE, FINGERS_CROSSED, FIRE, FIREWORKS, FIREWORKS2, GHOST, GIFT, HEADPHONES, HEART, HIGH_FIVE, HOME, HOT, KISS, LOADING_SPINNER, MAIL, MONEY, MOTORBIKE, MUSCLE, MUSIC, PAWS, PILLS, PLANE, POO, RAIN, RAINBOW, SAD_CRYING, SANTA, SHOCKED, SICK, SLEEPY, SMILE, SNOW, SPIDER, STAR, STOPWATCH2, SUNSHINE, THUMBS_UP, TRAIN, TROPHY, TRUCK, WARNING, WAVING, WIFI, WINK, WITCH"]
        customJson?: [str, "base64 gzip Lottie JSON"]
        animGifUrl?: [str, "Giphy URL, GIF content URI, or URL (magic text supported for type 3)"]
        useAllFilesAccessGif?: [bool, 'def:false', "use All Files Access for GIF file (type 2)", 'when:animationType=2']
        allFilesAccessGifPath?: [str, magic, "full file path for GIF", 'when:useAllFilesAccessGif=true']
        animName?: [str]
        hideOnClick?: [bool]
        ignoreCache?: [bool]
        macroGuidToRun?: [long, "Macro GUID to run when animation is clicked"]
        macroNameToRun?: [str, "Macro name (for display)"]
        actionBlockData?: [ActionBlockData, "see ActionBlockData schema"]
        xVarName?: [str]
        yVarName?: [str]
        widthVarName?: [str]
        heightVarName?: [str]
        opacityVarName?: [str]
        xDictionaryKeys?: [dictkeys]
        yDictionaryKeys?: [dictkeys]
        widthDictionaryKeys?: [dictkeys]
        heightDictionaryKeys?: [dictkeys]
        opacityDictionaryKeys?: [dictkeys]
        drawOverSystemApps?: [bool, "Draw over lock screen/system apps (requires accessibility service)"]

    AnswerCallAction:
     description: Answer an incoming phone call
     params:
     m_selectedIndex:
     - int
     - opt
     - def:0
     - '{0:No delay, 1:2 second delay, 2:5 second delay, 3:10 second delay}'
     - "Delay before answering"

    ArrayManipulationAction:
     description: Manipulate and filter array variables
     params:
     option:
     - int
     - req
     - '{0:Sort Ascending, 1:Sort Descending, 2:Reverse, 3:Filter String, 4:Filter Numerical, 5:Compact (remove empty entries), 6:Sub Array (extract range)}'
     - "Array manipulation operation to perform"
     inputArrayVarName: [str, "the input array variable name"]
     inputArrayKeys?: [dictkeys, "input is from dictionary array"]
     outputArrayVarName: [str, "the output array variable for results name"]
     outputArrayKeys?: [dictkeys, "output is to dictionary array"]
     startIndex: [int, 'when:option=6', "Start index for sub-array extraction"]
     endIndex: [int, 'when:option=6', "End index for sub-array extraction"]
     startIndexVarName?: [str, "Variable name for dynamic start index"]
     endIndexVarName?: [str, "Variable name for dynamic end index"]
     stringFilterOption:
     - int
     - when:option=3
     - '{0:Matches, 1:Contains, 2:Excludes}'
     - "String filter comparison type"
     stringFilterText: [str, 'when:option=3', magic, "Text to filter by"]
     stringFilterIgnoreCase?: [bool, "filtering strings"]
     stringFilterRegex?: [bool, "Treat filter text as regex pattern"]
     numericalExpressionFilterText: [str, 'when:option=4', magic, "e.g., ''>5'', ''<=10''"]

    AuthenticateUserAction:
     description: Require biometric or PIN/password authentication
     note: Blocking action - sets boolean variable based on result
     params:
     title: [str, magic]
     subtitle?: [str, magic, 'def:""']
     variableName: [str, "Boolean variable to store result (true=authenticated)"]
     dictionaryKeys?: [dictkeys, "storing in dictionary entry"]
     preventPasswordPin?: [bool, "Prevent fallback to PIN/password (biometric only)"]

    BatterySaverAction:
     description: Enable/disable battery saver mode
     common_mistakes: "Do NOT use 'SetBatterySaverAction' - the correct classType is 'BatterySaverAction'"
     note: Requires WRITE_SECURE_SETTINGS permission via ADB or root access
     params:
     m_option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Battery saver mode setting"]

    BlockTouchesAction:
     description: Block touch input on screen (enable/disable/toggle)
     params:
     option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "0=Enable, 1=Disable, 2=Toggle"]
     xPosition?: [float, 'def:0.5', "Horizontal position (0.0-1.0)"]
