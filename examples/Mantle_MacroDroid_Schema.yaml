      SceneAlignment: '{Start, End, Center, Split}'
      ButtonClickConfig: {runnableItem: {name: [str], guid: [long, "MUST match the action block m_GUID - NOT 0"], isActionBlock: [bool]}, actionBlockData?: [ActionBlockData, "see ActionBlockData schema"]}
      SceneImageData: {imageResourceName: [str], imageResourceId: [int], imagePackageName: [str], imageUri: [str], type: [enum, 'STATIC_FILE|DYNAMIC_FILE|URL|GIPHY'], directoryUri: [str, "SAF tree URI"], filename: [str], useAllFilesAccess: [bool], allFilesDirectoryPath: [str, "direct file path"]}
      ActionBlockData: "See ActionBlockData in macrodroid-llm-schema.yaml"

    CompleteExample:
      description: "Full CustomSceneAction example. Every item MUST have type, guid, and matching config."
      json:
        m_classType: "CustomSceneAction"
        m_SIGUID: 0
        sceneDescription:
          sceneConfig:
            name: "Settings"
            blockNextActions: false
            backgroundColor: -16777216
          itemList:
            items:
              - type: "SceneText"
                guid: 0
                sceneTextConfig:
                  text: "Settings"
                  textSize: "28"
                  textColor: -1
                  isBold: true
                  textAlignment: "Center"
              - type: "SceneSwitch"
                guid: 0
                sceneSwitchConfig:
                  text: "Notifications"
                  textColor: -1
                  alignment: "Split"
                  booleanVariable:
                    varName: "notif_enabled"
              - type: "SceneButton"
                guid: 0
                sceneButtonConfig:
                  text: "Save"
                  textColor: -1
                  buttonColor: -16776961
                  closeSceneOnPress: true
        m_constraintList: []

    DarkThemeAction:
     description: Enable/disable/toggle dark theme
     note: Requires Write Secure Settings permission via ADB or root
     params:
     option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Dark theme state"]

    DayDreamAction:
     description: Start daydream/screensaver mode
     note: No parameters - simply starts the device's daydream (screensaver) mode
     params: {}

    DeleteVariableAction:
     description: Delete a specific variable
     params:
     variableName: [str, "variable to delete name"]
     varDictionaryKeys?: [dictkeys, "deleting a dictionary entry"]

    DimScreenAction:
     description: Add a dimming overlay to reduce screen brightness beyond system limits. This is NOT the same as SetBrightnessAction. Use DimScreenAction when you need to dim/darken the screen (it adds a dark overlay on top). Use SetBrightnessAction only to change the system brightness slider value.
     note: Requires Draw Over Other Apps permission
     params:
     m_dimScreenOn: [bool, T, "enable dim overlay|disable"]
     m_percent: [int, 'def:50', 0-100, "Dim percentage (0=transparent, 100=black)"]
     m_variable?: [obj, "Integer variable containing dim percentage"]
     varDictionaryKeys?: [dictkeys, "using dictionary variable"]
     overlayStatusBar?: [bool, "Also overlay status bar (requires Accessibility Service)"]

    DisableAppAction:
     description: Enable or disable applications using pm command
     note: Requires root access or Shizuku
     params:
     m_option: [int, '{0:Enable, 1:Disable}', "Enable or disable the app(s)"]
     usePackageNameOption: [int, '{0:Select apps from chooser, 1:Enter package name}', "App selection method"]
     m_packageNameList: [arr, 'when:usePackageNameOption=0', 'items:str', "List of package names to enable/disable"]
     m_applicationNameList?: [arr, 'items:str', "Display names of apps (for UI)"]
     customPackageName: [str, 'when:usePackageNameOption=1', magic, "entering manually"]

    DisableCameraAction:
     description: Enable/disable device camera via device admin
     note: Requires device admin or system helper app on Android 10+
     params:
     option: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Camera state"]

    DisableCategoryAction:
     description: Enable/disable macros in a category
     params:
     m_category?: [str]
     m_enable: [bool]
     m_state: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Enable/disable/toggle state"]
     categoriesList?: [arr, 'items:str', "List of category names (for multiple categories)"]
     enableMacrosOption:
     - int
     - opt
     - '{0:Don''t change macro states, 1:Enable all macros}'
     - "Which macros in the category to affect"

    DisableMacroAction:
     description: Enable, disable, or toggle another macro
     params:
     m_state?: [int, "Enable/disable action (-1=use m_enable, 0=Enable, 1=Disable, 2=Toggle)"]
     m_enable?: [bool, "Enable macro (when m_state=-1)"]
     m_GUID?: [long, "GUID of target macro"]
     m_macroName?: [str, magic, "macro (for display or name lookup) name"]
     getByName?: [bool, "Look up macro by name instead of GUID"]
     m_category?: [str, "Category filter"]
     m_userPromptTitle?: [str, magic, "Title for user prompt dialog"]

    DisableMacroDroidAction:
     description: Disable MacroDroid completely (stops all macro execution)
     params:
     state: [int, '{0:Prompt password if enabled, 1:Always disable (ignore password)}', "Password handling option"]

    DisableTriggerAction:
     description: Enable/disable specific trigger within a macro
     params:
     enableOption: [int, '{0:Enable, 1:Disable, 2:Toggle}', "Enable/disable option"]
     triggerGuid: [long, "SIGUID of the trigger to enable/disable"]
     macroGuid: [long, "GUID of the macro containing the trigger"]
     macroName?: [str, "the macro (for display purposes) name"]
     triggerName?: [str, "the trigger (for display purposes) name"]

    DisplayDensityAction:
     description: Change display density (DPI scale percentage)
     note: Requires WRITE_SECURE_SETTINGS permission via ADB
     params:
     scalePercent: [int, 50-150, "Display scale percentage (100 = default density)"]
     variable?: [var]
     varDictionaryKeys?: [dictkeys, "using dictionary variable"]

    EdgeLightingAction:
     description: Show animated edge lighting effect around screen borders with gradient colors
     notes:
     - Colors are Android color integers (e.g., -65536 = red, -16711936 = green, -16776961 = blue)
     - Use 0xFFRRGGBB as signed int for hex colors
     - 'Common colors: Red=-65536, Green=-16711936, Blue=-16776961, Yellow=-256, Cyan=-16711681, Magenta=-65281'
     params:
     option: [int, '{0:Show edge lighting, 1:Clear/hide edge lighting}']
     timeoutSeconds?: [int, 'def:10', "Auto-hide after this many seconds (0 = stay on until cleared)"]
     borderWidthDps?: [int, 'def:8', 1-50, "Width of the edge light border in dp"]
     color1?: [int, 'def:-65536', "First gradient color as Android color int (legacy, use colors array instead)"]
     color2?: [int, 'def:-16711936', "Second gradient color as Android color int (legacy, use colors array instead)"]
     colors?: ['int[]', "Array of Android color integers for multi-color gradient (preferred over color1/color2)"]
     cornerRadius?: [int, 'def:-1', "Corner radius in dp (-1 = auto-detect from device screen)"]
     featherEffect?: [float, 'def:0.0', 0.0-1.0, "Feather/blur effect intensity (0.0 = sharp, 1.0 = maximum blur)"]
     alpha?: [float, 'def:1.0', 0.0-1.0, "Opacity of the edge lighting (0.0 = transparent, 1.0 = opaque)"]
     drawOverSystemApps?: [bool, "Draw over lock screen/system apps (requires accessibility service)"]

    ElseAction:
     description: Else branch of if statement
     params: {}

    ElseIfConditionAction:
     description: Else If condition check - executes child actions if conditions are met and previous If/ElseIf was false
     note: |
       Must be placed between an IfConditionAction and EndIfAction. Uses constraints to evaluate conditions.
       IMPORTANT: ElseIfConditionAction does NOT close the If block. The entire chain still requires a
       final EndIfAction. No matter how many ElseIf branches exist, there must be exactly ONE EndIfAction
       at the end: IfConditionAction -> [ElseIfConditionAction]... -> [ElseAction] -> EndIfAction
     params:
     m_constraintList: [arr, 'items:Constraint', "List of constraints that must be satisfied for the Else If block to execute"]
     m_isOrCondition?: [bool, "OR logic (any constraint)|AND logic (all constraints)"]
     dontLogIfConditionIsFalse?: [bool, "condition evaluates to false"]

    ElseIfConfirmedThenAction:
     description: Else If with user confirmation - shows dialog and executes child actions if user confirms and previous If/ElseIf was false
     note: Must be placed between an IfConditionAction and EndIfAction. Shows confirmation dialog to user.
     params:
     title?: [str, magic, "Dialog title"]
     text?: [str, magic, "Dialog message text"]
     positiveText?: [str, magic, "Text for positive/confirm button"]
     negativeText?: [str, magic, "Text for negative/cancel button"]
     quitOnBackPressed?: [bool, "back button is pressed"]
     cancelAfterTimeout?: [bool, "Auto-cancel the dialog after timeout"]
     timeoutSeconds?: [int, 'def:30', "Timeout in seconds before auto-cancel (if cancelAfterTimeout is true)"]

    EncryptDecryptTextAction:
     description: Encrypt or decrypt text using AES-256
     params:
     option: [int, '{0:Encrypt, 1:Decrypt}', "Encrypt or decrypt operation"]
     sourceText: [str, magic, "Text to encrypt/decrypt"]
     password: [str, magic, "Encryption password/key"]
     outputVariableName: [str, "String variable name for encrypted/decrypted result"]
     dictionaryKeys?: [dictkeys, "Dictionary keys for nested storage of result"]
     successVariableName?: [str, "Boolean variable name to store success/failure status"]
     successDictionaryKeys?: [dictkeys, "Dictionary keys for nested storage of success status"]

    EndIfAction:
     description: End of if/else block
     params: {}

    EndLoopAction:
     description: End of loop block - closes a LoopAction
     note: Every LoopAction MUST have a matching EndLoopAction. Actions between LoopAction and EndLoopAction will be repeated.
     params: {}

    ExpandCollapseStatusBarAction:
     description: Expand or collapse the notification status bar
     params:
     m_option: [int, '{0:Expand status bar, 1:Collapse status bar}', "Status bar operation"]

    ExportMacrosAction:
     description: Export all macros to a file (.mdr/.emdr) or store the export JSON in a string variable
     blocking_action: true
     params:
     option:
     - int
     - req
     - def:0
     - '{0:Export to file, 1:Export to MacroDroid variable}'
     - "Export destination"
     m_fileName?: [str, magic, 'when:option=0', "Filename without extension (extension is .mdr or .emdr if encrypted)"]
     m_filePath?: [str, 'when:option=0', "Legacy file system path for export directory"]
     m_pathUri?: [str, 'when:option=0', "SAF tree URI for export directory"]
     m_displayPath?: [str, "Human-readable display path"]
     useAllFilesAccess?: [bool, 'when:option=0', "Use All Files Access mode instead of SAF (Android 11+)"]
     allFilesPath?: [str, magic, 'when:option=0,useAllFilesAccess=true', "Direct file path for All Files Access mode"]
     encryptOutput?: [bool, 'def:false', "Encrypt the exported file (changes extension to .emdr)"]
     encryptionPassword?: [str, 'when:encryptOutput=true', "Encryption password (minimum 4 characters)"]
     variableName?: [str, 'when:option=1', "String variable name to store the export JSON"]
     dictionaryKeys?: [dictkeys, 'when:option=1', "Dictionary keys for nested variable storage"]

    FileOperationAllFilesAction:
     description: File operations with all files access (copy/move/delete/create folder/list files)
     params:
     option: [int, '{0:Copy, 1:Move, 2:Delete, 3:Create Folder, 4:List Files}']
     fileOption:
     - int
     - opt
     - '{0:All files, 1:Media files, 2:Images, 3:Audio, 4:Videos, 5:Specify file pattern, 6:Folder, 7:Specify folder pattern}'
     filePattern?: [str, magic, "e.g. *.txt"]
     folderPattern?: [str, magic, "Folder pattern"]
     fileExtensions?: [arr, "Array of file extensions to filter"]
     fromPath: [str, magic, "Source directory path"]
     toPath?: [str, magic, "Destination directory path (for copy/move)"]
     folderName?: [str, magic, "Folder name (for create folder option)"]
     listFilesVariableName?: [str, "Dictionary variable to store list of files (for list files option, when outputType=0)"]
     listFilesDictionaryKeys?: [dictkeys, "Dictionary keys for list files variable"]
     listFilesOutputType?: [int, '{0:Dictionary, 1:Array}', "Output variable type for list files (default: Dictionary)"]
     listFilesArrayVariableName?: [str, "Array variable to store list of filenames (for list files option, when outputType=1)"]
     listFilesSortBy?: [int, '{0:Filename, 1:Last Modified, 2:File Size}', "Sort order for array output (default: Filename)"]
     listFilesSortAscending?: [bool, T, "Sort ascending (true) or descending (false) for array output"]
     waitToComplete?: [bool, T, "Block actions until complete"]

    FileSelectionAction:
     description: Show file picker dialog
     blocking_action: true
     params:
     m_outputVariable: [str]
     m_mimeType?: [str, 'def:*/*']
     m_multiSelect?: [bool]

    FloatingButtonConfigureAction:
     description: Configure appearance and behavior of floating button trigger. Use this to show/hide/configure floating buttons (not DisableTriggerAction).
     params:
     enableOption: [int, '{0:Don''t change enabled state, 1:Enable button, 2:Disable button}', "Enable/disable state"]
     triggerGuid: [long, "GUID of the FloatingButtonTrigger to configure"]
     macroGuid: [long, "GUID of the macro containing the trigger"]
     macroName: [str, "the macro containing the trigger name"]
     identifier: [str, "Unique identifier of the floating button"]
     iconBgColor?: [int, "icon bg (ARGB)"]
     alpha?: [int, 0-100, "Opacity percentage"]
     size?: [int, '{0:Normal size, 1:Mini size}', "Button size"]
     transparentBackground?: [bool, "Use transparent background"]
     updateLocation?: [bool, "Update button location"]
     xLocation?: [int, "X position (pixels or percentage based on usePercentForLocation)"]
     yLocation?: [int, "Y position (pixels or percentage based on usePercentForLocation)"]
     padding?: [int, 'def:8', "Icon padding"]
     imageResourceId?: [int, "Resource ID for button icon"]
     imageResourceName?: [str, "Resource name for button icon"]
     imagePackageName?: [str, "icon pkg"]
     imageUri?: [str, "icon URI"]
     usePercentForLocation?: [bool, "Use percentage (true) or pixels (false) for location"]
     preventRemoveByDrag?: [bool, "Prevent removal by dragging"]
     xVarName?: [str, "Variable name for dynamic X location"]
     yVarName?: [str, "Variable name for dynamic Y location"]
     iconType?: [int, '{0:Image icon, 1:Text icon}', "icon to display type"]
     iconText: [str, 'when:iconType=1', magic, "Text to display as icon (max 2 chars)"]
     iconTextColor?: [int, 'def:-1', "Text color for text icons (ARGB)"]
     iconTintEnabled?: [bool, 'def:false', "Enable icon tint color overlay"]
     iconTintColor?: [int, 'def:0xFFFFFFFF', 'when:iconTintEnabled=true', "Tint color (ARGB) applied to icon"]
     fixedLocation?: [bool, "Lock button to fixed location"]
     isInitialised?: [bool, "Internal flag for initialization state"]
     drawOverSystemApps?: [bool, "Draw over lock screen/system apps (requires accessibility service)"]

    FloatingButtonOverlayAction:
     description: Configure swipe area overlay for edge gestures
     params:
     m_option: [int, '{0:Show, 1:Hide, 2:Toggle, 3:Configure, 4:Reset, 5:Set swipe area}', "Action to perform"]
     swipeAreaOption?: [int, '{0:Left edge, 1:Right edge, 2:Top edge, 3:Bottom edge}', "Edge for swipe area"]
     swipeAreaWidth?: [int, 'def:10', "Width of swipe detection area"]
     swipeAreaHeight?: [int, 'def:45', "Height of swipe detection area"]
     swipeAreaVerticalOffset?: [int, 'def:50', "Vertical offset percentage"]
     swipeAreaVisibleWidth?: [int, 'def:10', "Visible indicator width"]
     swipeAreaOpacity?: [int, 'def:50', "Opacity of visible indicator (0-100)"]
     swipeAreaColour?: [int, "Color of swipe area (ARGB integer)"]

    FloatingTextAction:
      description: Show/hide floating text overlay
      params:
        option: [int, '{0:Show, 1:Hide, 2:Hide all}']
        identifier: [str, 'when:option!=2', magic, "instance id"]
        textToDisplay: [str, 'when:option=0', magic]
        bgColor?: [int, 'def:-16777216', "ARGB"]
        textColor?: [int, 'def:-1', "ARGB"]
        shadowColor?: [int, 'def:-16777216']
        alpha?: [int, 'def:100', 0-100, "%"]
        updateLocation?: [bool]
        xPosition?: [float, 'def:0.5', 0.0-1.0]
        yPosition?: [float, 'def:0.5', 0.0-1.0]
        padding?: [int, 'def:8']
        textSize?: [int, 'def:14', "sp"]
        corners?: [int, 'def:12', "dp"]
        alignment?: [int, '{0:Center, 1:Left, 2:Right}']
        autoHideAfterDelay?: [bool]
        autoHideSeconds?: [int]
        htmlFormattingEnabled?: [bool]
