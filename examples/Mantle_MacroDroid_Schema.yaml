     dictionaryKeys?: [dictkeys, "storing in nested structure"]
     includeOverlays?: [bool, "Include overlay windows (requires Pro)"]
     includeWithoutText?: [bool, "Include elements without text content"]
     forceScreenRefresh?: [bool, "Force screen refresh before reading"]
     includeScreenLocation?: [bool, "Include screen coordinates for each element"]

    ReadScreenshotContentsAction:
     description: Read text from screenshot using OCR
     params:
     variableName: [str, "Array variable name to store OCR text results"]
     isLocalVar?: [bool, "variable is local to macro"]
     dictionaryKeys?: [dictkeys, "storing in nested structure"]
     charsetOption?: [int, '{0:Latin, 1:Japanese, 2:Korean, 3:Chinese}', "Character set for OCR"]
     includeScreenLocation?: [bool, "Include screen coordinates for each text block"]

    RebootAction:
     description: Reboot or power off the device
     common_mistakes: "Do NOT use 'PowerOffAction' - to power off, use RebootAction with option: 1 or option: 3"
