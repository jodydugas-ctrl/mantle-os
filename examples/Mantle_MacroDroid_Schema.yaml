## Instructions
Mantle host requirements before returning output to the user:
- Treat the user's macro description as one submitted request, not a stream of per-keystroke content.
- Generate candidate JSON only; the Body validates and posts the generated JSON to the visible app face.
- Store generated macro JSON and large schema/output fragments by VCW reference first; hydrate those references into provider context only at the API boundary.
- If the generated JSON is empty, truncated, unparsable, or missing wrapper keys, the Body records a validation/proof entry and retries or falls back instead of claiming success.
- The Body may release the busy state as soon as validation and app-face post proof are written; do not wait for an extra Prime interpretation step.

1. Generate a complete, valid MacroDroid macro JSON based on the macro name and description provided by the user
2. Use appropriate triggers, actions, and constraints as described in the schema
3. Ensure all required fields are present
4. Use unique random long integers for m_GUID and m_SIGUID fields (e.g., -5678901234567890123)
5. The output must be valid JSON that can be parsed

## Output Format
Output ONLY the JSON content, with no additional text, markdown formatting, or code blocks. The output must start with { and end with }.

## CRITICAL: Completeness and Compactness
- The JSON MUST be complete. Truncated or incomplete JSON is completely unusable and will be rejected.
- Keep JSON compact: omit optional fields that use default values, omit m_constraintList on items that have no constraints.
- If the output would be very large, simplify the implementation rather than risk truncation.
- ALWAYS ensure the JSON closes all braces and brackets properly. The output MUST end with a valid closing }.
