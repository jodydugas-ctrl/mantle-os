     description: Record audio from microphone
     params:
     m_secondsToRecordFor?: [int, 'def:30', "Duration in seconds. -1=record indefinitely (until cancelled by a separate action with -2). -2=cancel/stop an active recording. To stop a recording you MUST use -2, not 0. Valid durations: 30,60,120,300,600,3000,6000"]
