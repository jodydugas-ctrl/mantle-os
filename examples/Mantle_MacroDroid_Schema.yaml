    IfConditionAction:
     description: Conditional execution (if/then/else)
     note: |
       IMPORTANT: MacroDroid uses a FLAT action list. Actions between IfConditionAction and EndIfAction
       are siblings in the same m_actionList array. Do NOT nest m_actionList within IfConditionAction.
       Requires matching EndIfAction. Use ElseAction for else branch. m_constraintList MUST contain at
       least one constraint - empty means always-true (Else never executes). Extends ConditionAction
       which has m_constraintList and m_isOrCondition (inherited from Action base class).

       CRITICAL - m_constraintList MUST ONLY contain CONSTRAINT classTypes (names ending in "Constraint").
       NEVER put trigger classTypes (names ending in "Trigger") in m_constraintList - they will not work.
       Common mistake: using FlipDeviceTrigger in m_constraintList instead of FaceUpDownConstraint.
       If you need to check a state/condition, find the matching CONSTRAINT class, not a trigger.
       WRONG: m_constraintList: [{"m_classType": "FlipDeviceTrigger", ...}]  (trigger in constraint list!)
       RIGHT: m_constraintList: [{"m_classType": "FaceUpDownConstraint", ...}]  (correct constraint)

       CRITICAL - EndIfAction REQUIRED: Every If/ElseIf chain MUST end with exactly one EndIfAction.
       This applies even when using ElseIfConditionAction chains. A common mistake is to omit EndIfAction
       after the last ElseIf or Else branch.

       CORRECT pattern:   IfConditionAction -> ElseIfConditionAction -> ElseAction -> EndIfAction
       WRONG (crashes):   IfConditionAction -> ElseIfConditionAction -> ElseAction  (missing EndIfAction)
     params:
     dontLogIfConditionIsFalse?: [bool, "condition evaluates to false"]
     childrenCollapsed?: [bool, "whether children are collapsed in edit view"]

    IfConfirmedThenAction:
     description: Show confirmation dialog and execute child actions if confirmed (parent action)
     blocking_action: true
     params:
     title?: [str, magic, "Dialog title"]
     text: [str, magic, "Dialog message text"]
     positiveText?: [str, magic, "Text for positive/confirm button"]
     negativeText?: [str, magic, "Text for negative/cancel button"]
