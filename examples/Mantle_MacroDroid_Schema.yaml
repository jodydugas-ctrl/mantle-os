     timeoutSeconds?: [int, 'def:30', "Timeout in seconds if cancelAfterTimeout=true"]
     childrenCollapsed?: [bool, "children are collapsed in editor"]
     dontLogIfConditionIsFalse?: [bool, "Suppress logging if cancelled"]

