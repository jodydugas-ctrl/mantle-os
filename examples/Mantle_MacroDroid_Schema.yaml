    CheckImageOnScreenAction:
      description: Captures a screenshot and checks if a specified reference image is present on the screen using OpenCV template matching. Useful for detecting when a specific button or UI element appears (e.g. in a game). Optionally saves match location and bounds to a dictionary variable so they can be used with a Click action.
      params:
        useStaticImage: [bool, "true = use a static image file (SAF), false = use a dynamic path"]
        imageFileUri?: [str, "SAF URI of the reference image file (when useStaticImage=true)"]
        imageDisplayName?: [str, "Display name of the selected image file"]
        useAllFilesAccess?: [bool, "When useStaticImage=false: true = All Files Access mode, false = SAF folder+filename mode (default false)"]
        pathUri?: [str, "SAF tree URI for the folder (when useStaticImage=false and useAllFilesAccess=false)"]
        pathName?: [str, "Display name of the selected folder"]
        filename?: [str, "Filename within the SAF folder, supports magic text (when useStaticImage=false and useAllFilesAccess=false)"]
        allFilesAccessPath?: [str, "Full file path, supports magic text (when useStaticImage=false and useAllFilesAccess=true)"]
        restrictToRegion?: [bool, "Restrict search to a specific screen region (default false)"]
        regionX?: [int, "X coordinate of search region top-left corner"]
        regionY?: [int, "Y coordinate of search region top-left corner"]
        regionWidth?: [int, "Width of search region"]
        regionHeight?: [int, "Height of search region"]
        regionXVarName?: [str, "Variable name for region X (overrides regionX)"]
        regionYVarName?: [str, "Variable name for region Y (overrides regionY)"]
        regionWidthVarName?: [str, "Variable name for region width (overrides regionWidth)"]
        regionHeightVarName?: [str, "Variable name for region height (overrides regionHeight)"]
        usePercentForRegion?: [bool, "Use percentage (0-100) instead of pixels for region bounds"]
        matchSensitivity?: [int, "0=Exact(0.97), 1=High(0.88), 2=Medium(0.76), 3=Low(0.62). Default 1 (High)"]
        useGreyscale?: [bool, "Convert images to greyscale before matching. Faster and more robust to color variations, but cannot distinguish elements that differ only by color. Default false"]
        matchResolution?: [int, "0=Full resolution, 1=Half resolution (2x downscale), 2=Quarter resolution (4x downscale). Lower resolution is faster but less precise. Coordinates are scaled back to full resolution. Default 1 (Half)"]
        booleanResultVarName: [str, "Boolean variable to store whether image was found (true/false)"]
        dictionaryOutVarName?: [str, "Dictionary variable to store match info. Keys: centerX (int), centerY (int), startX (int), startY (int), endX (int), endY (int), bounds (str, e.g. '(927, 1330) - (1053, 1456)'), matchPercent (int, 0-100). Values are -1 / empty when no meaningful match"]
        dictionaryOutVarKeys?: [dictkeys, "Dictionary keys for output variable"]
      notes:
        - Requires accessibility service permission (for screenshot capture)
        - Requires OpenCV library to be downloaded on first use (~15MB one-time download)
        - The reference image should be a cropped screenshot of the element to find
        - For game automation, pair with a UI Interaction click action using centerX/centerY from the dictionary variable
        - When restrictToRegion is true, coordinates are relative to the full screen (not the region)
        - Match sensitivity presets map to OpenCV TM_CCOEFF_NORMED thresholds
        - The dictionary outputs center point, bounding rectangle (start/end corners), a formatted bounds string, and match quality percentage
        - Coordinates are provided even when the boolean result is false, as long as the match confidence exceeds the minimum threshold (70%)
        - "Static image" mode uses SAF file picker only. "Dynamic image" mode offers two sub-options: SAF (folder + filename with magic text) or All Files Access (single path with magic text)

    CheckPixelColorAction:
