     configuration_types:
       Click:
         clickOption: [int, "0=CurrentFocus, 1=TextContent, 2=XYLocation, 3=IdentifyInApp, 4=ViewId"]
         longClick: [bool]
         xyPoint: [obj, "Point with x,y coordinates"]
         xyPercentages: [bool, "true=percentage coordinates, false=pixel coordinates"]
         textContent: [str, "Text to match for click"]
         textMatchOption: [int, "0=Contains, 1=ExactMatch"]
         blocking: [bool, "Wait for click result"]
         returnVariable: [obj, "Variable to store click success/failure"]

       Gesture:
         startX: [int]
         startY: [int]
         endX: [int]
         endY: [int]
         xyPercentages: [bool]
         durationMs: [int, "Duration of gesture in milliseconds"]
         waitBeforeNext: [bool, "Block next actions until complete"]
         additionalFingers: [int, "0 = one finger (default), 1 = two fingers. Extensible for future multi-finger support"]
         startX2: [int, "Finger 2 start X (when additionalFingers > 0)"]
         startY2: [int, "Finger 2 start Y (when additionalFingers > 0)"]
         endX2: [int, "Finger 2 end X (when additionalFingers > 0)"]
         endY2: [int, "Finger 2 end Y (when additionalFingers > 0)"]
         note: "All coordinate fields support variable names for dynamic values. Both finger paths are dispatched simultaneously with the same duration"

       GestureSequence:
         startX: [int]
         startY: [int]
         xyPercentages: [bool]
         durationMs: [int]
         waitBeforeNext: [bool]
         gestures: [list, "List of GestureEntry objects with endX, endY coordinates"]

       PinchZoom:
         point1X: [int, "X coordinate of first finger"]
         point1Y: [int, "Y coordinate of first finger"]
         point2X: [int, "X coordinate of second finger"]
         point2Y: [int, "Y coordinate of second finger"]
         xyPercentages: [bool, "true=percentage coordinates, false=pixel coordinates"]
         zoomIn: [bool, "true=zoom in (fingers converge), false=zoom out (fingers diverge)"]
         zoomPercent: [int, "1-100, how far to move. 100% zoom in = fingers converge to center. 100% zoom out = fingers reach screen edge"]
         durationMs: [int, "Duration of gesture in milliseconds"]
         waitBeforeNext: [bool, "Block next actions until complete"]
         note: "All coordinate fields support variable names for dynamic values"

       TwoFingerRotate:
         point1X: [int, "X coordinate of first finger"]
         point1Y: [int, "Y coordinate of first finger"]
         point2X: [int, "X coordinate of second finger"]
         point2Y: [int, "Y coordinate of second finger"]
         xyPercentages: [bool, "true=percentage coordinates, false=pixel coordinates"]
         rotateDegrees: [int, "-360 to 360, positive=clockwise, negative=counter-clockwise"]
         durationMs: [int, "Duration of gesture in milliseconds"]
         waitBeforeNext: [bool, "Block next actions until complete"]
         note: "Both fingers rotate around the center point between them. All coordinate fields support variable names for dynamic values"

       Paste:
         useClipboard: [bool, "true=paste from clipboard, false=use custom text"]
         forceClear: [bool, "Clear existing text before pasting"]
         text: [str, "Custom text to paste (when useClipboard=false)"]

    USBTetheringAction:
     description: Enable/disable/toggle USB tethering
     note: Requires root access or Shizuku
     params:
     m_option: [int, '{0:Turn On, 1:Turn Off, 2:Toggle}', "USB tethering state"]

    UpdateClipboardAction:
     description: Read the current clipboard content (forces clipboard refresh on Android 10+)
     note: On Android 10+, clipboard access requires user interaction - this action provides that
     params: {}

    UploadPhotoAction:
     description: Upload photo via email (uses Photo Taken trigger image)
     note: Uses image from Photo Taken trigger context
     params:
     m_option?: [str, "Upload option setting"]
     m_email?: [str, magic]
     emailSubject?: [str, magic, "Email subject line"]
     emailBody?: [str, magic, "Email body content"]
     emailFrom?: [str, magic, "From email address (SMTP mode)"]
     useSmtpEmail?: [bool, "Use SMTP instead of Gmail"]
     useHtml?: [bool, "Send email in HTML format"]

    VibrateAction:
     description: Vibrate the device with a pattern
     params:
     m_vibratePattern:
     - int
     - opt
     - '{0:Blip, 1:Short Buzz, 2:Long Buzz, 3:Rapid, 4:Slow, 5:Increasing, 6:Constant, 7:Decreasing, 8:Final Fantasy, 9:Game Over, 10:Star Wars, 11:Mini Blip, 12:Micro Blip}'
     - "Vibration pattern"
     waitToFinish:
     - boolean
     - opt
     - "Block next actions until vibration completes (default: false)"

    VoiceInputAction:
     description: Capture voice input and store in a variable
     note: Blocking action - pauses macro execution until complete
     params:
     variableName: [str, "string variable to store voice input name"]
     dictionaryKeys?: [dictkeys, "storing in dictionary entry"]

    VoiceSearchAction:
     description: Activate voice search
     params: {}

    VolumeIncrementDecrementAction:
     description: Increment or decrement the system volume by one step
     note: Uses the system's default volume step size. Affects the currently active audio stream.
     params:
     m_volumeUp: [bool, "volume up (increment)|volume down (decrement)"]

    WaitUntilTriggerAction:
     description: Wait until specified trigger(s) fire
     note: |
       Blocks macro execution until trigger fires or timeout.
       IMPORTANT: The trigger objects in triggersToWaitFor are NESTED INSIDE this action's JSON object.
       They are NOT separate items in m_actionList. Trigger classTypes must NEVER appear as standalone
       entries in m_actionList - they can only exist in m_triggerList or nested inside WaitUntilTriggerAction.
     blocking_action: true
     example: |
       CORRECT - triggers nested inside the action:
       {"m_classType": "WaitUntilTriggerAction", "m_SIGUID": 0,
        "triggersToWaitFor": [{"m_classType": "ShakeDeviceTrigger", "m_SIGUID": 0}],
        "timeoutSeconds": 30, "timeoutEnabled": true}

       WRONG - triggers as separate m_actionList entries:
       {"m_classType": "WaitUntilTriggerAction", ...},
       {"m_classType": "ShakeDeviceTrigger", ...}   <-- INVALID: trigger in m_actionList
     params:
     triggersToWaitFor: [arr, 'items:Trigger', "List of trigger objects NESTED inside this action (not in m_actionList)"]
     timeoutSeconds?: [int, 'def:60', "Timeout duration in seconds"]
     timeoutEnabled?: [bool, "Enable timeout"]
     continueOnTimeout?: [bool, T, "timeout occurs"]
     booleanVariableName?: [str, "Variable to store trigger fired status (true/false)"]
     booleanVarDictionaryKeys?: [dictkeys, "boolean variable is dictionary"]
     useVariableTimeout?: [bool, "Use variable for timeout"]
     variableTimeoutUnit: [int, 'when:useVariableTimeout', '{0:Seconds, 1:Minutes}', "Time unit for variable timeout"]
     timeoutVariableName: [str, 'when:useVariableTimeout', "Variable name containing timeout"]
     timeoutVariableDictionaryKeys?: [dictkeys, "timeout variable is dictionary"]
     useAlarm?: [bool, "Use alarm manager for timeout (more reliable)"]

    WearOsComplicationAction:
     description: Update Wear OS watch complication
     params:
     textContent?: [str, magic, "Text content to display on complication"]
     complicationType:
     - int
     - req
     - def:0
     - '{0:ShortText1, 1:ShortText2, 2:LongText1, 3:LongText2, 4:RangedValue1, 5:RangedValue2, 6:Icon1, 7:Icon2, 8:SmallImage1, 9:SmallImage2}'
     - "complication display type"
     imageResourceId?: [int, "Resource ID for icon"]
     imageResourceName?: [str, "Resource name for icon"]
     imagePackageName?: [str, "Package containing icon resource"]
     imageUri?: [str, "URI to custom icon image"]
     setIcon?: [bool, "set a custom icon"]

    WhatsAppAction:
     description: Send WhatsApp message
     params:
     number: [str, magic, "Phone number to send message to (with country code)"]
     messageText: [str, magic, "Message content"]
     prepopulateOnly?: [bool, "Only prepopulate message (don''t auto-send)"]
     exitAppAfter?: [bool, "Exit WhatsApp after sending"]
     isBusiness?: [bool, "Use WhatsApp Business app"]
     sendButtonPressDelayMs?: [int, 'def:2000', "Delay in milliseconds before pressing send button"]

    WifiSSIDScanAction:
     description: Scan for WiFi networks and store results
     note: Blocking action - waits for WiFi scan to complete
     blocking_action: true
     params:
     variableName: [str, "Dictionary variable name to store scan results"]
     isLocalVar?: [bool, "Is this a local variable"]
     dictionaryKeys?: [dictkeys, "storing in nested dictionary"]
     groupBy?: [int, '{0:By MAC Address, 1:By SSID}', "How to group scan results"]

    WriteToFileAction:
     description: Write content to a file
     params:
     m_logText: [str, magic, "Text content to write to file"]
     m_filename: [str, magic]
     m_append?: [bool, T]
     m_prepend?: [bool]
     overwrite?: [bool]
     m_path?: [str, "Legacy file path (deprecated)"]
     m_pathUri?: [str, "Storage Access Framework URI for folder"]
     m_pathName?: [str, "Display name of folder path"]
     useAllFilesAccess?: [bool, "Use All Files Access mode (Android 11+)"]
     allFilesPath?: [str, magic, "using All Files Access"]

# =============================================================================
# CONSTRAINTS
# =============================================================================
constraints:

    AccessibilityServiceStateConstraint:
     description: Check if accessibility service is enabled
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "service is enabled or disabled"]
     idList?: [arr, 'items:str', "List of accessibility service IDs"]
     nameList?: [arr, 'items:str', "List of accessibility service display names"]

    ActiveApplicationConstraint:
     description: Check if an app is active/in foreground or running in background
     params:
     m_active: [bool, "app is active/running|app is not active/running"]
     m_foreground: [bool, "check foreground|check background"]
     m_packageName?: [str, "Single package name (legacy, use m_packageNameList instead)"]
     m_applicationName?: [str, "Single app display name (legacy, use m_applicationNameList instead)"]
     m_packageNameList?: [arr, 'items:str', "List of package names to check"]
     m_applicationNameList?: [arr, 'items:str', "List of app display names"]
     usePackageNameOption?: [int, '{0:Select from app chooser, 1:Enter package name}', "Selection method"]
     customPackageName?: [str, 'when:usePackageNameOption=1', magic, "Custom package name"]
     mechanismOption?: [int, 'def:0', '{0:Either (Accessibility or Usage Access), 1:Accessibility Service only, 2:Usage Access only}', "Detection mechanism"]

    AirplaneModeConstraint:
     description: Check if airplane mode is enabled or disabled
     params:
     m_enabled: [bool, "airplane mode enabled|disabled"]

    AmbientDisplayStateConstraint:
     description: Check ambient display (always-on display) state
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "ambient display is enabled or disabled"]
     settingOption?: [int, '{0:Wake for notifications, 1:Always on}', "Settings option for ambient display"]

    AppEnabledConstraint:
     description: Check if an application is enabled or disabled on the device
     params:
     packageName: [str, magic, "Package name of the app to check"]
     appName: [str, "Display name of the app (optional, for UI display only)"]
     option: [int, "0 = Enabled, 1 = Disabled"]

    ApplicationInstalledConstraint:
     description: Check if an application is installed on the device
     params:
     packageName: [str, magic, "Package name of the app to check"]

    AutoRotateConstraint:
     description: Check if auto-rotate is enabled or disabled
     params:
     m_enabled: [bool, "auto-rotate enabled|disabled"]

    AutoSyncConstraint:
     description: Check if auto-sync is enabled or disabled
     params:
     m_enabled: [bool, "auto-sync enabled|disabled"]

    BatteryLevelConstraint:
     description: Battery level threshold
     common_mistakes: "This is a CONSTRAINT - it checks current state. It goes ONLY in m_constraintList, NEVER in m_triggerList. To DETECT battery level changes, use BatteryLevelTrigger in m_triggerList instead."
     params:
     m_greaterThan: [bool, "greater than threshold|less than threshold"]
     m_equals: [bool, "exact match (equals threshold exactly)"]
     m_batteryLevel: [int, 0-100, "Battery level percentage"]

    BatterySaverStateConstraint:
     description: Check battery saver mode state
     params:
     m_option: [int, '{0:Enabled, 1:Disabled}', "battery saver is enabled or disabled"]

    BatteryTemperatureConstraint:
     description: Battery temperature threshold
     params:
     greaterThan: [bool, "greater than threshold|less than threshold"]
     equals?: [bool, "exact match (equals temperature exactly)"]
     temperature: [int, 'def:30', 0-100, "Temperature in Celsius"]

    BluetoothConstraint:
     description: Bluetooth state constraint
     note: Uses WirelessState enum values
     params:
     m_btState:
     - int
     - req
     - '{0:Bluetooth Enabled, 1:Bluetooth Disabled, 2:Connected to device, 3:Not connected to device}'
     - "Bluetooth state to check"
     m_deviceName?: [str, "Device name to check connection for"]
     m_anyDevice?: [bool, "Check for any device connection"]
     m_deviceAlias?: [str, "Device alias/display name"]

    BrightnessConstraint:
     description: Check screen brightness level or auto-brightness state
     params:
     m_greaterThan: [bool, "greater than threshold|less than threshold"]
     m_equals?: [bool, "exact match (equals brightness level exactly)"]
     m_isAutoBrightness?: [bool, "check if auto-brightness is enabled (ignores other params)"]
     m_brightness: [int, 'def:50', 0-100, "Brightness level percentage"]
     m_forcePieMode?: [bool, "Use Android Pie+ brightness curve (for Android 9+)"]

    CalendarConstraint:
     description: Check if currently in/not in a calendar event
     params:
     m_entrySet: [bool, "in event|not in event"]
     m_calendarId: [str, "Calendar ID to check"]
     m_calendarName?: [str, "Calendar display name"]
     calendarAccount?: [str, "Calendar account name"]
     m_titleText?: [str, magic, "Event title to match (wildcards supported)"]
     m_detailText?: [str, magic, "Event description to match"]
     m_availability?: [int, '{0:Any, 1:Busy, 2:Free, 3:Tentative}', "Event availability type"]
     m_ignoreAllDay?: [bool, "Ignore all-day events"]
     enableRegex?: [bool, "Use regex for matching"]
     ignoreCase?: [bool, T, "Case-insensitive matching"]
     m_advanceTimeSeconds?: [int, "Advance time in seconds"]
     m_checkInAdvance?: [bool, "Check event in advance"]
     m_negativeAdvanceCheck?: [bool, "Check event after it ends"]

    CameraInUseConstraint:
     description: Check if camera is currently in use
     params:
      option: [int, '{0:Camera in use, 1:Camera not in use}', "Camera usage state"]
      cameraOption: [int, def:0, '{0:Any camera, 1:Back camera, 2:Front camera}', "Which camera to check"]

    CategoryEnabledConstraint:
     description: Check if a macro category is enabled
     params:
     option: [int, '{0:Enabled, 1:Disabled}', "category is enabled or disabled"]
     categoryName: [str, "the category to check name"]

    CellTowerConstraint:
     description: Check current cell tower
     params:
     m_inRange: [bool, "in range of specified towers|not in range"]
     m_cellGroupName?: [str, "cell tower group name"]
     m_cellIds: [arr, 'items:str', "List of cell tower IDs as strings"]

    ClipboardConstraint:
     description: Check if clipboard contents match a pattern
     params:
     text: [str, magic]
     enableRegex?: [bool, "Use regex instead of wildcard matching"]
     ignoreCase?: [bool, T, "matching (disabled if regex enabled)"]

    CompareValueConstraint:
     description: Compare two values
     params:
     type: [int, '{0:Boolean, 1:Integer, 2:String, 3:Decimal, 4:Dictionary, 5:Array}']
     value1: [str, magic, "First value to compare"]
     value2: [str, magic, "Second value to compare"]
     comparisonType:
     - int
     - req
     - '{0:Equals, 1:Not equals, 2:Less than, 3:Greater than, 4:Contains, 5:Excludes, 6:Contains key, 7:Excludes key, 8:Contains value, 9:Excludes value, 10:Matches key, 11:Matches value}'
     - "Comparison operator (0-3 for numbers, 0-1,4-5 for strings, 0-1,6-11 for arrays/dictionaries)"
     enableRegex?: [bool, "Use regex matching for text comparisons"]
     ignoreCase?: [bool, T, "Ignore case for text comparisons"]

    CustomSceneConstraint:
     description: Check if custom scene is visible
     params:
     identifier: [str, magic, "Scene identifier/GUID"]
     isShowing: [bool, "scene is visible|scene is not visible"]

    DarkThemeConstraint:
     description: Check if dark theme/night mode is enabled
     params:
     option: [int, '{0:Dark theme enabled, 1:Dark theme disabled}', "Theme mode to check"]

    DataOnOffConstraint:
     description: Check if mobile data is enabled or disabled
     params:
     m_dataOn: [bool, "mobile data enabled|disabled"]

    DayOfMonthConstraint:
     description: Check if current day matches specified days of month (1-31)
     params:
     m_daysOfMonth: ['bool[]', 'len:31', "Array of 31 booleans for days 1-31"]

    DayOfWeekConstraint:
     description: Only on specific days of week
     params:
     m_daysOfWeek: ['bool[]', 'len:7', '"[Sun-Sat]"']

    DeviceLockedConstraint:
     description: Check if device is locked or unlocked
     note: "NOTE: There is no 'DeviceUnlockedConstraint'. Use DeviceLockedConstraint with m_locked: false for unlocked state, m_locked: true for locked state"
     params:
     m_locked: [bool, "device is locked|device is unlocked"]

    DeviceOrientationConstraint:
     description: Check if device is in portrait or landscape orientation
     params:
     m_portrait: [bool, "portrait|landscape"]

    DrawerStateConstraint:
     description: Check MacroDroid drawer state (supports both legacy and custom scene-based drawers)
     params:
     option: [int, '{0:Open, 1:Closed, 2:Enabled, 3:Disabled}', "drawer is open, closed, enabled or disabled"]
     drawerType?: [int, '{0:Legacy drawer (default), 1:Custom drawer}', "Which drawer system to check"]
     customDrawerId?: [str, "UUID of the custom drawer to check (null for any custom drawer). Only used when drawerType=1"]
     customDrawerName?: [str, "Display name of the custom drawer (for UI display only). Only used when drawerType=1"]

    ExternalPowerConstraint:
     description: Check if device is connected to external power
     params:
     m_externalPower: [bool, "power connected|power disconnected"]
     m_powerConnectedOptions?: ['bool[]', 'def:[true, true, true]', 'len:3', "Power types to accept: [0:Wired fast, 1:Wired slow, 2:Wireless]"]

    FaceUpDownConstraint:
     description: Check device physical orientation (face up, face down, vertical, sideways). Also covers "flip device" scenarios - there is no separate FlipDeviceConstraint.
     common_mistakes: "This is a CONSTRAINT, not a trigger. To detect face-down/up EVENTS, use FlipDeviceTrigger. FaceUpDownConstraint only goes in m_constraintList, NEVER in m_triggerList."
     note: "NOTE: There is no 'FlipDeviceConstraint'. Use FaceUpDownConstraint to check device orientation (face up/down)"
     note: Requires accelerometer and magnetic field sensors
     params:
     m_option:
     - int
     - opt
     - def:-1
     - '{-1:Not set, 0:Face up, 1:Face down, 2:Vertical upright, 3:Vertical upside down, 4:Sideways left, 5:Sideways right}'
     - "Legacy single option (deprecated, use m_selectedOptions)"
     m_selectedOptions:
     - bool[]
     - opt
     - len:6
     - '"[Face up, Face down, Vertical upright, Vertical upside down, Sideways left, Sideways right]"'

    FloatingButtonConstraint:
     description: Check floating button visibility
     params:
     identifier: [str, magic, "Floating button identifier"]
     isShowing: [bool, "button is visible|button is not visible"]

    FloatingTextConstraint:
     description: Check floating text visibility
     params:
     identifier: [str, magic, "Floating text identifier"]
     isShowing: [bool, "text is visible|text is not visible"]

    FoldAngleConstraint:
     description: Check foldable device fold angle
     params:
     option: [int, '{0:Flat (fully open), 1:Folded (closed), 2:Half open}', "Fold angle state to check"]

    GPSEnabledConstraint:
     description: Check if GPS/Location is enabled
     params:
     m_enabled: [bool, "GPS enabled|disabled"]

    GeofenceConstraint:
     description: Check if device is inside/outside a geofence
     params:
     option: [int, '{0:Inside, 1:Outside}', "inside or outside geofence"]
     geofenceId: [str, "Geofence identifier"]
     geofenceName: [str, "Display name of the geofence"]
     allowUnknown?: [bool, "location is unknown"]
     updateRateText?: [str, "Text description of update rate"]
     updateRateMinutes?: [int, 'def:5', "Update rate in minutes"]

    HeadphonesConnectionConstraint:
     description: Check if headphones/audio output is connected
     note: Checks for wired headphones, wired headsets, and Bluetooth A2DP
     params:
     m_connected: [bool, "headphones connected|headphones not connected"]

    InCallConstraint:
     description: Check if device is in a phone call
     note: "NOTE: There is no 'CallActiveConstraint'. Use InCallConstraint to check if a call is active"
     params:
     m_inCall: [bool, "in call|not in call"]

    InvocationMethodConstraint:
     description: Check how the macro was invoked
     params:
     option?: [int, 'def:-1', "Legacy option field (-1 means use selectedOptions array)"]
     selectedOptions:
     - bool[]
     - opt
     - len:16
     - "Array of invocation methods to check: [0:MacroDroid Drawer, 1:Notification, 2:Option Dialog, 3:Run Macro Action, 4:Shortcut, 5:Google Assistant, 6:Quick Run, 7:Power Menu, 8:Other Standard Trigger, 9:Floating Text Click, 10:Test Actions, 11:Test Macro, 12:Scene, 13:Overlay Bar Button, 14:Animation Overlay, 15:Floating Button]"
     notInvokedBy?: [bool, "check NOT invoked by|check invoked by"]

    IpAddressConstraint:
     description: Check device IP address
     params:
     ipAddress: [str, magic, "IP address or pattern to match (supports wildcards)"]
     matches: [bool, "IP matches pattern|IP does not match pattern"]

    IsAdbHackedConstraint:
     description: Check if ADB hack permissions are granted
     params:
     isAdbHacked: [bool, "ADB permissions granted|not granted"]
     adbOptionStates?: ['bool[]', 'len:5', '"[0:WRITE_SECURE_SETTINGS, 1:READ_LOGS, 2:SET_VOLUME_KEY_LONG_PRESS_LISTENER, 3:CHANGE_CONFIGURATION, 4:DUMP]"']

    IsRoamingConstraint:
     description: Check if device is roaming
     params:
     m_isRoaming: [bool]

    IsRootedConstraint:
     description: Check if device has root access
     params:
     m_rooted: [bool, "device is rooted|device is not rooted"]

    LastRunTimeConstraint:
     description: Check time since macro last ran
     params:
     m_invoked: [bool, "invoked within time period|not invoked within time period"]
     m_timePeriodSeconds: [int, "Time period in seconds"]
     m_macroIds?: [arr, 'items:long', "List of macro GUIDs to check"]
     m_macroNames?: [arr, 'items:str', "List of macro names (display names)"]
     checkThisMacro?: [bool, T, "check this macro|check macros in list"]
     textToMatch?: [str, magic, "Text pattern to match macro names (wildcards supported)"]
     matchOption:
     - int
     - opt
     - def:0
     - '{0:Contains, 1:Matches (exact)}'
     - "How to match macro names when using textToMatch"

    LightLevelConstraint:
     description: Check ambient light level from light sensor
     params:
     m_option: [int, '{0:Less than, 1:Greater than}', "Comparison mode"]
     m_lightLevel?: [int, "Light level threshold (legacy integer, use m_lightLevelFloat)"]
     m_lightLevelFloat: [float, "Light level threshold in lux"]

    LocationModeConstraint:
     description: Check location mode setting
     params:
     m_options: ['bool[]', '"Array of location modes to match [Off, Sensors only, Battery saving, High accuracy]"']
     hasNewConfig?: [bool, T, "using new configuration format"]

    LogicConstraint:
     description: Combine constraints with AND/OR logic
     params:
     m_option: [int, '{0:AND - all must be true, 1:OR - any must be true, 2:XOR - exactly one must be true, 3:NOT}', "Logic mode for combining constraints"]
     m_childConstraints?: [arr, 'items:Constraint', "Child constraints to combine"]

    MacroDroidVariableConstraint:
     description: Check variable value condition - supports boolean, integer, decimal, string, and dictionary/array variables
     note: Parameters used depend on the variable type being checked.
     params:
     m_variable:
       _t: obj
       _req: true
       _desc: Variable to check (MacroDroidVariable object)
       m_name: [str, "Variable name"]
       m_type: [int, '{0:Boolean, 1:Integer, 2:String, 3:Decimal, 4:Dictionary, 5:Array}']
       m_booleanValue?: [bool, "Boolean value"]
       m_intValue?: [long, "Integer value"]
       m_stringValue?: [str, "String value"]
       m_decimalValue?: [double, "Decimal value"]
       isLocalVariable?: [bool, "Variable is local to macro"]
     m_booleanValue?: [bool, "Expected boolean value (true/false) for boolean variable comparison"]
     m_intValue?: [long, "Integer value to compare against"]
     m_intGreaterThan?: [bool, "variable > value (for integer/decimal)"]
     m_intLessThan?: [bool, "variable < value (for integer/decimal)"]
     m_intNotEqual?: [bool, "variable != value (for integer/decimal)"]
     m_intCompareVariable?: [bool, "Compare against another variable instead of a fixed value"]
     m_otherValueToCompare?:
       _t: obj
       _desc: Other variable to compare against (MacroDroidVariable object)
       m_name?: [str, "Variable name"]
       m_type?: [int, "Variable type"]
       isLocalVariable?: [bool]
     compareVarDictionaryKeys?:
       _t: dictkeys
       _desc: Dictionary keys for the comparison variable (if it's a dictionary/array)
       keys?: [arr, 'items:str']
     m_expression?: [str, magic, "Mathematical expression to evaluate for comparison (for integer/decimal)"]
     m_doubleValue?: [double, "Decimal value to compare against"]
     m_stringValue?: [str, magic, "String value to compare against"]
     m_stringComparisonType?: [int, 'def:0', '{0:Equality check (equals/not equals), 1:Contains, 2:Excludes (does not contain)}', "String comparison type"]
     m_stringEqual?: [bool, F, "equals|not equals (when m_stringComparisonType is 0)"]
     enableRegex?: [bool, "Use regex for string matching"]
     checkCase?: [bool, "Case-sensitive matching (true = case sensitive, false = ignore case)"]
     dictionaryKeys?:
       _t: dictkeys
       _desc: Keys to access nested dictionary/array entries
       keys?: [arr, 'items:str', "List of keys for nested access"]
     dictionaryType?: [int, 'def:-1', '{-1:Not set, 0:Boolean, 1:Integer, 2:String, 3:Decimal}', "Target dictionary/array entry type"]

    MacroEnabledConstraint:
     description: Check if a specific macro is enabled or disabled
     params:
