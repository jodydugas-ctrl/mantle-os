      params:
        m_notificationText: [str, magic, "body text"]
        m_overwriteExisting?: [bool, T, "overwrite"]
        m_notificationSubject: [str, magic, "title"]
        m_imageResourceName?: [str, "icon name"]
        m_runMacroWhenPressed?: [bool, "on press"]
        m_macroGUIDToRun?: [long, "Macro GUID to run if notification is pressed"]
        macroNameToRun?: [str, "macro to run (for display) name"]
        actionBlockData?: [ActionBlockData, "see ActionBlockData schema"]
        m_imageResourceId?: [int, "icon ID"]
        m_iconBgColor?: [int, "icon bg (ARGB)"]
        m_ringtoneName?: [str, "ringtone"]
        m_ringtoneIndex?: [int, "ringtone idx"]
        m_priority?: [int, '{-2:Min, -1:Low, 0:Default, 1:High, 2:Max}', "priority"]
        m_notificationChannelType?: [int, '{0:Default, 1:Silent, 2:Custom}', "channel type"]
        notificationChannelName?: [str, "channel name"]
        notificationActionButtons?: [arr, 'items:NotificationActionButton', "action buttons"]
        iconType:
          - int
          - opt
          - def:0
          - '{0:Built-in, 1:Custom text, 2:External package, 3:Custom image}'
          - "notification icon type"
        iconText?: [str, "Custom text for icon (used if iconType=1)"]
        disableHtml?: [bool, "no HTML"]
        m_imagePackageName?: [str, "icon pkg"]
        m_imageUri?: [str, "icon URI"]
        m_backgroundColor?: [int, "bg color (ARGB)"]
        m_textColor?: [int, "text color (ARGB)"]
        autoExpand?: [bool, "auto expand"]
        yPosition?: [float, 'def:0.5', "y pos 0-1"]
        showAsOverlayOption?: [int, '{0:Standard notification, 1:Overlay dialog, 2:Heads-up}', "display mode"]
        overlayOptionBooleanVariableName?: [str, "result var"]
        dimBackground?: [bool, "overlay"]
        overlayOptionBooleanDictionaryKeys?: [dictkeys, "result dict keys"]
        notificatonId?: [int, "notif ID"]
        notificationIdString?: [str, "notif ID str"]
        group?: [str, "group"]
        liveNotification?: [bool, "live update"]
        shortCriticalText?: [str, magic, "critical text"]
        displayOverStatusBar?: [bool, "over status bar"]
        preventRemovalByBin?: [bool, "prevent clear"]
        preventAndroid16Grouping?: [bool, "no auto group"]

      NotificationActionButton:
        note: "Button that appears on notification. Can invoke macro or action block when pressed."
        fields:
          label: [str, "Button label text"]
          macroGuid?: [long, "Macro GUID to run when pressed"]
          macroName?: [str, "Macro name (for display)"]
          actionBlockData?: [ActionBlockData, "see ActionBlockData schema"]

    NotificationInteractionAction:
     description: Interact with notifications
     params:
     actionsOption?: [int, '{0:Click notification, 1:Click action 1, 2:Click action 2, 3:Click action 3, 4:Click action 4, 5:Click action 5}', "Action type"]
     packageName?: [str, "Package name of app to match"]
     applicationName?: [str, "Application display name"]
     matchText?: [str, magic, "Text pattern to match in notification content"]
     matchOption?: [int, '{0:Any, 1:Exact match, 2:Contains, 3:Excludes}', "Match option for text matching"]
     enableRegex?: [bool, "Enable regex matching for text"]
     ignoreCase?: [bool, "Ignore case when matching text"]
     excludesApps?: [bool, "Exclude specified apps instead of include"]
     useNotificationTrigger?: [bool, "Use notification from trigger that invoked macro"]
     titleContent?: [str, magic, "Title text pattern to match separately"]
     messageContent?: [str, magic, "Message text pattern to match separately"]
     separateTitleAndMessage?: [bool, "Match title and message separately"]
     matchOptionTitle?: [int, '{0:Any, 1:Exact match, 2:Contains, 3:Excludes}', "Match option for title"]
     matchOptionMessage?: [int, '{0:Any, 1:Exact match, 2:Contains, 3:Excludes}', "Match option for message"]

    NotificationReplyAction:
     description: Reply to notification or perform notification actions (for messaging apps)
     params:
     applicationName?: [str, "App display name filter"]
     packageName?: [str, "Package name filter"]
     replyText: [str, magic, "Text to send as reply"]
     useNotificationTrigger?: [bool, T, "Use notification from trigger context"]
     matchOption?: [int, '{0:Any, 1:Exact match, 2:Contains, 3:Excludes}', "How to match notification"]
     matchText?: [str, "Text to match in notification"]
     enableRegex?: [bool, "Enable regex matching"]
     ignoreCase?: [bool, T, "Case insensitive matching"]

    OCRAction:
     description: Perform OCR on image to extract text into array/dictionary variable
     params:
     option:
     - int
     - req
     - '{0:Photo Taken Trigger, 1:Photo (take new photo), 2:File (select from storage)}'
     - "Source of image for OCR"
     variableName: [str, "Array variable name to store OCR results"]
     isLocalVar?: [bool, "variable is local to macro"]
     dictionaryKeys?: [dictkeys, "storing in nested structure"]
     charsetOption?: [int, '{0:Latin, 1:Japanese, 2:Korean, 3:Chinese}', "Character set for OCR"]
     fileDisplayName?: [str, magic, "option=2)"]
     dynamicPathUri?: [str, "option=2)"]
     pathName?: [str, "Display path name"]
     flashOption?: [int, '{0:Off, 1:On, 2:Auto}', "taking photo (option=1)"]

    OpenCallLogAction:
     description: Open call log screen
     params: {}

    OpenFileAction:
     description: Open a file with a specific application
     params:
     m_packageName?: [str, "Package name of the app to open the file with"]
     m_className?: [str, "Activity class name to launch"]
     m_appName?: [str, "Display name of the app"]
     m_fileUri?: [str, "URI of the file to open (for static filename)"]
     m_fileDisplayName?: [str, magic, "Filename to display/use"]
     dynamicPathUri?: [str, "URI of the directory containing the file"]
     pathName?: [str, "Display path name"]
     useStaticFilename?: [bool, T, "use fixed file|use dynamic filename in folder"]
     useUri?: [bool, "true = use localFileUri for content URI"]
     localFileUri: [str, 'when:useUri', magic, "useUri is true"]
     useAllFilesAccess?: [bool, "Use All Files Access instead of SAF"]
     allFilesAccessPath?: [str, magic, "Path for All Files Access"]

    OpenLastPhotoAction:
     description: Open most recent photo in specified app
     params:
     packageName: [str, "Package name of app to open photo with"]
     appName: [str, "Display name of app"]

    OpenMacroDroidLogAction:
     description: Open MacroDroid log screen
     params:
     m_logType?: [int, '{0:System log, 1:User log}', "Which log to open"]
     userLogChannel?: [str, "Specific user log channel name (null = default/General)"]

    OpenWebPageAction:
     description: Open URL in browser or perform HTTP GET request
     params:
     m_urlToOpen: [str, magic, "URL to open or fetch"]
     m_httpGet?: [bool, "Perform HTTP GET instead of opening in browser"]
     m_variableToSaveResponse?: [var, "Variable to save HTTP response (when m_httpGet is true)"]
     m_variableSuccessResponse?: [var, "Boolean variable to save success/failure status (when m_httpGet is true)"]
     m_disableUrlEncode?: [bool, "Disable URL encoding"]
     blockNextAction?: [bool, "Block next action until HTTP request completes (when m_httpGet is true)"]
     allowAnyCertificate?: [bool, "Allow any SSL certificate (when m_httpGet is true)"]

    OptionDialogAction:
      description: Display a dialog with up to 3 button options that can trigger macros or action blocks
      blocking_action: true
      params:
        m_title: [str, magic, "Dialog title"]
        m_message: [str, magic, "Dialog message text"]
        m_buttonNames: [arr, magic, 'items:str', "MUST have exactly 3 entries - names for the three buttons (empty string = button hidden). Always provide all 3 entries even if some buttons are unused."]
        m_actionMacroGuids:
          - arr
          - req
          - items:long
          - "GUIDs of macros/action blocks to run for each button (0 = no action, 1 = ignore & continue, 2 = ignore & cancel)"
        actionBlockData?: [arr, 'items:ActionBlockData|null', "Action block data per button (see ActionBlockData schema). Use null for buttons with no action block."]
        disableLogging?: [bool, "Disable logging for this action"]
        m_defaultButton:
          - int
          - opt
          - def:0
          - '{0:None (no auto-select), 1:Left button, 2:Center button, 3:Right button}'
          - "Button to auto-select after timeout"
        m_defaultTimeOutSecs?: [int, 'def:30', "Timeout in seconds when m_defaultButton > 0"]
        blockNextAction?: [bool, "Wait for user response before continuing macro"]
        preventBackButtonClosing?: [bool, "Prevent back button from closing dialog"]
        continueOnBackPress?: [bool, "Continue macro execution if back button is pressed"]

    OverlayDialogAction:
     description: Display an overlay dialog with customizable content (extends NotificationAction)
     note: Inherits ALL fields from NotificationAction parent class
     params:
     m_notificationSubject?: [str, magic, "Dialog title/subject"]
     m_notificationText?: [str, magic, "Dialog message text"]
     m_backgroundColor?: [int, "Dialog background color (ARGB)"]
     m_textColor?: [int, "Dialog text color (ARGB)"]
     m_imageResourceName?: [str, "Resource name for dialog image"]
     m_imageResourceId?: [int, "Resource ID for dialog image"]
     m_ringtoneIndex?: [int, "Sound index"]
     m_ringtoneName?: [str, "Ringtone name"]
     m_overwriteExisting?: [bool, "Overwrite existing dialog"]
     notificatonId?: [int, "Unique ID for this dialog"]
     notificationActionButtons?: [arr, "Action buttons for the dialog"]
     yPosition?: [float, 'def:0.5', "Vertical position (0.0-1.0)"]
     dimBackground?: [bool, "Dim the background behind dialog"]
     disableHtml?: [bool, "Disable HTML rendering"]
     showAsOverlayOption?: [int, '{0:Auto (use variable), 1:Always overlay, 2:Always activity}', "Display mode"]
     overlayOptionBooleanVariableName?: [str, "Variable name to determine overlay mode (when showAsOverlayOption=0)"]
     overlayOptionBooleanDictionaryKeys?: [dictkeys, "Dictionary keys for overlay option variable"]
     displayOverStatusBar?: [bool, "over status bar"]
     preventRemovalByBin?: [bool, "Prevent removal by dragging to bin"]

    PauseAction:
     description: Pause execution for specified time (Wait action)
     common_mistakes: "Do NOT use 'WaitAction' - the correct classType is 'PauseAction'"
     note: Also known as 'Wait' in the UI
     params:
     m_delayInSeconds: [int, 'def:1', "Delay in seconds (whole seconds component)"]
     m_delayInMilliSeconds?: [int, "Additional delay in milliseconds (0-999)"]
     m_useAlarm?: [bool, T, "Use alarm manager for exact timing"]
     m_variable?: [obj]
     unitForVariables: [int, 'when:m_variable != null', '{0:Seconds, 1:Minutes, 2:Milliseconds}', "Unit for variable delay"]
     varDictionaryKeys?: [dictkeys, "m_variable is a dictionary"]

    PinUnlockAction:
     description: Unlock device by entering PIN via accessibility
     note: Requires UI Interaction accessibility service; PIN is encrypted
     blocking_action: true
     params:
     pinNumber: [str, magic, "PIN to enter (encrypted, supports magic text)"]
     swipeUpDelay?: [long, 'def:800', "Delay in milliseconds before/after swipe up gesture"]
     digitClickDelay?: [long, 'def:200', "Delay in milliseconds between digit clicks"]

    PlaySoundAction:
     description: Play a sound file or stop playing sounds
     note: Supports static file selection or dynamic filename with magic text
     params:
     m_filePath?: [str, "Sound file path (system ringtone name or file path, null to stop sounds)"]
     m_fileUri?: [str, "Sound file URI (for files selected via SAF)"]
     m_fileDisplayName?: [str, "Display name of selected file"]
     waitToFinish?: [bool, "Block until sound finishes playing"]
     specifyAudioStream?: [bool, "Use custom audio stream instead of default"]
     audioStream:
     - int
     - when:specifyAudioStream
     - '{0:Voice call, 1:System, 2:Ring, 3:Music, 4:Alarm, 5:Notification}'
     - "Audio stream to use for playback"
     staticFilename?: [bool, T, "Use static file (true) or dynamic filename (false)"]
     dynamicFilename: [str, 'when:staticFilename=false', magic, "Dynamic filename with magic text support"]
     dynamicPathUri: [str, 'when:staticFilename=false', "Base folder URI for dynamic file lookup"]
     dynamicPathName?: [str, "Display name of dynamic path folder"]
     useAllFilesAccess?: [bool, "Use All Files access for Android 11+"]
     allFilesPath?: [str, magic, "Full path for All Files access mode"]
     allFilesFilename?: [str, magic, "Filename for All Files access mode"]

    PressBackAction:
     description: Simulate pressing the back button
     note: Requires Accessibility Service or root access
     params: {}

    ReadFileAction:
     description: Read contents of a file into a variable
     params:
     variableName: [str, "Variable name to store file contents"]
     dictionaryKeys?: [dictkeys, "storing in dictionary variable"]
     staticFilepath?: [str, "Static file path (when staticFilename=true)"]
     staticPathUri?: [str, "Static file URI (when staticFilename=true)"]
     filename?: [str, magic, "Dynamic filename (when staticFilename=false)"]
     pathUri?: [str, "Dynamic folder URI (when staticFilename=false)"]
     pathName?: [str, "Display path name"]
     staticFilename: [bool, T, "True for static file selection, false for dynamic folder+filename"]
     useAllFilesAccess?: [bool, "Use All Files Access instead of SAF"]
     allFilesAccessPath?: [str, magic, "Path for All Files Access"]

    ReadQRCodeAction:
     description: Read QR code from image source
     note: Can read from photo trigger, take new photo, from file (SAF or All File Access), or from screen.
     blocking_action: true
     params:
     option:
     - int
     - req
     - def:-1
     - '{-1:Not set, 0:Photo taken trigger, 1:Take photo, 2:From file, 3:Read from screen}'
     - "Source of image to read QR code from"
     variableName: [str, "Variable name to store QR code content"]
     isLocalVar?: [bool, "the output is local"]
     dictionaryKeys?: [dictkeys, "output variable is dictionary"]
     fileDisplayName?: [str, "Display name of selected file (when option=2, SAF mode)"]
     dynamicPathUri?: [str, "URI of file to read (when option=2, SAF mode)"]
     pathName?: [str, "Display path name (SAF mode)"]
     useAllFilesAccess?: [bool, def:false, "Use All File Access instead of SAF (when option=2)"]
     allFilesAccessPath?: [str, "Absolute file path (when option=2, useAllFilesAccess=true)"]
     flashOption?: [int, '{0:Off, 1:On, 2:Auto}', "taking photo (when option=1)"]

    ReadScreenContentsAction:
     description: Read all text content from current screen via accessibility
     params:
     variableName: [str, "Dictionary variable name to store screen contents"]
