     pathUri?: [str, "Output folder URI (SAF)"]
     pathName?: [str, "Display name of output folder"]
     audioBitRate?: [int, 'def:96000', "Audio bit rate in bps"]
     audioSamplingRate?: [int, 'def:44100', "Audio sampling rate in Hz"]
