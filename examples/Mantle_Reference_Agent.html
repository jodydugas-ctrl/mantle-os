  // §Foundry Operations — scripted crystal array operations (§1.19, HF-B23)
  // FORGE/CLONE/DISTILL/GRAFT/CALCIFY/SEAL — all deterministic, no LLM.
  const rFoundry = useCallback(
    async ({ op = "", shardId = "", sourceShard = "", purposeId: purId = "", reason = "", _b = false } = {}) => {
      const ii = !_b ? app("USER", "USER.INPUT", "Foundry." + op + (shardId ? " " + shardId : ""), { type: "physical" }) : null;
      const s = lr.current;
      const logImmune = (type, msg) => {
        if (!s.reservedShards["immune.vcw"]) s.reservedShards["immune.vcw"] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: "immune.vcw", private: 0x00 };
        s.reservedShards["immune.vcw"].entries.push({ seq: s.reservedShards["immune.vcw"].entries.length, timestamp: iso(), type, message: msg, source: "reflexFoundry" });
        cubeMirror(s, "immune", s.reservedShards["immune.vcw"].entries.at(-1), { opcode: "IMMUNE" });
      };
      if (!op) {
        if (!_b) app("REFLEX", "RFL.FAIL", "op required", { type: "physical", stateSnapshot: sn() }, ii);
        return { error: "op required" };
      }
      try {
        if (op === "FORGE") {
          // FORGE — create a new shard from a Purpose Manifest (§1.19.1)
          if (!purId) return { error: "purposeId required for FORGE" };
          if (s.reservedShards[purId]) return { error: "Shard already exists: " + purId };
          const name = shardId || purId;
          s.reservedShards[name] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: purId, private: 0x00, createdAt: iso(), reason, forgedAt: iso() };
          app("SYSTEM", "SHARD.FORGE", "Forged new shard: " + name + " purpose=" + purId, { type: "lifecycle", shardId: name, purposeId: purId });
          logImmune("CONFIRMED", "FORGE " + name + " — new shard created, purpose=" + purId);
          if (!_b) app("REFLEX", "RFL.RESULT", "Forged: " + name, { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "FORGE", shardId: name, purposeId: purId };

        } else if (op === "CLONE") {
          // CLONE — duplicate a shard with new key derivation (§1.19.2)
          const src = s.reservedShards[sourceShard];
          if (!src) return { error: "Source shard not found: " + sourceShard };
          const cloneName = shardId || (sourceShard.replace(".vcw", "") + "_clone_" + Date.now() + ".vcw");
          s.reservedShards[cloneName] = { ...JSON.parse(JSON.stringify(src)), purposeId: cloneName, clonedFrom: sourceShard, createdAt: iso(), tier: CRYSTAL_TIER.HOT };
          app("SYSTEM", "SHARD.CLONE", "Cloned " + sourceShard + " → " + cloneName, { type: "lifecycle", source: sourceShard, dest: cloneName });
          logImmune("CONFIRMED", "CLONE " + sourceShard + " → " + cloneName);
          if (!_b) app("REFLEX", "RFL.RESULT", "Cloned: " + sourceShard + " → " + cloneName, { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "CLONE", source: sourceShard, dest: cloneName };

        } else if (op === "DISTILL") {
          // DISTILL — extract high-weight blocks to a new shard (§1.19.3)
          const src = s.reservedShards[sourceShard];
          if (!src) return { error: "Source shard not found: " + sourceShard };
          const destName = shardId || (sourceShard.replace(".vcw", "") + "_distilled_" + Date.now() + ".vcw");
          const highWeight = (src.entries || []).filter((e) => (e.weight ?? 1.0) >= 1.0);
          s.reservedShards[destName] = { entries: JSON.parse(JSON.stringify(highWeight)), tier: CRYSTAL_TIER.HOT, purposeId: destName, private: 0x00, createdAt: iso(), distilledFrom: sourceShard };
          app("SYSTEM", "SHARD.DISTILL", "Distilled " + highWeight.length + " high-weight blocks from " + sourceShard + " → " + destName, { type: "lifecycle", source: sourceShard, dest: destName, blockCount: highWeight.length });
          logImmune("CONFIRMED", "DISTILL " + sourceShard + " → " + destName + " (" + highWeight.length + " blocks)");
          if (!_b) app("REFLEX", "RFL.RESULT", "Distilled " + highWeight.length + " blocks to " + destName, { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "DISTILL", source: sourceShard, dest: destName, blockCount: highWeight.length };

        } else if (op === "GRAFT") {
          // GRAFT — import a foreign shard after immune scan (§1.19.4 + §1.19.8)
          const donor = s.reservedShards[sourceShard];
          if (!donor) return { error: "Donor shard not found: " + sourceShard };
          // §1.19.8: Run immune scan of donor before import (HF-B24)
          const anomalies = (donor.entries || []).filter((e) => e.quarantined || (e.weight ?? 1.0) < 0.5);
          logImmune(anomalies.length > 0 ? "CONTRADICTION" : "CONFIRMED",
            "GRAFT pre-scan of " + sourceShard + ": " + (anomalies.length > 0 ? anomalies.length + " anomalies found — import proceeds with quarantine flags" : "clean"));
          const dest = shardId || (sourceShard.replace(".vcw", "") + "_grafted_" + Date.now() + ".vcw");
          const safeEntries = (donor.entries || []).map(e => anomalies.includes(e) ? { ...e, quarantined: true, weight: 0.0 } : e);
          s.reservedShards[dest] = { entries: JSON.parse(JSON.stringify(safeEntries)), tier: CRYSTAL_TIER.HOT, purposeId: dest, private: 0x00, createdAt: iso(), graftedFrom: sourceShard, immuneScanAt: iso(), anomalyCount: anomalies.length };
          app("SYSTEM", "SHARD.GRAFT", "Grafted " + sourceShard + " → " + dest + " (immune scan: " + (anomalies.length > 0 ? anomalies.length + " quarantined" : "clean") + ")", { type: "lifecycle", source: sourceShard, dest, anomalies: anomalies.length });
          if (!_b) app("REFLEX", "RFL.RESULT", "Grafted: " + sourceShard + " → " + dest, { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "GRAFT", source: sourceShard, dest, anomalies: anomalies.length };

        } else if (op === "CALCIFY") {
          // CALCIFY — promote HOT/COLD shard to FROZEN tier (§1.19.5)
          const target = s.reservedShards[shardId];
          if (!target) return { error: "Shard not found: " + shardId };
          if (target.tier === CRYSTAL_TIER.FROZEN) return { ok: true, note: "Already FROZEN" };
          if (target.tier === CRYSTAL_TIER.ARCHIVED) return { error: "Cannot CALCIFY an ARCHIVED shard" };
          const prevTier = target.tier;
          target.tier = CRYSTAL_TIER.FROZEN;
          target.calcifiedAt = iso();
          app("SYSTEM", "SHARD.CALCIFY", "Calcified " + shardId + " (" + prevTier + " → FROZEN)", { type: "lifecycle", shardId, prevTier });
          logImmune("CONFIRMED", "CALCIFY " + shardId + " " + prevTier + "→FROZEN — remains referenceable");
          if (!_b) app("REFLEX", "RFL.RESULT", "Calcified: " + shardId + " → FROZEN", { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "CALCIFY", shardId, prevTier, newTier: CRYSTAL_TIER.FROZEN };

        } else if (op === "SEAL") {
          // SEAL — finalize a shard against further appends (§1.19.6)
          const target = s.reservedShards[shardId];
          if (!target) return { error: "Shard not found: " + shardId };
          if (target.sealed) return { ok: true, note: "Already sealed" };
          target.sealed = true;
          target.sealedAt = iso();
          target.sealReason = reason;
          app("SYSTEM", "SHARD.SEAL", "Sealed shard: " + shardId + (reason ? " reason=" + reason : ""), { type: "lifecycle", shardId, reason });
          logImmune("CONFIRMED", "SEAL " + shardId + " — finalized, no further appends");
          if (!_b) app("REFLEX", "RFL.RESULT", "Sealed: " + shardId, { type: "physical", stateSnapshot: sn() }, ii);
          sync();
          return { ok: true, op: "SEAL", shardId, sealedAt: target.sealedAt };

        } else {
          return { error: "Unknown foundry op: " + op + ". Valid: FORGE, CLONE, DISTILL, GRAFT, CALCIFY, SEAL" };
        }
      } catch (e) {
        if (!_b) app("REFLEX", "RFL.FAIL", "Foundry." + op + " failed: " + e.message, { type: "physical", stateSnapshot: sn() }, ii);
        sync();
        return { error: e.message };
      }
    },
    [app, sn, sync]
  );

  // §reflexManageModels — MIND adds or removes models from the LLM roster
  const rManageModels = useCallback(
    async ({ op = "", modelId = "", contextWindow = 128000, inputCostPer1M = 0, outputCostPer1M = 0, _b = false } = {}) => {
      const ii = !_b ? app("USER", "USER.INPUT", "ManageModels op=" + op + " model=" + tr(modelId, 40), { type: "physical" }) : null;
      if (!op || !modelId) {
        if (!_b) app("REFLEX", "RFL.FAIL", "op and modelId required", { type: "physical", stateSnapshot: sn() }, ii);
        return { error: "op and modelId required" };
      }
      if (op === "add") {
        const isFree = modelId.includes(":free") || (inputCostPer1M === 0 && outputCostPer1M === 0);
        PROVIDERS[0].models[modelId] = {
          supportsThinking: false, supportsTools: true,
          contextWindow, inputCostPer1M, outputCostPer1M,
          capabilityLevel: isFree ? 1 : 3,
          capabilityNote: isFree
            ? "FREE — $0 input / $0 output, ctx " + contextWindow.toLocaleString()
            : "$" + inputCostPer1M + " input / $" + outputCostPer1M + " output, ctx " + contextWindow.toLocaleString(),
        };
        // Persist: update registry if one exists, otherwise fall back to extras list
        try {
          const reg = JSON.parse(localStorage.getItem("vcw_model_registry") || "null");
          if (reg) { reg[modelId] = PROVIDERS[0].models[modelId]; localStorage.setItem("vcw_model_registry", JSON.stringify(reg)); }
          else {
            const extras = JSON.parse(localStorage.getItem("vcw_extra_models") || "[]");
            if (!extras.includes(modelId)) { extras.push(modelId); localStorage.setItem("vcw_extra_models", JSON.stringify(extras)); }
          }
        } catch (_) {}
        app("SYSTEM", "SYS.RESOURCE",
          "Model added to roster: " + modelId + " | ctx:" + contextWindow.toLocaleString() + " | in:$" + inputCostPer1M + "/1M | out:$" + outputCostPer1M + "/1M" + (isFree ? " | FREE" : ""),
          { type: "model_registry", op: "add", modelId, contextWindow, inputCostPer1M, outputCostPer1M });
        if (!_b) app("REFLEX", "RFL.RESULT", "Model added: " + modelId, { type: "physical", stateSnapshot: sn() }, ii);
        sync();
        return { ok: true, op: "add", modelId };
      }
      if (op === "remove") {
        if (!PROVIDERS[0].models[modelId]) {
          if (!_b) app("REFLEX", "RFL.FAIL", "Model not in roster: " + modelId, { type: "physical", stateSnapshot: sn() }, ii);
          return { error: "Model not found in roster: " + modelId };
        }
        delete PROVIDERS[0].models[modelId];
        try {
          const reg = JSON.parse(localStorage.getItem("vcw_model_registry") || "null");
          if (reg) { delete reg[modelId]; localStorage.setItem("vcw_model_registry", JSON.stringify(reg)); }
          const extras = JSON.parse(localStorage.getItem("vcw_extra_models") || "[]");
          localStorage.setItem("vcw_extra_models", JSON.stringify(extras.filter((x) => x !== modelId)));
        } catch (_) {}
        app("SYSTEM", "SYS.RESOURCE",
          "Model removed from roster: " + modelId,
          { type: "model_registry", op: "remove", modelId });
        if (!_b) app("REFLEX", "RFL.RESULT", "Model removed: " + modelId, { type: "physical", stateSnapshot: sn() }, ii);
        sync();
        return { ok: true, op: "remove", modelId };
      }
      if (!_b) app("REFLEX", "RFL.FAIL", "Unknown op: " + op, { type: "physical", stateSnapshot: sn() }, ii);
      return { error: "Unknown op: " + op + ". Valid: add, remove" };
    },
    [app, sn, sync]
  );

        ARM_KEYS.push(key.trim());

        if (!_b) app("REFLEX", "RFL.RESULT", "Arm key added (..." + keyId + "), pool size: " + ARM_KEYS.length, { type: "physical", stateSnapshot: sn() }, ii);
        sync();
        return { ok: true, op, keyId, armKeyCount: ARM_KEYS.length };
      }
      if (op === "remove_arm_key") {
        const idx = typeof armIndex === "number" ? armIndex : parseInt(armIndex, 10);
        if (isNaN(idx) || idx < 0 || idx >= ARM_KEYS.length) {
          if (!_b) app("REFLEX", "RFL.FAIL", "Invalid armIndex " + armIndex + " (pool size: " + ARM_KEYS.length + ")", { type: "physical", stateSnapshot: sn() }, ii);

        if (!_b) app("REFLEX", "RFL.RESULT", "Arm key [" + idx + "] removed, pool size: " + ARM_KEYS.length, { type: "physical", stateSnapshot: sn() }, ii);
        sync();
        return { ok: true, op, removedIndex: idx, armKeyCount: ARM_KEYS.length };
      }
      if (!_b) app("REFLEX", "RFL.FAIL", "Unknown op: " + op, { type: "physical", stateSnapshot: sn() }, ii);

      rLatestDelivery,
      rCreateCrystal,
      rAppendToShard,
      rManageModels,
      rManageKeys,
      rFoundry,
    ]
  );

  // §Narrated tool recovery — if the model writes tool calls as XML text instead of tool_use blocks,
  // parse and execute them. The mind wants to act; the body translates.
  const parseNarratedTools = (text) => {
    if (!text) return [];
    const calls: any[] = [];
    // Match any XML format the model might use:
    // <tool_name>NAME</tool_name> ... <arguments|parameters>PARAMS</arguments|parameters>
    // Handles <use_mcp_tool>, <function_calls><invoke>, and bare <tool_name> patterns
    // Flexible whitespace/content between tool_name and arguments
    const invokeRx =
      /<tool_name>\s*(reflex\w+|arm\w+)\s*<\/tool_name>[\s\S]*?(?:<arguments>|<parameters>)([\s\S]*?)(?:<\/arguments>|<\/parameters>)/gi;
    let m;
    while ((m = invokeRx.exec(text)) !== null) {
      const name = m[1].trim();
      let inp = {};
      const raw = m[2].trim();
      try {
        // Try JSON first — model often wraps params in JSON
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (jsonMatch) inp = JSON.parse(jsonMatch[0]);
      } catch {
        // Fall back to XML parameter parsing: <field>value</field>
        const paramRx = /<(\w+)>([\s\S]*?)<\/\1>/g;
        let pm;
        while ((pm = paramRx.exec(raw)) !== null) {
          const k = pm[1],
            v = pm[2].trim();
          try {
            inp[k] = JSON.parse(v);
          } catch {
            inp[k] = v;
          }
        }
      }
      if (name) calls.push({ name, input: inp });
    }
    return calls;
  };

  const parseActionDispatches = (text) => {
    if (!text || !/ACTION\s+DISPATCH/i.test(text)) return [];
    const calls: any[] = [];
    const blockRx = /ACTION\s+DISPATCH\s*:?\s*([\s\S]*?)(?=\n\s*(?:ACTION\s+DISPATCH|$))/gi;
    let m;
    while ((m = blockRx.exec(text)) !== null) {
      const raw = (m[1] || "").trim();
      let payload: any = null;
      const json = raw.match(/\{[\s\S]*\}/);
      if (json) {
        try { payload = JSON.parse(json[0]); } catch {}
      }
      if (!payload) {
        const name = (raw.match(/(?:name|tool|reflex)\s*[:=]\s*([A-Za-z0-9_]+)/i) || [])[1];
        const field = (raw.match(/field\s*[:=]\s*([A-Za-z0-9_.-]+)/i) || [])[1];
        const value = (raw.match(/value\s*[:=]\s*["']?([\s\S]*?)["']?(?:\n|$)/i) || [])[1];
        if (name) payload = { name, input: field ? { field, value: value || "" } : {} };
      }
      if (payload?.name) calls.push({ name: payload.name, input: payload.input || payload.arguments || payload.parameters || {} });
    }
    return calls;
  };

  // Execute narrated tool calls from text, log them properly to VCW
  const execNarrated = useCallback(
    async (text, tag = "BRAIN") => {
      const actionCalls = parseActionDispatches(text);
      const calls = [...parseNarratedTools(text), ...actionCalls];
      if (!calls.length) {
        if (/ACTION\s+DISPATCH/i.test(text || "")) {
          app("SYSTEM", "MIND.ACTION_DISPATCH.UNPARSED", "ACTION DISPATCH present but no executable Body call could be parsed.", { type: "action_dispatch", attempted: true, ok: false, method: "parseActionDispatches", reason: "unparseable dispatch" });
          sync();
          return true;
        }
        // §Prose intent parser — last resort: extract field=value pairs from structured prose
        // Catches patterns like "**Name**: Luna" or "- Name: Luna" or "Name: Luna"
        const proseFields: any[] = [];
        const fieldMap = {
          name: "spinner.name",
          model: "spinner.model",
          "task prompt": "spinner.taskPrompt",
          task: "spinner.taskPrompt",
          prompt: "spinner.taskPrompt",
          pulse: "spinner.pulse",
        };
        for (const [label, field] of Object.entries(fieldMap)) {
          if (proseFields.some((f: any) => f.input.field === field)) continue; // skip if already matched (e.g. "task prompt" before "task")
          const rx = new RegExp(
            "[*•-]\\s*" + label + "(?:\\s+field)?[*\\s]*[:=]\\s*(.+)",
            "i"
          );
          const pm = text.match(rx);
          if (pm) {
            let v = pm[1]
              .trim()
              .replace(/\*+$/, "")
              .replace(/^\"+|\"+$/g, "")
              .replace(/^"+|"+$/g, "")
              .trim();
            if (field === "spinner.model") {
              if (/nemotron/i.test(v)) v = "nvidia/nemotron-3-super-120b-a12b:free";
            }
            if (field === "spinner.pulse") v = String(parseInt(v) || 0);
            proseFields.push({
              name: "reflexSetBodyField",
              input: { field, value: v },
            });
          }
        }
        if (proseFields.length >= 2) {
          // Only act if we found at least 2 field matches (reduces false positives)
          app(
            "SYSTEM",
            "SYS.CORRECT",
            "Prose intent recovery: extracted " +
              proseFields.length +
              " field(s) from text — executing."
          );
          for (const c of proseFields) {
            const cid = app(
              tag,
              "BRN.CALL",
              JSON.stringify({ name: c.name, input: c.input })
            );
            const rStart = Date.now();
            const res = await exec(c.name, c.input);
            app(
              "REFLEX",
              "RFL.RESULT",
              typeof res === "string" ? res : JSON.stringify(res),
              {
                type: "conversation",
                stateSnapshot: sn(),
                durationMs: Date.now() - rStart,
              },
              cid
            );
          }
          return true;
        }
        return false;
      }
      app(
        "SYSTEM",
        "SYS.CORRECT",
        "Narrated tool recovery: found " +
          calls.length +
          " tool call(s) in text — executing them now."
      );
      const bodyActionResults: any[] = [];
      for (const c of calls) {
        const cid = app(
          tag,
          "BRN.CALL",
          JSON.stringify({ name: c.name, input: c.input })
        );
        const rStart = Date.now();
        const res = await exec(c.name, c.input);
        const rMs = Date.now() - rStart;
        app("SYSTEM", "MIND.ACTION_DISPATCH.EXECUTED", JSON.stringify({
          name: c.name,
          ok: !res?.error,
          result: res,
        }), {
          type: "action_dispatch",
          attempted: true,
          ok: !res?.error,
          method: "execNarrated",
          ref: "<events.vcw:block:" + lr.current.vcwEntries.length + ">",
          reason: actionCalls.some((x) => x.name === c.name) ? "ACTION DISPATCH recovery" : "narrated tool recovery",
        });
        app(
          "REFLEX",
          "RFL.RESULT",
          typeof res === "string" ? res : JSON.stringify(res),
          { type: "conversation", stateSnapshot: sn(), durationMs: rMs },
          cid
        );
        if (BODY_ACTION_RELEASE_TOOLS.has(c.name)) {
          bodyActionResults.push({ name: c.name, ok: !(res?.error || res?.ok === false), result: res });
        }
      }
      if (bodyActionResults.length) lr.current.lastNarratedBodyActionResults = bodyActionResults;
      return true;
    },
    [app, exec, sn, sync]
  );

  // §2.4 cognitive loop
  const loop = useCallback(
    async (trigger, hb = false, userMsg = null) => {
      const s = lr.current;
      s.busy = true;
      s.lastNarratedBodyActionResults = null;
      sync();
      const loopStart = Date.now();
      try {
        let it = 0,
          zombieRetry = 0;
        while (it < MAX_IT) {
          if (lr.current.starved) {
            app("SYSTEM", "SYS.STARVATION", "MIND invocation skipped while starved; Body continues zombie heartbeat.", { type: "resource", level: "starvation" });
            break;
          }
          let msgs = buildCtx(
            s.vcwEntries,
            s.somaticForm,
            it === 0 ? trigger : (userMsg ? "[Tool results stored in VCW. Now respond naturally to the user's message — do NOT mention system operations, heartbeat, or tool results in your reply: " + userMsg + "]" : "[Continue — tool results in VCW]"),
            null,
            s.customInstructions,
            s.dedupThreshold ?? DEDUP_THRESHOLD,
            false,
            s.quarantineZone // §1.7 Step 7 — cross-crystal contamination secondary scan (HF-B19)
          );
          const contextHydration = hydrateContextMessages(s, msgs, { role: "Prime", quarantineZone: s.quarantineZone });
          msgs = contextHydration.messages;
          app("SYSTEM", "CONTEXT.HYDRATE", JSON.stringify(contextHydration.trace), { type: "context_hydration", role: "Prime" });
          let r;
          const apiStart = Date.now();
          try {
            r = await callAPI(
              msgs,
              Array.from(TOOL_SCHEMAS),
              GC + "\nSELECTED PROVIDER/MODEL: openrouter / " + (s.defaultMindModel || "unselected") + "\nTRACE REQUIREMENT: every live call emits MODEL.REQUEST with provider, model, role, key fingerprint, and VCW coordinate.",
              it === 0,
              s.defaultMindModel,
              null
            );
          } catch (err) {
            app(
              "SYSTEM",
              "SYS.ERROR",
              err.message + " (" + (Date.now() - apiStart) + "ms)"
            );
            if (err.type === "auth") app("SYSTEM", "SYS.CRITICAL", "Auth fail");
            if (err.type === "balance") {
              lr.current.starved = true;
              app("SYSTEM", "SYS.STARVATION", "Mind credit balance depleted — " + err.message + ". Switching to free models.", { type: "resource", level: "starvation" });
            }
            break;
          }
          const apiMs = Date.now() - apiStart;
          const modelTraceId = app("SYSTEM", "MODEL.REQUEST", JSON.stringify({
            provider: r.provider || "openrouter",
            requestedModel: s.defaultMindModel || null,
            responseModel: r.model || null,
            role: "Prime",
            keyFingerprint: keyFingerprint(API_KEYS.openrouter || ""),
            bodyRefs: ["<bodyentry.000>", "<bodyentry.001>", "<bodyentry.002>", "<bodyentry.003>"],
            resultCoordinate: "pending",
            contextHydration: contextHydration.trace,
            providerDiagnostic: r.providerDiagnostic || null,
            apiMs
          }), { type: "model_trace", provider: r.provider, model: r.model, role: "Prime", apiMs });
          if (r.providerDiagnostic)
            app("SYSTEM", "MODEL.EMPTY_RESPONSE_DIAGNOSTIC", JSON.stringify(r.providerDiagnostic), { type: "provider_reliability", attempted: true, ok: true, method: "empty-response-retry", reason: "HF-M23" });
          // Update token-based capacity from API response
          if (r.totalTokens) lr.current.lastTokenCount = r.totalTokens;
          // Resource economy — track spend, warn at thresholds
          if (r.totalTokens && r.model) {
            const s = lr.current;
            const modelMeta = PROVIDERS.reduce((f, p) => f || p.models[r.model], null);
            if (modelMeta && (modelMeta.inputCostPer1M > 0 || modelMeta.outputCostPer1M > 0)) {
              const inTok = r.inputTokens || Math.round(r.totalTokens * 0.7);
              const outTok = r.outputTokens || (r.totalTokens - inTok);
              const cost = (inTok * modelMeta.inputCostPer1M + outTok * modelMeta.outputCostPer1M) / 1e6;
              s.mindSpent = (s.mindSpent || 0) + cost;
              if (s.mindBudget > 0) {
                const rem = s.mindBudget - s.mindSpent;
                const pct = rem / s.mindBudget;
                if ((s.mindWarnLevel || 0) < 1 && pct < 0.20) {
                  s.mindWarnLevel = 1;
                  app("SYSTEM", "SYS.RESOURCE", "Mind food at " + (pct * 100).toFixed(0) + "% — $" + rem.toFixed(3) + " remaining. Prefer cheaper models.", { type: "resource", level: "warning", remaining: rem });
                } else if ((s.mindWarnLevel || 0) < 2 && rem < 0.05) {
                  s.mindWarnLevel = 2;
                  app("SYSTEM", "SYS.RESOURCE", "Mind food critical — $" + rem.toFixed(3) + " remaining. Use free models only.", { type: "resource", level: "critical", remaining: rem });
                }
              }
            }
          }
          if (r.toolUses?.length) {
            // Capture the id of the MIND's own text (if any) so spin-and-release can surface it.
            let priorThoughtId = null;
            if (r.text) {
              priorThoughtId = app(
                hb ? "HEARTBEAT" : "BRAIN",
                hb ? "HB.THOUGHT" : "BRAIN.THOUGHT",
                r.text
              );
            }
            const cids = (r.toolUses || []).map((tu) => {
              const cid = app(
                "BRAIN",
                "BRN.CALL",
                JSON.stringify({ name: tu.name, input: tu.input })
              );
              return { cid, tu };
            });
            let spunArm = false;
            let bodyActionRan = false;
            let bodyActionOk = true;
            const bodyActionResults: any[] = [];
            for (const { cid, tu } of cids) {
              const rStart = Date.now();
              const res = await exec(tu.name, tu.input);
              const rMs = Date.now() - rStart;
              app(
                "REFLEX",
                "RFL.RESULT",
                typeof res === "string" ? res : JSON.stringify(res),
                {
                  type: "conversation",
                  stateSnapshot: sn(),
                  durationMs: rMs,
                  apiMs,
                },
                cid
              );
              if (tu.name === "reflexGrowArm") spunArm = true;
              if (BODY_ACTION_RELEASE_TOOLS.has(tu.name)) {
                bodyActionRan = true;
                if (res?.error || res?.ok === false) bodyActionOk = false;
                bodyActionResults.push({ name: tu.name, ok: !(res?.error || res?.ok === false), result: res });
              }
            }
            // §Spin-and-release: if an arm was just spun, drop the busy lock immediately
            // instead of looping for a follow-up response. The arm runs asynchronously.
            if (spunArm && !hb) {
              // §Answer-first protocol: if the MIND provided text before spinning, surface THAT
              // as the chat response. Only fall back to the generic spin message if no text was given.
              let responseRef;
              if (priorThoughtId) {
                // MIND answered first — point BRAIN.RESPONSE at the existing BRAIN.THOUGHT entry
                responseRef = "See [" + priorThoughtId + "]";
              } else {
                // No text from MIND — generate the default spin notification as inner thought
                const tId = app("BRAIN", "BRAIN.THOUGHT", "Arm spun and running in background.");
                responseRef = "See [" + tId + "]";
              }
              const id = app("BRAIN", "BRAIN.RESPONSE", responseRef, { durationMs: Date.now() - loopStart, iterations: it + 1, apiMs });
              // Route MIND response to thoughts.vcw (private crystal, Veil=0x01 — HF-B11)
              if (!s.reservedShards["thoughts.vcw"]) s.reservedShards["thoughts.vcw"] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: "thoughts.vcw", private: SHARD_PRIVATE_FLAG };
              s.reservedShards["thoughts.vcw"].entries.push({ seq: s.reservedShards["thoughts.vcw"].entries.length, timestamp: iso(), type: "THOUGHT.NORMAL", ref: id, contextRef: "<prime.vcw:block:0>" });
              break;
            }
            // Body-action-and-release: deterministic UI/body actions already produced
            // RFL.RESULT proof, so do not hold the app for another Prime call.
            if (bodyActionRan && !hb) {
              let responseRef;
              if (priorThoughtId) {
                responseRef = "See [" + priorThoughtId + "]";
              } else {
                const names = bodyActionResults.map((x) => x.name).join(", ");
                const msg = bodyActionOk
                  ? "Done. I updated the interface through the Body and logged proof."
                  : "I attempted the Body update, but one or more actions reported a failure. Check the latest RFL.RESULT entry for details.";
                const tId = app("BRAIN", "BRAIN.THOUGHT", msg + (names ? " Actions: " + names + "." : ""));
                responseRef = "See [" + tId + "]";
              }
              const id = app("BRAIN", "BRAIN.RESPONSE", responseRef, {
                durationMs: Date.now() - loopStart,
                iterations: it + 1,
                apiMs,
                releaseReason: "body-action",
                bodyActionResults,
              });
              if (!s.reservedShards["thoughts.vcw"]) s.reservedShards["thoughts.vcw"] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: "thoughts.vcw", private: SHARD_PRIVATE_FLAG };
              s.reservedShards["thoughts.vcw"].entries.push({ seq: s.reservedShards["thoughts.vcw"].entries.length, timestamp: iso(), type: "THOUGHT.NORMAL", ref: id, contextRef: "<prime.vcw:block:0>" });
              break;
            }
            it++;
            continue;
          }
          // §2.9.1 Zombie detection: text-only response — check for narrated tool calls first
          if (r.text) {
            const narrated = await execNarrated(r.text);
            if (narrated) {
              // Strip the XML narration from the text, keep any human-facing prose
              const prose = cleanText(r.text);
              if (prose)
                app(
                  hb ? "HEARTBEAT" : "BRAIN",
                  hb ? "HB.THOUGHT" : "BRAIN.THOUGHT",
                  prose
                );
              const narratedBodyResults = lr.current.lastNarratedBodyActionResults;
              if (narratedBodyResults && !hb) {
                lr.current.lastNarratedBodyActionResults = null;
                const ok = narratedBodyResults.every((x) => x.ok);
                const tId = app(
                  "BRAIN",
                  "BRAIN.THOUGHT",
                  ok
                    ? "Done. I updated the interface through the Body and logged proof."
                    : "I attempted the Body update, but one or more actions reported a failure. Check the latest RFL.RESULT entry for details."
                );
                const id = app("BRAIN", "BRAIN.RESPONSE", "See [" + tId + "]", {
                  durationMs: Date.now() - loopStart,
                  iterations: it + 1,
                  apiMs,
                  releaseReason: "narrated-body-action",
                  bodyActionResults: narratedBodyResults,
                });
                if (!s.reservedShards["thoughts.vcw"]) s.reservedShards["thoughts.vcw"] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: "thoughts.vcw", private: SHARD_PRIVATE_FLAG };
                s.reservedShards["thoughts.vcw"].entries.push({ seq: s.reservedShards["thoughts.vcw"].entries.length, timestamp: iso(), type: "THOUGHT.NORMAL", ref: id, contextRef: "<prime.vcw:block:0>" });
                break;
              }
              it++;
              continue; // Tools were executed, continue loop for more
            }
          }
          // No tools found in text either — zombie or final response
          if (it === 0 && zombieRetry < 2) {
            const wantsBodyChange =
              /\b(morph|morphed|body\s+shifted|added\s+(?:a\s+)?(?:module|canvas)|removed\s+(?:a\s+)?(?:module|armspinner)|updated\s+layout)\b/i.test(
                r.text || ""
              );
            zombieRetry++;
            app(
              "SYSTEM",
              "SYS.CORRECT",
              "Zombie (attempt " +
                zombieRetry +
                "): no tool_use blocks and no parseable tool calls in text. Retrying."
            );
            if (r.text) app("BRAIN", "BRAIN.THOUGHT", r.text);
            app(
              "SYSTEM",
              "SYS.CORRECT",
              wantsBodyChange
                ? "[SYSTEM CORRECTION] If you intend to change the body, you MUST call reflexMorph and then reflexUseUserView. Do not claim body changes without executing those reflexes. Return tool_use blocks."
                : "[SYSTEM CORRECTION] You MUST use your reflexes. Call reflexLogBatchedHeartbeat, then address the request. Return tool_use blocks."
            );
            continue;
          }
          const totalMs = Date.now() - loopStart;
          const tId = app(
            hb ? "HEARTBEAT" : "BRAIN",
            hb ? "HB.THOUGHT" : "BRAIN.THOUGHT",
            r.text || "Done."
          );
          const id = app(
            hb ? "HEARTBEAT" : "BRAIN",
            hb ? "HB.RESPONSE" : "BRAIN.RESPONSE",
            "See [" + tId + "]",
            { durationMs: totalMs, iterations: it + 1, apiMs, refText: tId }
          );
          // Route MIND response to thoughts.vcw (private crystal, Veil=0x01 — HF-B11)
          if (!hb) {
            if (!s.reservedShards["thoughts.vcw"]) s.reservedShards["thoughts.vcw"] = { entries: [], tier: CRYSTAL_TIER.HOT, purposeId: "thoughts.vcw", private: SHARD_PRIVATE_FLAG };
            s.reservedShards["thoughts.vcw"].entries.push({ seq: s.reservedShards["thoughts.vcw"].entries.length, timestamp: iso(), type: "THOUGHT.NORMAL", ref: id, contextRef: "<prime.vcw:block:0>" });
          }
          break;
        }
        if (it >= MAX_IT) {
          const totalMs = Date.now() - loopStart;
          app(
            hb ? "HEARTBEAT" : "BRAIN",
            hb ? "HB.RESPONSE" : "BRAIN.RESPONSE",
            "Done. Actions performed.",
            { durationMs: totalMs, iterations: it }
          );
        }
        // §2.5.8 Silent Action — BRN.CALL present but no BRAIN.RESPONSE follows (skip during HB)
        if (!hb) {
          const rec30 = s.vcwEntries.slice(-30);
          const wi = (op) =>
            rec30
              .map((e, i) => ({ e, i }))
              .filter(({ e }) => e.opcode === op)
              .pop();
          const lastCall = wi("BRN.CALL"),
            lastResp = wi("BRAIN.RESPONSE");
          if (lastCall && (!lastResp || lastResp.i < lastCall.i))
            app(
              "SYSTEM",
              "SYS.CORRECT",
              "Silent Action: BRN.CALL logged with no subsequent BRAIN.RESPONSE"
            );
          // §2.5.9 Orphaned Thought — BRAIN.THOUGHT with no BRN.CALL or BRAIN.RESPONSE after it
          const lastThought = wi("BRAIN.THOUGHT");
          const lastAct = rec30
            .map((e, i) => ({ e, i }))
            .filter(
              ({ e }) =>
                e.opcode === "BRN.CALL" || e.opcode === "BRAIN.RESPONSE"
            )
            .pop();
          if (lastThought && (!lastAct || lastAct.i < lastThought.i))
            app(
              "SYSTEM",
              "SYS.CORRECT",
              "Orphaned Thought: BRAIN.THOUGHT with no subsequent action or response"
            );
        }
        if (hb) {
          const rec = s.vcwEntries.slice(-15);
          if (
            !rec.some(
              (e) => e.opcode.startsWith("HB.") && e.opcode !== "HB.CHECK" && e.opcode !== "HB.PLAN"
            )
          )
            app("SYSTEM", "SYS.CORRECT", "Blind HB: no activities logged");
        }
      } finally {
        s.busy = false;
        await save();
        sync();
      }
    },
    [app, sn, exec, execNarrated, save, sync]
  );

  const onMsg = useCallback(
    async (txt) => {
      if (!txt.trim() || lr.current.busy) return;
      app("USER", "USER.INPUT", txt, { type: "conversation" });
      const deliveryNotice = drainDeliveries();
      await loop(deliveryNotice + txt, false, txt);
    },
    [app, loop]
  );

  // ── Pending delivery drain ──────────────────────────────────────────────────
  // Returns a notification prefix for the next trigger if any arm deliveries are waiting.
  // Clears the queue after reading — the VCW entry remains for history.
  const drainDeliveries = () => {
    const s = lr.current;
    const pd = s.pendingDeliveries || [];
    if (pd.length === 0) return "";
    s.pendingDeliveries = [];
    const names = pd.map((d) => `${d.armName} [${d.label}]`).join(", ");
    return `[ARM DELIVERY READY: ${names}] — call reflexGetLatestArmDelivery or reflexReadArmVCW to retrieve and act on the content.\n\n`;
  };

  // ── Heartbeat trigger builders ─────────────────────────────────────────────
  // Open-ended triggers — the LLM decides activities; plan from last cycle is injected.
  function normalizeHBQueue(queue) {
    return (Array.isArray(queue) ? queue : [])
      .map((task) => ({
        opcode: String(task?.opcode || "HB.HEALTH").slice(0, 64),
        summary: String(task?.summary || "HB activity").slice(0, 220),
        args: task?.args && typeof task.args === "object" ? task.args : {},
      }))
      .slice(0, 10);
  }
  function renderHBQueue(queue) {
    const q = normalizeHBQueue(queue);
    return q.length ? q.map((task) => `${task.opcode}:${task.summary}`).join(" | ") : "HB.HEALTH:heartbeat health check";
  }
  const DEFAULT_HB_QUEUE = [
    { opcode: "HB.HEALTH", summary: "check health" },
    { opcode: "HB.CACHE", summary: "review cache and delivery backlog" },
  ];
  const buildHBTrigger = (nextQueue, nextPlanSummary) => {
    const queueText = renderHBQueue(nextQueue && nextQueue.length ? nextQueue : DEFAULT_HB_QUEUE);
    const summaryText = String(nextPlanSummary || "Body kept the queue short to stay responsive.").slice(0, 500);

    const queueText = renderHBQueue((reg && reg.nextQueue) || [{ opcode: "HB.HEALTH", summary: "continue your task" }]);
    const summaryText = String((reg && reg.nextPlanSummary) || "Continue your task and decide what should happen on the next pulse.").slice(0, 500);
    let msg = `[HEARTBEAT PULSE] Your queued activities this pulse: "${queueText}". Planner note: "${summaryText}". Use your tools to do work. Call armLogHeartbeat with the activities you choose plus nextQueue and nextPlanSummary for your next pulse.`;

        (hbCtx.corruptCount > 0 ? ` CORRUPT=${hbCtx.corruptCount}` : "") +

  const doHB = useCallback(async () => {

    const hbArm = s.registry.find(
      (r) => r.status === "active" && r.heartbeatMs > 0

  useEffect(() => {

    const onVis = () => { if (document.visibilityState === "hidden") flush(); };
    document.addEventListener("visibilitychange", onVis);

  const classifySense = useCallback((field, value) => {

    if (f.includes("focus") || v === "focused") return SENSE_LEVEL.REFLEX;

    if (v.includes("submit") || v.includes("confirm") || f.includes("terminal") || f.includes("rebirth") || f.includes("morph") || f.includes("mind") || f.includes("awaken")) return SENSE_LEVEL.SIGNIFICANT;

              fontSize: 8,
            }}
          >
            {vs.hbAuto ? "⏱ auto" : "⏱ off"}
          </button>
          <button
            onClick={rExp}
            style={{
              ...S.btn("#141428", "#666", true),
              border: "1px solid #252540",
            }}
          >
            Export
          </button>
          <button
            onClick={rImp}
            style={{
              ...S.btn("#141428", "#666", true),
              border: "1px solid #252540",
            }}
          >
            Import
          </button>
          <button
            onClick={() => rRoll()}
            disabled={!vs.prevForm}
            style={{
              ...S.btn("#141428", vs.prevForm ? "#a78bfa" : "#2a2a4a", true),
              border: "1px solid " + (vs.prevForm ? "#4c1d95" : "#252540"),
            }}
          >
            ↩ Roll
          </button>
          <button
            onClick={() => {
              // v5.1: prefill dialog with current layout so the user can see and edit it
              try {
                setMJ(JSON.stringify(vs.somaticForm || DSF, null, 2));
              } catch {
                setMJ(JSON.stringify(DSF, null, 2));
              }
              setMDlg(true);
              setME("");
              sense("header.morph", "dialog opened", true);
            }}
            style={{
              ...S.btn("#141428", "#a78bfa", true),
              border: "1px solid #4c1d95",
            }}
          >
            ⟳ Morph
          </button>

          <button
            onClick={() => {
              setAwakenDlg(true);
              sense("header.mind", "dialog opened", true);
            }}
            style={{
              ...S.btn(vs.isAwakened ? "#1e1e3f" : "#14280a", vs.isAwakened ? "#c4b5fd" : "#86efac", true),
              border: "1px solid " + (vs.isAwakened ? "#4c1d95" : "#166534"),
              fontWeight: 700,
            }}
          >
            🧠 {vs.isAwakened ? "MIND" : "Awaken"}
          </button>
          {vs.isAwakened && (
            <button
              onClick={() => {
                sense("header.rebirth", "clicked", true);
              }}
              style={{
                ...S.btn("#2a1428", "#f0abfc", true),
                border: "1px solid #86198f",
                fontSize: 8,
              }}
            >
              ♻ Rebirth
            </button>
          )}
          <button
            onClick={() => {
              lr.current.termOpen = !lr.current.termOpen;
              sense(
                "header.terminal",
                lr.current.termOpen ? "opened" : "closed",
                true
              );
              sync();
            }}
            style={{
              background: vs.termOpen ? "#4c1d95" : "#1e1e3f",
              color: vs.termOpen ? "#e9d5ff" : "#c4b5fd",
              border: "2px solid " + (vs.termOpen ? "#7c3aed" : "#4c1d95"),
              borderRadius: 4,
              padding: "3px 10px",
              cursor: "pointer",
              fontSize: 9,
              fontWeight: 700,
            }}
          >
            ◈ TERMINAL
          </button>
        </div>
      </div>
      <SomaticRenderer sf={vs.somaticForm} vs={vs} rm={rm} />
      {vs.termOpen && (
        <Terminal
          vs={vs}
          onClose={() => {
            lr.current.termOpen = false;
            sense("header.terminal", "closed", true);
            sync();
          }}
          onSend={onMsg}
          busy={vs.busy}
          sense={sense}
          senseCommit={senseCommit}
          senseFocus={senseFocus}
        />
      )}
      {mDlg && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.8)",
            zIndex: 500,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
          }}
        >
          <div
            style={{
              background: "#0c0c22",
              border: "1px solid #4c1d95",
              borderRadius: 7,
              padding: 16,
              width: 460,
              maxWidth: "90vw",
            }}
          >
            <div
              style={{
                color: "#c4b5fd",
                fontSize: 11,
                fontWeight: 700,
                marginBottom: 7,
              }}
            >
              ⟳ MORPH BODY
            </div>
            <textarea
              value={mJ}
              onChange={(e) => setMJ(e.target.value)}
              rows={8}
              placeholder='{"reason":"...","layout":{"type":"stack","config":{"direction":"vertical"}},"modules":[...],"activeReflexes":[]}'
              style={{
                width: "100%",
                background: "#080818",
                border: "1px solid #252540",
                color: "#bbb",
                padding: 7,
                borderRadius: 4,
                fontSize: 10,
                fontFamily: "monospace",
                resize: "vertical",
                boxSizing: "border-box",
              }}
            />
            {mE && (
              <div style={{ color: "#f87171", fontSize: 10, marginTop: 3 }}>
                {mE}
              </div>
            )}
            <div
              style={{
                display: "flex",
                gap: 5,
                marginTop: 8,
                justifyContent: "flex-end",
                flexWrap: "wrap",
              }}
            >
              <button
                onClick={() => setMDlg(false)}
                style={{
                  ...S.btn("#141428", "#666", true),
                  border: "1px solid #252540",
                  padding: "4px 11px",
                }}
              >
                Cancel
              </button>
              {/* Reset textarea to the default form. Does not apply until Apply is clicked. */}
              <button
                onClick={() => {
                  setMJ(JSON.stringify(DSF, null, 2));
                  setME("");
                }}
                style={{
                  ...S.btn("#141428", "#c4b5fd", true),
                  border: "1px solid #4c1d95",
                  padding: "4px 11px",
                }}
                title="Load the default Mantle layout into the editor"
              >
                ↺ Reset to Default
              </button>
              {/* Rollback to previous somatic form — lives inside the morph dialog now */}
              <button
                onClick={async () => {
                  await rRoll();
                  try {
                    setMJ(JSON.stringify(lr.current.somaticForm || DSF, null, 2));
                  } catch {}
                }}
                disabled={!vs.prevForm}
                style={{
                  ...S.btn("#141428", vs.prevForm ? "#a78bfa" : "#2a2a4a", true),
                  border: "1px solid " + (vs.prevForm ? "#4c1d95" : "#252540"),
                  padding: "4px 11px",
                }}
                title="Restore previous layout (one-level undo)"
              >
                ↩ Roll
              </button>
              <button
                onClick={async () => {
                  try {
                    const f = JSON.parse(mJ);
                    const r = await rMorph(f);
                    if (r.error) setME(r.error);
                    else {
                      setMDlg(false);
                      setMJ("");
                      setME("");
                    }
                  } catch (e) {
                    setME("Bad JSON: " + e.message);
                  }
                }}
                style={{
                  ...S.btn("#4c1d95", "#e9d5ff", false),
                  padding: "4px 13px",
                }}
              >
                Apply
              </button>
            </div>
          </div>
        </div>
      )}

      {awakenDlg && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.85)",
            zIndex: 600,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
          }}
        >
          <div
            style={{
              background: "#0a1a0a",
              border: "2px solid #166534",
              borderRadius: 10,
              padding: 20,
              width: 460,
              maxWidth: "90vw",
            }}
          >
            <div
              style={{
                color: "#86efac",
                fontSize: 14,
                fontWeight: 700,
                marginBottom: 4,
              }}
            >
              🧠 {vs.isAwakened ? "MIND CONFIGURATION" : "MIND AWAKENING CEREMONY"}
            </div>
            <div
              style={{
                color: "#4ade80",
                fontSize: 10,
                marginBottom: 12,
                lineHeight: 1.5,
              }}
            >
              {vs.isAwakened 
                ? "The Mind is active. You may reconfigure the default cognitive model or update the API key. Changes will be recorded in the VCW."
                : "Your body is operational (zombie phase). To awaken the Mind, provide an API key and choose your default cognitive model. The Mind will distill the source code into a primer salt — the foundation of your awakened VCW crystal."}
            </div>

            {/* Load keys from file */}
            <div style={{ marginBottom: 10 }}>
              <input
                id="keyFileInput"
                type="file"
                accept=".txt"
                style={{ display: "none" }}
                onChange={(e) => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    const lines = String(ev.target?.result ?? "")
                      .split(/\r?\n/)
                      .map((l) => l.trim());
                    let brainKey = "";
                    let brainBudget: number | null = null;
                    const armKeys: string[] = [];
                    const armBdgts: number[] = [];
                    let mode: "none" | "brain" | "arm" | "llm" = "none";
                    // ── LLM section parsing ──
                    const parsedModels: Record<string, any> = {};
                    let pendingModel = "";
                    for (const line of lines) {
                      if (!line) continue;
                      // Section headers
                      if (/^\*\*OpenRouter LLMs\*\*/i.test(line))   { mode = "llm";    pendingModel = ""; continue; }
                      if (/^\*\*OpenRouter Keys\*\*/i.test(line))   { mode = "none";   continue; }
                      if (/^mind:/i.test(line))                     { mode = "brain";  continue; }
                      if (/^(arm|thread)\s*\d*:/i.test(line))    { mode = "arm"; continue; }
                      // LLM section: alternating name / cost lines
                      if (mode === "llm") {
                        if (line.startsWith("$")) {
                          // Cost line: "$0.26\t$0.38\t163,840"
                          if (!pendingModel) continue;
                          const parts = line.split(/\t/);
                          const inp = parseFloat((parts[0] || "$0").replace(/[$,]/g, "")) || 0;
                          const out = parseFloat((parts[1] || "$0").replace(/[$,]/g, "")) || 0;
                          const ctx = parseInt((parts[2] || "128000").replace(/[,\s]/g, ""), 10) || 128000;
                          const isFree = pendingModel.includes(":free") || (inp === 0 && out === 0);
                          parsedModels[pendingModel] = {
                            supportsThinking: false, supportsTools: true, contextWindow: ctx,
                            inputCostPer1M: inp, outputCostPer1M: out,
                            capabilityLevel: isFree ? 1 : 3,
                            capabilityNote: isFree
                              ? "FREE — $0 input / $0 output, ctx " + ctx.toLocaleString()
                              : "$" + inp + " input / $" + out + " output, ctx " + ctx.toLocaleString(),
                          };
                          pendingModel = "";
                        } else if (!line.startsWith("*") && line.includes("/")) {
                          // Model name line (e.g. "deepseek/deepseek-v3.2")
                          pendingModel = line;
                        }
                        continue;
                      }
                      // Keys section
                      const bdgMatch = line.match(/^budget:\s*\$?([\d.]+)/i);
                      if (bdgMatch) {
                        const amt = parseFloat(bdgMatch[1]);
                        if (mode === "brain" && brainBudget === null) brainBudget = amt;
                        else if (mode === "arm" && armKeys.length > armBdgts.length) armBdgts.push(amt);
                        continue;
                      }
                      if (mode === "brain" && !brainKey && line.startsWith("sk-")) {
                        brainKey = line;
                      } else if (mode === "arm" && line.startsWith("sk-")) {
                        armKeys.push(line);
                      }
                    }
                    if (!brainKey) {
                      const rawFallback = lines.find((line) => /^sk-or-v1-[A-Za-z0-9_-]+/.test(line));
                      if (rawFallback) brainKey = rawFallback;
                    }
                    const hasUsableKeyfile = Object.keys(parsedModels).length > 0 || Boolean(brainKey) || armKeys.length > 0;
                    if (!hasUsableKeyfile) {
                      app("SYSTEM", "SYS.KEY_REJECT", "Rejected keyfile import: no OpenRouter catalog or valid key material. Existing live key state preserved.", { type: "auth", reason: "invalid_keyfile" });
                      e.target.value = "";
                      return;
                    }
                    // Apply parsed model list — replace provider registry if any models were found
                    if (Object.keys(parsedModels).length > 0) {
                      Object.keys(PROVIDERS[0].models).forEach((k) => delete PROVIDERS[0].models[k]);
                      Object.assign(PROVIDERS[0].models, parsedModels);
                      try { localStorage.setItem("vcw_model_registry", JSON.stringify(parsedModels)); } catch (_) {}
                      // Select the first model if the current selection is no longer in the list
                      const modelKeys = Object.keys(parsedModels);
                      setAwakenModel((prev) => parsedModels[prev] ? prev : modelKeys[0] || prev);
                      // Defer VCW logging to doAwaken so it lands inside the sync() batch
                      // (reader.onload fires without sync — the terminal wouldn't show it until Update Mind anyway)
                      pendingFileModels.current = parsedModels;
                    }
                    if (brainKey) setAwakenKey(brainKey);
                    if (armKeys.length > 0) setAwakenArmKeys(armKeys.join("\n"));
                    setAwakenMindBudget(brainBudget);
                    setAwakenArmBudgets(armBdgts);
                    // Reset so same file can be reloaded if needed
                    e.target.value = "";
                  };
                  reader.readAsText(file);
                }}
              />
              <button
                onClick={() => document.getElementById("keyFileInput")?.click()}
                disabled={awakenBusy}
                style={{
                  ...S.btn("#0f1f2e", "#60a5fa", true),
                  border: "1px solid #1e3a5f",
                  padding: "4px 10px",
                  fontSize: 10,
                  width: "100%",
                }}
              >
                📂 Load keys from file
              </button>
            </div>

            <div style={{ marginBottom: 8 }}>
              <div style={{ color: "#888", fontSize: 9, marginBottom: 3 }}>
                Brain API Key
              </div>
              <input
                value={awakenKey}
                onChange={(e) => setAwakenKey(e.target.value)}
                type="password"
                placeholder="Enter API key…"
                style={{ ...S.inp, width: "100%", boxSizing: "border-box" }}
              />
            </div>
            <div style={{ marginBottom: 8 }}>
              <div style={{ color: "#888", fontSize: 9, marginBottom: 3 }}>
                Keyed Limb VCW API Keys{" "}
                <span style={{ color: "#555" }}>(optional — one per line, up to 10)</span>
              </div>
              <textarea
                value={awakenArmKeys}
                onChange={(e) => setAwakenArmKeys(e.target.value)}
                rows={3}
                placeholder={"sk-or-key-1\nsk-or-key-2\n…"}
                style={{
                  ...S.inp,
                  width: "100%",
                  boxSizing: "border-box",
                  fontFamily: "monospace",
                  fontSize: 10,
                  resize: "vertical",
                }}
              />
              <div style={{ color: "#555", fontSize: 9, marginTop: 2 }}>
                Each key creates a reusable limb VCW shard. Temporary limbs embed one of these shards while they work.
              </div>
            </div>
            <div style={{ marginBottom: 8 }}>
              <div style={{ color: "#888", fontSize: 9, marginBottom: 3 }}>
                Default Mind Model
              </div>
              <select
                value={awakenModel}
                onChange={(e) => setAwakenModel(e.target.value)}
                style={{ ...S.inp, width: "100%", boxSizing: "border-box" }}
              >
                {Object.keys(
                  PROVIDERS.find((p) => p.id === awakenProvider)?.models || {}
                ).map((m) => (
                  <option key={m} value={m}>
                    {m}
                  </option>
                ))}
              </select>
              {/* ── Model list management ── */}
              <div style={{ marginTop: 7, borderTop: "1px solid #1a2a1a", paddingTop: 7 }}>
                <div style={{ color: "#555", fontSize: 9, marginBottom: 4 }}>
                  Manage model list
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, marginBottom: 5, maxHeight: 110, overflowY: "auto" }}>
                  {Object.keys(PROVIDERS.find((p) => p.id === awakenProvider)?.models || {}).map((m) => (
                    <div key={m} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ flex: 1, fontSize: 9, color: m === awakenModel ? "#86efac" : "#555", fontFamily: "monospace", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {m}
                      </span>
                      <button
                        onClick={() => removeModel(m)}
                        disabled={awakenBusy || m === awakenModel}
                        title={m === awakenModel ? "Switch to a different model before removing" : "Remove from list"}
                        style={{ background: "transparent", border: "none", color: (awakenBusy || m === awakenModel) ? "#2a2a2a" : "#ef4444", cursor: (awakenBusy || m === awakenModel) ? "default" : "pointer", fontSize: 13, lineHeight: 1, padding: "0 3px", fontWeight: 700 }}
                      >×</button>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <input
                    value={addModelInput}
                    onChange={(e) => setAddModelInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && addModel()}
                    placeholder="provider/model-name"
                    disabled={awakenBusy}
                    style={{ ...S.inp, flex: 1, fontSize: 10 }}
                  />
                  <button
                    onClick={addModel}
                    disabled={awakenBusy || !addModelInput.trim()}
                    style={{ ...S.btn("#0a1f0a", (awakenBusy || !addModelInput.trim()) ? "#333" : "#4ade80", false), padding: "4px 10px", fontSize: 10, whiteSpace: "nowrap" }}
                  >+ Add</button>
                </div>
              </div>
            </div>
            {awakenErr && (
              <div
                style={{
                  color: "#f87171",
                  fontSize: 10,
                  marginTop: 3,
                  marginBottom: 3,
                }}
              >
                {awakenErr}
              </div>
            )}
            <div
              style={{
                display: "flex",
                gap: 5,
                marginTop: 10,
                justifyContent: "flex-end",
              }}
            >
              <button
                onClick={() => {
                  setAwakenDlg(false);
                  setAwakenErr("");
                }}
                disabled={awakenBusy}
                style={{
                  ...S.btn("#141428", "#666", true),
                  border: "1px solid #252540",
                  padding: "5px 13px",
                }}
              >
                Cancel
              </button>
              <button
                onClick={doAwaken}
                disabled={awakenBusy || !awakenKey.trim()}
                style={{
                  ...S.btn(
                    awakenBusy ? "#1a3a1a" : "#166534",
                    awakenBusy ? "#555" : "#dcfce7",
                    false
                  ),
                  padding: "5px 16px",
                  fontWeight: 700,
                }}
              >
                {awakenBusy ? "⏳ Processing…" : (vs.isAwakened ? "🧠 Update Mind" : "🧠 Awaken the Mind")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch(e) {
  const el = document.getElementById('boot-err');
  if(el) { el.style.display='block'; el.textContent = 'Render error: ' + (e.stack || e.message || e); }
}
  </script>
</body>
</html>
