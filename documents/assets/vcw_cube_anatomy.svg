<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>The VCW cube as it really is (v3)</title>
  <desc>One generation of memory: a ZIP of 800 real PNG layers grouped into named bands.
Layers hold append-only hashed JSON entry streams (or a raw RGBA canvas for spatial bands).
Not a freely writable voxel store: append-only, veiled, verified, sealable.</desc>
  <rect width="980" height="600" fill="#f8fafc"/>
  <text x="490" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">The VCW Cube, as it really is</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#475569">one generation = one ZIP of real PNGs · the unit of memory is the APPEND-ONLY ENTRY, not a voxel</text>

  <!-- layer stack -->
  <g>
    <text x="200" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">800 layers, grouped into bands</text>
    <g font-size="11" fill="#0f172a">
      <polygon points="80,120 280,120 320,150 120,150" fill="#e2e8f0" stroke="#64748b"/><text x="340" y="140">000–099 boot / reserved</text>
      <polygon points="80,160 280,160 320,190 120,190" fill="#bfdbfe" stroke="#1d4ed8"/><text x="340" y="180">100–299 identity · facts · events · discoveries</text>
      <polygon points="80,200 280,200 320,230 120,230" fill="#bbf7d0" stroke="#15803d"/><text x="340" y="220">300–399 senses (intake)</text>
      <polygon points="80,240 280,240 320,270 120,270" fill="#fef08a" stroke="#a16207"/><text x="340" y="260">400–449 immune (defense)</text>
      <polygon points="80,280 280,280 320,310 120,310" fill="#fed7aa" stroke="#c2410c"/><text x="340" y="300">450–499 brain (dispatch log)</text>
      <polygon points="80,320 280,320 320,350 120,350" fill="#e9d5ff" stroke="#7e22ce"/><text x="340" y="334">500–549 thoughts (PRIVATE — the veil:</text>
      <text x="340" y="348" font-size="11" fill="#0f172a">reads return [] unless deliberately lifted)</text>
      <polygon points="80,360 280,360 320,390 120,390" fill="#ccfbf1" stroke="#0f766e"/><text x="340" y="380">550–749 app bands · 750–799 tail</text>
    </g>
    <text x="200" y="420" text-anchor="middle" font-size="11" fill="#475569">a band reserves a RANGE but materializes layers ON DEMAND;</text>
    <text x="200" y="435" text-anchor="middle" font-size="11" fill="#475569">emptied layers return to a per-band free pool (metabolism)</text>
  </g>

  <!-- one layer zoom -->
  <g>
    <text x="760" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">inside one layer (a real 800×800 PNG)</text>
    <rect x="600" y="105" width="320" height="180" rx="8" fill="#ffffff" stroke="#334155"/>
    <g font-size="11" font-family="Consolas, monospace" fill="#0f172a">
      <text x="612" y="126">MAGIC  "VCWPNG2\n"            (8 bytes)</text>
      <text x="612" y="146">u32 len + layer-boot JSON     {band, layer,</text>
      <text x="612" y="160">                               encoding, private}</text>
      <text x="612" y="182">u32 len + payload JSON:</text>
      <text x="612" y="200">  {"content": [ entry, entry, ... ]}</text>
      <text x="612" y="222">zero padding to 2,560,000 bytes</text>
    </g>
    <text x="760" y="262" text-anchor="middle" font-size="11" fill="#475569">(a calendar-spatial layer skips all this: its RGBA canvas IS the data —</text>
    <text x="760" y="276" text-anchor="middle" font-size="11" fill="#475569">that is where the (layer, x, y) byte address is used directly)</text>

    <!-- the entry -->
    <rect x="600" y="300" width="320" height="130" rx="8" fill="#0f172a"/>
    <g font-size="11" font-family="Consolas, monospace" fill="#e2e8f0">
      <text x="612" y="322">{"id": 7,  "ts": ..., "opcode": "SENSE",</text>
      <text x="612" y="340"> "author": "BODY", "source": "...",</text>
      <text x="612" y="358"> "content": {...},</text>
      <text x="612" y="376"> "tombstone": false, "quarantined": false,</text>
      <text x="612" y="394"> "hash": "9f2c4a1d03b7e851"}</text>
    </g>
    <text x="760" y="420" text-anchor="middle" font-size="11" fill="#fbbf24" font-weight="bold">hash covers EVERY field except id/tombstone/quarantined/hash</text>
  </g>

  <!-- bottom band: lifecycle of trust -->
  <g font-size="12">
    <rect x="60" y="460" width="200" height="90" rx="10" fill="#dcfce7" stroke="#15803d"/>
    <text x="160" y="484" text-anchor="middle" font-weight="bold" fill="#14532d">APPEND</text>
    <text x="160" y="502" text-anchor="middle" fill="#14532d">new entry, band-unique id,</text>
    <text x="160" y="518" text-anchor="middle" fill="#14532d">at the band's tail layer —</text>
    <text x="160" y="534" text-anchor="middle" fill="#14532d">never an overwrite</text>
    <rect x="290" y="460" width="200" height="90" rx="10" fill="#e0e7ff" stroke="#4338ca"/>
    <text x="390" y="484" text-anchor="middle" font-weight="bold" fill="#312e81">READ (veiled)</text>
    <text x="390" y="502" text-anchor="middle" fill="#312e81">visible stream only:</text>
    <text x="390" y="518" text-anchor="middle" fill="#312e81">no tombstoned, no quarantined,</text>
    <text x="390" y="534" text-anchor="middle" fill="#312e81">no private without reveal</text>
    <rect x="520" y="460" width="200" height="90" rx="10" fill="#fef9c3" stroke="#a16207"/>
    <text x="620" y="484" text-anchor="middle" font-weight="bold" fill="#713f12">SAVE (staged)</text>
    <text x="620" y="502" text-anchor="middle" fill="#713f12">write .stage → verify hashes</text>
    <text x="620" y="518" text-anchor="middle" fill="#713f12">→ atomic replace. A corrupt cube</text>
    <text x="620" y="534" text-anchor="middle" fill="#713f12">never replaces a healthy one</text>
    <rect x="750" y="460" width="170" height="90" rx="10" fill="#fee2e2" stroke="#b91c1c"/>
    <text x="835" y="484" text-anchor="middle" font-weight="bold" fill="#7f1d1d">SEAL (ancestral)</text>
    <text x="835" y="502" text-anchor="middle" fill="#7f1d1d">read-only forever +</text>
    <text x="835" y="518" text-anchor="middle" fill="#7f1d1d">content fingerprint —</text>
    <text x="835" y="534" text-anchor="middle" fill="#7f1d1d">rewritten history is caught</text>
  </g>
  <text x="490" y="580" text-anchor="middle" font-size="12" fill="#475569">capacity pressure ≥ 0.75 → metabolism (compact) · ≥ 0.90 → aggressive (dedupe+compact) · capacity NEVER triggers rebirth</text>
</svg>
